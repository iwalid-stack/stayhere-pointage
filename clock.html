<script>
// ================================================================
// CONFIG SUPABASE — chargée depuis config.js (gitignore)
// ================================================================
if (!window.SUPABASE_CONFIG) {
  alert('⚠️ Fichier config.js manquant.\nCopiez config.example.js → config.js et renseignez vos credentials Supabase.');
  throw new Error('SUPABASE_CONFIG non défini — config.js manquant');
}
const SB_URL = window.SUPABASE_CONFIG.url;
const SB_KEY = window.SUPABASE_CONFIG.anonKey;

let SB = null;
let session = null;
let employee = null;
let schedule = null;
let todayShift = null;
let timerInterval = null;
let currentTab = 'pointage';
let leaveBalance = null;
let leaveRequests = [];
let myPointage = [];
let allHolidays = [];
let siteCoords = null; // {latitude, longitude, geofence_radius}
let todayPointage = null; // entrée sh_pointage pour aujourd'hui (type: travaille|double|off|…)

// ================================================================
// UTILITAIRES
// ================================================================
const DAY_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MON_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

function escapeHtml(s) { const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function pad2(n) { return String(n).padStart(2,'0'); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
function nowISO() { return new Date().toISOString(); }
function todayStr() { const n=new Date(); return `${n.getFullYear()}-${pad2(n.getMonth()+1)}-${pad2(n.getDate())}`; }
function yesterdayStr() { const n=new Date(Date.now()-86400000); return `${n.getFullYear()}-${pad2(n.getMonth()+1)}-${pad2(n.getDate())}`; }
function timeNow() { const n=new Date(); return pad2(n.getHours())+':'+pad2(n.getMinutes()); }

function fmtMinutes(min) {
  if(!min||min<=0) return '0h00';
  const h=Math.floor(min/60), m=min%60;
  return `${h>0?h+'h':''}${pad2(m)}${h>0?'':'min'}`;
}
function fmtMinutesShort(min) {
  if(!min||min<=0) return '0h00';
  const h=Math.floor(min/60), m=min%60;
  return `${h}h${pad2(m)}`;
}
function timeToMins(t) { if(!t)return 0; const [h,m]=t.split(':').map(Number); return h*60+m; }

async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function slugify(s) {
  return (s||'').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,'.');
}

// ================================================================
// LOGIN TRACKING — enregistre first_login_at / last_login_at
// ================================================================
function _trackLogin(username) {
  if(!username) return;
  const now = new Date().toISOString();
  // Cherche dans les deux tables pour savoir si first_login_at est déjà rempli
  Promise.all([
    SB.from('sh_users').select('first_login_at').eq('username', username).maybeSingle(),
    SB.from('sh_user_profiles').select('first_login_at').eq('username', username).maybeSingle(),
  ]).then(([r1, r2]) => {
    const alreadyFirst = r1.data?.first_login_at || r2.data?.first_login_at;
    const upd = { last_login_at: now };
    if(!alreadyFirst) upd.first_login_at = now;
    // Met à jour les deux tables (la bonne sera trouvée, l'autre 0 lignes sans erreur)
    SB.from('sh_users').update(upd).eq('username', username).then(()=>{});
    SB.from('sh_user_profiles').update(upd).eq('username', username).then(()=>{});
  });
}

// ================================================================
// PAUSE STATE (stockée dans localStorage pour persistance)
// ================================================================
function getPause() {
  try { return JSON.parse(localStorage.getItem('sh_clock_pause')||'null'); } catch { return null; }
}
function setPause(s) {
  if(s) localStorage.setItem('sh_clock_pause', JSON.stringify(s));
  else localStorage.removeItem('sh_clock_pause');
}
function getTotalPauseMs() {
  const ps = getPause();
  if(!ps) return 0;
  let ms = ps.totalMs || 0;
  if(ps.start) ms += Date.now() - new Date(ps.start).getTime();
  return ms;
}

// ================================================================
// GÉOLOCALISATION — Haversine + vérification périmètre site
// ================================================================
function haversineDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000; // rayon Terre en mètres
  const φ1 = lat1 * Math.PI / 180;
  const φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function checkGeofence() {
  // Si aucune coordonnée configurée pour le site, pointage autorisé sans restriction
  if(!siteCoords?.latitude || !siteCoords?.longitude) return Promise.resolve({ok:true});

  // Fallback 100m (et non 50m) pour éviter les blocages liés à un cache ancien
  const radius = (siteCoords.geofence_radius != null ? Number(siteCoords.geofence_radius) : 0) || 100;

  if(!navigator.geolocation) {
    return Promise.resolve({ok:false, reason:'La géolocalisation n\'est pas disponible sur cet appareil.'});
  }

  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const dist = haversineDistance(
          pos.coords.latitude, pos.coords.longitude,
          siteCoords.latitude, siteCoords.longitude
        );
        const distInt = Math.round(dist);
        // Marge GPS : on soustrait la moitié de la précision déclarée (max 25m)
        // pour compenser l'imprécision naturelle du GPS en intérieur
        const gpsMargin = Math.min(Math.round((pos.coords.accuracy || 0) * 0.5), 25);
        const effectiveDist = Math.max(0, dist - gpsMargin);
        if(effectiveDist <= radius) {
          resolve({ok:true, dist:distInt});
        } else {
          resolve({
            ok: false,
            dist: distInt,
            reason: `Vous êtes à ${distInt}m de votre site (limite : ${radius}m).\nVeuillez vous rapprocher pour pouvoir pointer.`
          });
        }
      },
      (err) => {
        let msg = 'Impossible d\'obtenir votre position GPS.';
        if(err.code === 1) msg = 'Accès à la géolocalisation refusé.\nAutorisez la localisation dans les réglages de votre téléphone puis réessayez.';
        else if(err.code === 2) msg = 'Position introuvable. Vérifiez que le GPS est activé et que vous êtes dans une zone couverte.';
        else if(err.code === 3) msg = 'Délai dépassé pour obtenir votre position. Réessayez.';
        resolve({ok:false, reason:msg});
      },
      { enableHighAccuracy:true, timeout:12000, maximumAge:0 }
    );
  });
}

// ================================================================
// CONGÉS — Fonctions utilitaires
// ================================================================
function countWorkDays(dateFrom, dateTo) {
  if(!dateFrom||!dateTo||dateTo<dateFrom) return 0;
  let count = 0;
  const d = new Date(dateFrom + 'T00:00:00');
  const end = new Date(dateTo + 'T00:00:00');
  while(d <= end) {
    const dow = d.getDay();
    if(dow !== 0) { // Dimanche exclu
      const ds = d.toISOString().split('T')[0];
      if(!allHolidays.includes(ds)) count++;
    }
    d.setDate(d.getDate()+1);
  }
  return count;
}

function fmtDateFR(ds) {
  if(!ds) return '—';
  const parts = ds.split('T')[0].split('-');
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

function calcCPSolde() {
  const initial = Number(leaveBalance?.cp_initial||0);
  const dateRef = leaveBalance?.date_reference;
  let acquis = 0;
  if(dateRef) {
    const ref = new Date(dateRef+'T00:00:00');
    const now = new Date();
    const months = Math.max(0,(now.getFullYear()-ref.getFullYear())*12+(now.getMonth()-ref.getMonth()));
    acquis = Math.round(months*1.5*2)/2; // arrondi à 0.5
  }
  const pris = leaveRequests.filter(r=>r.type==='cp'&&r.status==='approved').reduce((s,r)=>s+Number(r.nb_jours||0),0);
  return {initial, acquis, pris, solde:Math.max(0,initial+acquis-pris)};
}

function calcRECUPSolde() {
  const initial = Number(leaveBalance?.recup_initial||0);
  const feries = myPointage.filter(p=>allHolidays.includes(p.date)&&['travaille','double'].includes(p.type)).length;
  const pris = leaveRequests.filter(r=>r.type==='recup'&&r.status==='approved').reduce((s,r)=>s+Number(r.nb_jours||0),0);
  return {initial, acquis:feries, pris, solde:Math.max(0,initial+feries-pris)};
}

  async login() {
    const username = (document.getElementById('un')?.value||'').trim().toLowerCase();
    const password = document.getElementById('pw')?.value||'';
    if(!username||!password) return;

    const btn = document.querySelector('.btn-login');
    const errEl = document.getElementById('login-err');
    if(btn) { btn.textContent='Connexion...'; btn.disabled=true; }

    try {
      let profile = null;

      // ── Tentative 1 : Supabase Auth (utilisateur déjà migré) ──
      const email = username + '@stayhere.internal';
      const { data, error } = await SB.auth.signInWithPassword({ email, password });

      if (!error && data?.user) {
        const { data: p } = await SB.from('sh_user_profiles').select('*').eq('id', data.user.id).single();
        profile = p;
      } else {
        // ── Tentative 2 : Migration automatique (premier login) ──
        if(btn) btn.textContent = 'Migration…';
        const res = await fetch(`${SB_URL}/functions/v1/auto-migrate-user`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
          body: JSON.stringify({ username, password }),
        });
        const json = await res.json();

        if (!res.ok || !json.ok) {
          if(errEl){errEl.textContent='Identifiant ou mot de passe incorrect.';errEl.style.display='block';}
          if(btn){btn.textContent='Se connecter';btn.disabled=false;}
          return;
        }

        // Restaurer la session Supabase retournée
        await SB.auth.setSession({
          access_token: json.session.access_token,
          refresh_token: json.session.refresh_token,
        });
        profile = json.profile;
      }

      if (!profile) {
        if(errEl){errEl.textContent='Profil introuvable. Contactez votre administrateur.';errEl.style.display='block';}
        await SB.auth.signOut();
        if(btn){btn.textContent='Se connecter';btn.disabled=false;}
        return;
      }
      if (!profile.acces_horloge) {
        if(errEl){errEl.textContent='Vous n\'avez pas accès à l\'application de pointage mobile. Contactez votre administrateur.';errEl.style.display='block';}
        await SB.auth.signOut();
        if(btn){btn.textContent='Se connecter';btn.disabled=false;}
        return;
      }

      session = { ...profile };
      _trackLogin(profile.username);
      await this.loadData(false);
    } catch(e) {
      if(errEl){errEl.textContent='Erreur de connexion : '+e.message;errEl.style.display='block';}
      if(btn){btn.textContent='Se connecter';btn.disabled=false;}

  async loadData(quiet=false) {
    if(!quiet) this.showLoading('Chargement des données...');

    try {
      // Re-validate session via Supabase Auth
      const { data: { user: sbUser } } = await SB.auth.getUser();
      if (!sbUser) { session=null; await SB.auth.signOut(); this.showLogin(); return; }
      const { data: freshProfile } = await SB.from('sh_user_profiles').select('*').eq('id', sbUser.id).single();
      if (!freshProfile) { session=null; await SB.auth.signOut(); this.showLogin(); return; }
      session = { ...freshProfile };

      if(session.acces_horloge===false) { this.showNoAccess(); return; }

      // Find linked employee
      employee = null; schedule = null; todayShift = null;

      // Priority 1: employee_id stored on user record
      if(session.employee_id) {
        const {data:emps} = await SB.from('sh_employees').select('*').eq('id',session.employee_id);
        employee = emps?.[0] || null;
      }

      // Priority 2: match by username convention (p.nom format) + site_id
      if(!employee) {
        const {data:allEmps} = await SB.from('sh_employees').select('*').eq('actif',true);
        employee = (allEmps||[]).find(e=>{
          const expected = slugify(e.prenom).charAt(0)+'.'+slugify(e.nom);
          return expected===session.username.toLowerCase();
        })||null;
        // Priority 3: if site_id matches and only one employee, use it (for KA only)
        if(!employee && session.site_id) {
          const siteEmps = (allEmps||[]).filter(e=>e.site_id===session.site_id&&e.actif);
          if(siteEmps.length===1) employee=siteEmps[0];
        }
      }

      if(employee) {
        const [schedData, shiftData, holData, balData, reqData, ptData, siteData] = await Promise.all([
          SB.from('sh_schedules').select('*').eq('employee_id',employee.id),
          // Cherche le shift d'aujourd'hui ET d'hier (pour les shifts overnight ex: 20h→08h)
          SB.from('sh_shifts').select('*').eq('employee_id',employee.id).in('date',[todayStr(),yesterdayStr()]),
          SB.from('sh_holidays').select('date'),
          SB.from('sh_leave_balances').select('*').eq('employee_id',employee.id),
          SB.from('sh_leave_requests').select('*').eq('employee_id',employee.id).order('created_at',{ascending:false}),
          SB.from('sh_pointage').select('date,type').eq('employee_id',employee.id),
          employee.site_id
            ? SB.from('sh_sites').select('latitude,longitude,geofence_radius').eq('id',employee.site_id)
            : Promise.resolve({data:null}),
        ]);
        schedule = schedData.data?.[0] || null;
        // Priorité : shift overnight ouvert d'hier > shift d'aujourd'hui déjà démarré > shift planifié du jour
        // Évite qu'à minuit un shift planifié non-démarré efface le shift overnight encore ouvert
        const todayShifts = shiftData.data || [];
        const shiftToday = todayShifts.find(s=>s.date===todayStr())||null;
        const shiftYest  = todayShifts.find(s=>s.date===yesterdayStr()&&s.heure_arrivee&&!s.heure_depart)||null;
        todayShift = shiftYest || shiftToday;
        allHolidays = (holData.data||[]).map(h=>h.date);
        leaveBalance = balData.data?.[0] || null;
        leaveRequests = reqData.data || [];
        myPointage = ptData.data || [];
        todayPointage = myPointage.find(p => p.date === todayStr()) || null;
        siteCoords = siteData?.data?.[0] || null;
      } else {
        const {data:holData} = await SB.from('sh_holidays').select('date');
        allHolidays = (holData||[]).map(h=>h.date);
      }

      this.renderClock();
    } catch(e) {
      this.showError('Erreur de connexion.', e.message);
    }
  },

  showNoAccess() {
    document.body.innerHTML=`<div class="no-access">
      <div class="icon">🚫</div>
      <p>Vous n'avez pas accès à l'application de pointage mobile.<br>Contactez votre administrateur.</p>
      <button onclick="ClockApp.logout()" style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);border:none;padding:12px 24px;border-radius:10px;font-size:13px;cursor:pointer;margin-top:8px">Se déconnecter</button>
    </div>`;
  },

  // ---- STATUS COMPUTATION ----
  getStatus() {
    if(!todayShift?.heure_arrivee) return 'not_started';
    if(todayShift.heure_arrivee && !todayShift.heure_depart) {
      return getPause()?.start ? 'paused' : 'active';
    }
    return 'done';
  },

  getElapsedMins() {
    if(!todayShift?.heure_arrivee) return 0;
    // Utiliser la date du SHIFT (pas todayStr()) pour gérer les shifts overnight
    const shiftDate = todayShift.date || todayStr();
    const [ah,am] = todayShift.heure_arrivee.split(':').map(Number);
    const arrMs = new Date(shiftDate+'T'+pad2(ah)+':'+pad2(am)+':00').getTime();
    const workedMs = Date.now() - arrMs - getTotalPauseMs();
    return Math.max(0, Math.floor(workedMs/60000));
  },

  getPausedMins() { return Math.floor(getTotalPauseMs()/60000); },

  // Horaires prévus effectifs : priorité au shift pré-rempli (rotation), sinon schedule fixe
  getPlannedDebut() {
    return todayShift?.heure_debut_prevue || schedule?.heure_debut || null;
  },
  getPlannedFin() {
    return todayShift?.heure_fin_prevue || schedule?.heure_fin || null;
  },

  getRetardMins() {
    const debut=this.getPlannedDebut();
    if(!debut||!todayShift?.heure_arrivee) return 0;
    const [sh,sm]=debut.split(':').map(Number);
    const [ah,am]=todayShift.heure_arrivee.split(':').map(Number);
    return Math.max(0,(ah*60+am)-(sh*60+sm));
  },

  getCountdown() {
    const debut=this.getPlannedDebut();
    if(!debut) return null;
    const now=new Date();
    const nowMins=now.getHours()*60+now.getMinutes();
    const [sh,sm]=debut.split(':').map(Number);
    const startMins=sh*60+sm;
    return startMins-nowMins; // Positive = minutes until start, negative = late
  },

  // ---- RING DISPLAY ----
  getRingConfig() {
    const status=this.getStatus();
    // Durée prévue : priorité aux horaires du shift (rotation), sinon schedule fixe
    // Gère l'overnight (ex 20:00→08:00 = 720 min, pas -720)
    let schedDur = 480;
    const debut=this.getPlannedDebut(), fin=this.getPlannedFin();
    if(debut&&fin) {
      let d = timeToMins(fin)-timeToMins(debut);
      if(d<=0) d+=1440; // overnight : passage minuit
      schedDur = d;
    }

    if(status==='not_started') {
      const cd=this.getCountdown();
      if(cd===null) return {time:timeNow(),label:'Heure actuelle',color:'rgba(255,255,255,0.15)',progress:0};
      if(cd>0) {
        const h=Math.floor(cd/60),m=cd%60;
        const text=h>0?`${h}h${pad2(m)}`:`${m}min`;
        return {time:text,label:'Avant le début',color:'#f57c00',progress:Math.max(0,1-(cd/(60)))*100};
      }
      const late=Math.abs(cd);
      return {time:`+${fmtMinutesShort(late)}`,label:'En retard',color:'#d93025',progress:100};
    }
    if(status==='active') {
      const elapsed=this.getElapsedMins();
      const pct=Math.min(100,schedDur?((elapsed/schedDur)*100):0);
      return {time:fmtMinutesShort(elapsed),label:'Temps travaillé',color:'#00c792',progress:pct};
    }
    if(status==='paused') {
      const pausedMins=this.getPausedMins();
      return {time:fmtMinutesShort(pausedMins),label:'En pause',color:'#42a5f5',progress:0,pulse:true};
    }
    if(status==='done') {
      const duree=todayShift.duree_minutes||0;
      const pct=Math.min(100,schedDur?((duree/schedDur)*100):100);
      return {time:fmtMinutesShort(duree),label:'Shift terminé',color:'#ce93d8',progress:pct};
    }
    return {time:'--',label:'',color:'rgba(255,255,255,0.1)',progress:0};
  },

  // ---- RENDER ----
  renderClock() {
    if(timerInterval) { clearInterval(timerInterval); timerInterval=null; }

    const status=this.getStatus();
    const empName=employee?`${employee.prenom} ${employee.nom}`:session.nom;
    const empSub=employee?employee.poste:session.username;
    const _pDebut=this.getPlannedDebut(), _pFin=this.getPlannedFin();
    const schedLine=_pDebut&&_pFin
      ?`Planning : <strong>${_pDebut} → ${_pFin==='00:00'?'Minuit':_pFin}</strong>`
      :'<span style="color:rgba(255,165,0,0.6)">Aucun planning configuré</span>';

    const now=new Date();
    const dateLabel=`${DAY_FR[now.getDay()]} ${now.getDate()} ${MON_FR[now.getMonth()]} ${now.getFullYear()}`;
    const CIRC=283; // 2*PI*45

    let buttons='', chips='', summaryHtml='';
    const retard=this.getRetardMins();
    const pausedMins=this.getPausedMins();

    // Chips
    if(todayShift?.heure_arrivee) {
      chips+=`<div class="chip chip-arrive">🕐 Arrivée ${todayShift.heure_arrivee}${retard>0?` <span style="color:#ff7b72">+${fmtMinutes(retard)}</span>`:''}</div>`;
    }
    if(retard>0&&status==='active') {
      chips+=`<div class="chip chip-retard">⚠ Retard : +${fmtMinutes(retard)}</div>`;
    }
    if((status==='active'||status==='paused')&&pausedMins>0) {
      chips+=`<div class="chip chip-pause">⏸ Pause : ${fmtMinutes(pausedMins)}</div>`;
    }
    if(status==='done') {
      chips+=`<div class="chip chip-done">✓ Terminé à ${todayShift.heure_depart}</div>`;
    }

    // Buttons
    if(status==='not_started') {
      if(todayPointage?.type==='off') {
        buttons=`<div style="text-align:center;padding:12px 0">
          <div style="font-size:44px;margin-bottom:12px">🌙</div>
          <div style="font-size:19px;font-weight:700;color:rgba(255,255,255,0.65)">Jour de repos</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.3);margin-top:6px">Vous n'avez pas de shift prévu aujourd'hui</div>
        </div>`;
      } else {
        buttons=`<button class="btn-clock btn-start" onclick="ClockApp.startShift()">▶ &nbsp;Pointer l'arrivée</button>`;
        if(!employee) buttons+=`<div style="font-size:12px;color:rgba(255,165,0,0.7);margin-top:8px;text-align:center">Aucun profil collaborateur lié à ce compte. Contactez l'administrateur.</div>`;
      }
    } else if(status==='active') {
      const elapsed=this.getElapsedMins();
      const MIN_DEPART=10; // 10 min minimum avant de pouvoir pointer le départ
      const canLeave=elapsed>=MIN_DEPART;
      const leaveIn=Math.ceil(MIN_DEPART-elapsed);
      buttons=`
        <button class="btn-clock btn-pause" onclick="ClockApp.pauseShift()">⏸ &nbsp;Mettre en pause</button>
        ${canLeave
          ?`<button class="btn-clock btn-stop" onclick="ClockApp.confirmStop()">⏹ &nbsp;Pointer le départ</button>`
          :`<button class="btn-clock btn-stop" disabled style="opacity:0.35;cursor:not-allowed">⏳ &nbsp;Départ dans ${leaveIn} min</button>`}`;
    } else if(status==='paused') {
      const elapsedP=this.getElapsedMins();
      const canLeaveP=elapsedP>=10;
      const leaveInP=Math.ceil(10-elapsedP);
      buttons=`
        <button class="btn-clock btn-resume" onclick="ClockApp.resumeShift()">▶ &nbsp;Reprendre le shift</button>
        ${canLeaveP
          ?`<button class="btn-clock btn-stop" onclick="ClockApp.confirmStop()">⏹ &nbsp;Pointer le départ</button>`
          :`<button class="btn-clock btn-stop" disabled style="opacity:0.35;cursor:not-allowed">⏳ &nbsp;Départ dans ${leaveInP} min</button>`}`;
    } else if(status==='done') {
      const dur=todayShift.duree_minutes||0;
      const pause=todayShift.pause_minutes||0;
      summaryHtml=`<div class="summary-card">
        <div class="summary-row"><span class="s-label">Arrivée</span><span class="s-value">${todayShift.heure_arrivee}</span></div>
        <div class="summary-row"><span class="s-label">Départ</span><span class="s-value">${todayShift.heure_depart}</span></div>
        ${retard>0?`<div class="summary-row"><span class="s-label">Retard</span><span class="s-value warn">+${fmtMinutes(retard)}</span></div>`:''}
        ${pause>0?`<div class="summary-row"><span class="s-label">Pause totale</span><span class="s-value">${fmtMinutes(pause)}</span></div>`:''}
        <div class="summary-row"><span class="s-label">Temps travaillé</span><span class="s-value ok">${fmtMinutes(dur)}</span></div>
      </div>`;
      buttons=`<button class="btn-clock btn-neutral" onclick="ClockApp.loadData(false)">↻ Actualiser</button>`;
    }

    document.body.innerHTML=`
    <div class="clock-screen">
      <div class="clock-header">
        <div class="user-info">
          <div class="user-name">${empName}</div>
          <div class="user-sub">${empSub}</div>
        </div>
        <div class="header-actions">
          <button class="btn-sm-icon" onclick="ClockApp.showChangePwd()" title="Changer mon mot de passe">🔑</button>
          <button class="btn-sm-ghost" onclick="ClockApp.logout()">Déconnexion</button>
        </div>
      </div>
      <div class="clock-body" id="tab-body">
        <div class="clock-date">${dateLabel}</div>
        <div class="schedule-line">${schedLine}</div>
        <div class="status-ring-wrap" id="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 100 100">
            <circle class="ring-track" cx="50" cy="50" r="45"/>
            <circle class="ring-progress" id="ring-prog" cx="50" cy="50" r="45"
              stroke-dasharray="${CIRC}" stroke-dashoffset="${CIRC}" stroke="rgba(255,255,255,0.1)"/>
          </svg>
          <div class="ring-inner">
            <div class="ring-time" id="ring-time">--</div>
            <div class="ring-label" id="ring-label"></div>
          </div>
        </div>
        <div class="info-chips" id="info-chips">${chips}</div>
        ${summaryHtml}
        <div class="btn-area">${buttons}</div>
      </div>
      <div class="bottom-nav">
        <button class="bottom-tab active" onclick="ClockApp.switchTab('pointage')">
          <div class="tab-icon">⏱</div><div>Pointage</div>
        </button>
        <button class="bottom-tab" onclick="ClockApp.switchTab('conges')">
          <div class="tab-icon">🏖</div><div>Congés</div>
        </button>
      </div>
    </div>`;

    this._updateRing();
    timerInterval = setInterval(()=>this._tick(), 1000);
  },

  _updateRing() {
    const cfg=this.getRingConfig();
    const CIRC=283;
    const offset=CIRC-(CIRC*(cfg.progress/100));

    const timeEl=document.getElementById('ring-time');
    const labelEl=document.getElementById('ring-label');
    const progEl=document.getElementById('ring-prog');

    if(timeEl) timeEl.textContent=cfg.time;
    if(labelEl) labelEl.textContent=cfg.label;
    if(progEl) {
      progEl.style.strokeDashoffset=offset;
      progEl.style.stroke=cfg.color;
    }
  },

  _tick() {
    const status=this.getStatus();
    this._updateRing();
    // Update pause chip if active
    if(status==='active'||status==='paused') {
      const chipsEl=document.getElementById('info-chips');
      if(chipsEl) {
        const retard=this.getRetardMins();
        const pausedMins=this.getPausedMins();
        let c='';
        if(todayShift?.heure_arrivee) c+=`<div class="chip chip-arrive">🕐 Arrivée ${todayShift.heure_arrivee}${retard>0?` <span style="color:#ff7b72">+${fmtMinutes(retard)}</span>`:''}</div>`;
        if(retard>0&&status==='active') c+=`<div class="chip chip-retard">⚠ Retard : +${fmtMinutes(retard)}</div>`;
        if(pausedMins>0) c+=`<div class="chip chip-pause">⏸ Pause : ${fmtMinutes(pausedMins)}</div>`;
        chipsEl.innerHTML=c;
      }
    }
  },

  // ---- SHIFT ACTIONS ----
  // ── Helper : appel Edge Function avec JWT Supabase Auth ─────
  async _callClockAction(action, extraBody={}) {
    const { data: { session: sbSess } } = await SB.auth.getSession();
    if (!sbSess?.access_token) throw new Error('Session expirée. Reconnectez-vous.');

    const res = await fetch(`${SB_URL}/functions/v1/clock-action`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${sbSess.access_token}`,
        'apikey': SB_KEY,
      },
      body: JSON.stringify({ action, ...extraBody }),
    });

    const json = await res.json();
    if (!res.ok || !json.ok) throw new Error(json.error || `Erreur ${res.status}`);
    return json;
  },

  async startShift() {
    if(!employee) { alert('Aucun profil collaborateur associé à votre compte. Contactez votre administrateur.'); return; }

    // Blocage si jour de repos (défini dans le planning)
    if(todayPointage?.type==='off') {
      alert('🌙 Jour de repos\n\nAujourd\'hui est votre jour de repos. Le pointage n\'est pas autorisé.');
      return;
    }

    // Obtenir la position GPS pour la valider CÔTÉ SERVEUR
    const btnArea = document.querySelector('.btn-area');
    const origHTML = btnArea ? btnArea.innerHTML : '';
    if(btnArea) btnArea.innerHTML = `<div style="text-align:center;color:rgba(255,255,255,0.45);font-size:13px;padding:24px 0;display:flex;align-items:center;justify-content:center;gap:10px"><div class="spinner" style="width:18px;height:18px;border-width:2px"></div>Vérification de la position…</div>`;

    let latitude = null, longitude = null;
    if (navigator.geolocation) {
      try {
        const pos = await new Promise((res, rej) =>
          navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true,timeout:12000,maximumAge:0})
        );
        latitude = pos.coords.latitude;
        longitude = pos.coords.longitude;
      } catch { /* géofence validée par le serveur, null = refus = blocage */ }
    }

    try {
      // ⚡ Validation géofence + timestamp = côté SERVEUR (Edge Function)
      const result = await this._callClockAction('start', { latitude, longitude });
      setPause(null);
      todayShift = result.shift;
      if(btnArea) btnArea.innerHTML = origHTML;
      this.renderClock();
    } catch(e) {
      if(btnArea) btnArea.innerHTML = origHTML;
      alert('📍 Pointage impossible\n\n' + e.message);
    }
  },

  pauseShift() {
    // La pause est un état UI local (début/fin de pause)
    // La durée finale est envoyée au serveur lors du stop
    const ps=getPause()||{totalMs:0};
    ps.start=nowISO();
    setPause(ps);
    this.renderClock();
  },

  resumeShift() {
    const ps=getPause();
    if(!ps?.start) return;
    const addMs=Date.now()-new Date(ps.start).getTime();
    setPause({totalMs:(ps.totalMs||0)+addMs,start:null});
    this.renderClock();
  },

  async confirmStop() {
    const elapsed=this.getElapsedMins();
    const pauseMin=this.getPausedMins();
    // Afficher confirmation avec temps estimé (l'heure exacte sera fixée par le serveur)
    const msg=`Pointer le départ maintenant ?\n\n⏱ Temps travaillé estimé : ${fmtMinutes(Math.max(0,elapsed-pauseMin))}${pauseMin>0?'\n⏸ Pause : '+fmtMinutes(pauseMin):''}`;
    if(!confirm(msg)) return;
    await this.stopShift();
  },

  async stopShift() {
    if(!todayShift?.heure_arrivee) return;

    // Finaliser la pause ouverte
    const ps=getPause();
    if(ps?.start) {
      const addMs=Date.now()-new Date(ps.start).getTime();
      setPause({totalMs:(ps.totalMs||0)+addMs,start:null});
    }
    const pauseMin=this.getPausedMins();

    const btnArea = document.querySelector('.btn-area');
    const origHTML = btnArea ? btnArea.innerHTML : '';
    if(btnArea) btnArea.innerHTML = `<div style="text-align:center;color:rgba(255,255,255,0.45);font-size:13px;padding:24px 0;display:flex;align-items:center;justify-content:center;gap:10px"><div class="spinner" style="width:18px;height:18px;border-width:2px"></div>Vérification de la position…</div>`;

    let latitude = null, longitude = null;
    if (navigator.geolocation) {
      try {
        const pos = await new Promise((res, rej) =>
          navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true,timeout:12000,maximumAge:0})
        );
        latitude = pos.coords.latitude;
        longitude = pos.coords.longitude;
      } catch { /* serveur gérera */ }
    }

    try {
      // ⚡ Timestamp départ = côté SERVEUR, géofence validée serveur
      const result = await this._callClockAction('stop', { latitude, longitude, pauseMinutes: pauseMin });
      todayShift = result.shift;
      setPause(null);
      if(btnArea) btnArea.innerHTML = origHTML;
      this.renderClock();
    } catch(e) {
      if(btnArea) btnArea.innerHTML = origHTML;
      alert('📍 Pointage impossible\n\n' + e.message);
    }
  },

  // ---- TAB SWITCHING ----
  switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.bottom-tab').forEach((b,i)=>{
      b.classList.toggle('active', (tab==='pointage'&&i===0)||(tab==='conges'&&i===1));
    });
    if(tab === 'pointage') {
      // Relancer le pointage
      const tabBody = document.getElementById('tab-body');
      if(tabBody) {
        const status = this.getStatus();
        const now = new Date();
        const dateLabel = `${DAY_FR[now.getDay()]} ${now.getDate()} ${MON_FR[now.getMonth()]} ${now.getFullYear()}`;
        const _pD=this.getPlannedDebut(),_pF=this.getPlannedFin();
        const schedLine = _pD&&_pF
          ?`Planning : <strong>${_pD} → ${_pF==='00:00'?'Minuit':_pF}</strong>`
          :'<span style="color:rgba(255,165,0,0.6)">Aucun planning configuré</span>';
        const CIRC=283;
        const retard=this.getRetardMins();
        const pausedMins=this.getPausedMins();
        let chips='', buttons='', summaryHtml='';
        if(todayShift?.heure_arrivee){chips+=`<div class="chip chip-arrive">🕐 Arrivée ${todayShift.heure_arrivee}${retard>0?` <span style="color:#ff7b72">+${fmtMinutes(retard)}</span>`:''}</div>`;}
        if(retard>0&&status==='active'){chips+=`<div class="chip chip-retard">⚠ Retard : +${fmtMinutes(retard)}</div>`;}
        if((status==='active'||status==='paused')&&pausedMins>0){chips+=`<div class="chip chip-pause">⏸ Pause : ${fmtMinutes(pausedMins)}</div>`;}
        if(status==='done'){chips+=`<div class="chip chip-done">✓ Terminé à ${todayShift.heure_depart}</div>`;}
        if(status==='not_started'){if(todayPointage?.type==='off'){buttons=`<div style="text-align:center;padding:12px 0"><div style="font-size:44px;margin-bottom:12px">🌙</div><div style="font-size:19px;font-weight:700;color:rgba(255,255,255,0.65)">Jour de repos</div><div style="font-size:13px;color:rgba(255,255,255,0.3);margin-top:6px">Vous n'avez pas de shift prévu aujourd'hui</div></div>`;}else{buttons=`<button class="btn-clock btn-start" onclick="ClockApp.startShift()">▶ &nbsp;Pointer l'arrivée</button>`;if(!employee)buttons+=`<div style="font-size:12px;color:rgba(255,165,0,0.7);margin-top:8px;text-align:center">Aucun profil collaborateur lié à ce compte. Contactez l'administrateur.</div>`;}}
        else if(status==='active'){const el=this.getElapsedMins(),cl=el>=10,li=Math.ceil(10-el);buttons=`<button class="btn-clock btn-pause" onclick="ClockApp.pauseShift()">⏸ &nbsp;Mettre en pause</button>${cl?`<button class="btn-clock btn-stop" onclick="ClockApp.confirmStop()">⏹ &nbsp;Pointer le départ</button>`:`<button class="btn-clock btn-stop" disabled style="opacity:0.35;cursor:not-allowed">⏳ &nbsp;Départ dans ${li} min</button>`}`;}
        else if(status==='paused'){const elP=this.getElapsedMins(),clP=elP>=10,liP=Math.ceil(10-elP);buttons=`<button class="btn-clock btn-resume" onclick="ClockApp.resumeShift()">▶ &nbsp;Reprendre le shift</button>${clP?`<button class="btn-clock btn-stop" onclick="ClockApp.confirmStop()">⏹ &nbsp;Pointer le départ</button>`:`<button class="btn-clock btn-stop" disabled style="opacity:0.35;cursor:not-allowed">⏳ &nbsp;Départ dans ${liP} min</button>`}`;}
        else if(status==='done'){const dur=todayShift.duree_minutes||0;const pause=todayShift.pause_minutes||0;summaryHtml=`<div class="summary-card"><div class="summary-row"><span class="s-label">Arrivée</span><span class="s-value">${todayShift.heure_arrivee}</span></div><div class="summary-row"><span class="s-label">Départ</span><span class="s-value">${todayShift.heure_depart}</span></div>${retard>0?`<div class="summary-row"><span class="s-label">Retard</span><span class="s-value warn">+${fmtMinutes(retard)}</span></div>`:''}${pause>0?`<div class="summary-row"><span class="s-label">Pause totale</span><span class="s-value">${fmtMinutes(pause)}</span></div>`:''}<div class="summary-row"><span class="s-label">Temps travaillé</span><span class="s-value ok">${fmtMinutes(dur)}</span></div></div>`;buttons=`<button class="btn-clock btn-neutral" onclick="ClockApp.loadData(false)">↻ Actualiser</button>`;}
        tabBody.innerHTML=`<div class="clock-date">${dateLabel}</div><div class="schedule-line">${schedLine}</div><div class="status-ring-wrap" id="ring-wrap"><svg class="ring-svg" viewBox="0 0 100 100"><circle class="ring-track" cx="50" cy="50" r="45"/><circle class="ring-progress" id="ring-prog" cx="50" cy="50" r="45" stroke-dasharray="${CIRC}" stroke-dashoffset="${CIRC}" stroke="rgba(255,255,255,0.1)"/></svg><div class="ring-inner"><div class="ring-time" id="ring-time">--</div><div class="ring-label" id="ring-label"></div></div></div><div class="info-chips" id="info-chips">${chips}</div>${summaryHtml}<div class="btn-area">${buttons}</div>`;
        this._updateRing();
        timerInterval = setInterval(()=>this._tick(), 1000);
      }
    } else {
      if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
      const tabBody = document.getElementById('tab-body');
      if(tabBody) tabBody.innerHTML = this._buildCongesBody();
    }
  },

  // ---- CONGÉS TAB ----
  _buildCongesBody() {
    const cp = calcCPSolde();
    const recup = calcRECUPSolde();
    const statusLabels = {
      pending_ka:'⏳ En attente KA',
      pending_admin:'⏳ En attente Admin',
      approved:'✓ Approuvé',
      rejected:'✕ Refusé'
    };
    const reqList = leaveRequests.length === 0
      ? '<p style="color:rgba(255,255,255,0.25);font-size:13px;text-align:center;padding:24px 0">Aucune demande</p>'
      : leaveRequests.map(r=>`
        <div class="leave-card">
          <div class="leave-card-top">
            <span class="leave-type-badge ltype-${r.type}">${r.type==='cp'?'Congé Payé':'RECUP'}</span>
            <span class="leave-status-badge lstatus-${r.status}">${statusLabels[r.status]||r.status}</span>
          </div>
          <div class="leave-dates">${fmtDateFR(r.date_debut)} → ${fmtDateFR(r.date_fin)}</div>
          <div class="leave-meta">${r.nb_jours} jour${r.nb_jours>1?'s':''} · Soumis le ${fmtDateFR(r.created_at)}</div>
          ${r.notes?`<div class="leave-meta" style="margin-top:3px;font-style:italic">${escapeHtml(r.notes)}</div>`:''}

        </div>`).join('');
    return `<div class="conges-body">
      <div class="balance-cards">
        <div class="balance-card">
          <div class="balance-val val-cp">${cp.solde}</div>
          <div class="balance-label">Jours CP</div>
          <div class="balance-detail">Antérieur : ${cp.initial} · Acquis : ${cp.acquis}<br>Pris : ${cp.pris}</div>
        </div>

          <div class="balance-val val-recup">${recup.solde}</div>
          <div class="balance-label">Jours RÉCUP</div>
          <div class="balance-detail">Antérieur : ${recup.initial} · Fériés : ${recup.acquis}<br>Pris : ${recup.pris}</div>
        </div>
      </div>
      ${employee
        ?`<button class="btn-new-leave" onclick="ClockApp.showLeaveForm()">+ Nouvelle demande</button>`
        :`<div style="color:rgba(255,165,0,0.7);font-size:13px;text-align:center;margin-bottom:20px;padding:14px;background:rgba(255,165,0,0.08);border-radius:12px">Aucun profil collaborateur lié.<br>Contactez votre administrateur.</div>`}
      <div class="leave-section-title">Mes demandes</div>
      <div class="leave-list">${reqList}</div>
    </div>`;
  },

  showLeaveForm() {
    if(!employee) return;
    const cp = calcCPSolde();
    const recup = calcRECUPSolde();
    const today = todayStr();
    const overlay = document.createElement('div');
    overlay.className = 'leave-form-overlay';
    overlay.id = 'leave-form-overlay';
    overlay.innerHTML = `
      <div class="leave-form-sheet">
        <div class="leave-form-title">
          <span>Nouvelle demande</span>
          <button style="background:rgba(255,255,255,0.08);border:none;width:32px;height:32px;border-radius:10px;color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="document.getElementById('leave-form-overlay').remove()">✕</button>
        </div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:rgba(255,255,255,0.35);margin-bottom:8px">Type</div>

            <div class="lt-bal">Solde : ${cp.solde} j</div>
          </div>
          <div class="leave-type-opt" id="opt-recup" onclick="ClockApp._selectLeaveType('recup')">
            <div class="lt-icon">💤</div>

        <button class="btn-cancel-leave" onclick="document.getElementById('leave-form-overlay').remove()">Annuler</button>
      </div>`;
    document.body.appendChild(overlay);
    window._leaveFormType = 'cp';
    this._updateDaysCount();
  },

  _selectLeaveType(type) {
    window._leaveFormType = type;
    document.getElementById('opt-cp')?.classList.toggle('selected', type==='cp');
    document.getElementById('opt-recup')?.classList.toggle('selected', type==='recup');
    this._updateDaysCount();
  },

  _updateDaysCount() {
    const debut = document.getElementById('leave-debut')?.value;
    const fin = document.getElementById('leave-fin')?.value;
    const el = document.getElementById('days-count');
    const btn = document.getElementById('btn-submit-leave');
    if(!debut||!fin||fin<debut) {
      if(el) el.innerHTML = '<span style="color:rgba(255,165,0,0.7)">Dates invalides</span>';
      if(btn) btn.disabled = true;
      return;
    }
    const nb = countWorkDays(debut, fin);
    if(el) el.innerHTML = nb>0?`<strong>${nb}</strong> jour${nb>1?'s':''} ouvré${nb>1?'s':''}`:`<span style="color:rgba(255,165,0,0.7)">Aucun jour ouvré dans cette période</span>`;
    if(btn) btn.disabled = nb <= 0;
  },

  async submitLeaveRequest() {
    if(!employee) return;
    const debut = document.getElementById('leave-debut')?.value;
    const fin = document.getElementById('leave-fin')?.value;
    const notes = document.getElementById('leave-notes')?.value.trim() || '';
    const type = window._leaveFormType || 'cp';
    if(!debut||!fin||fin<debut) { alert('Dates invalides.'); return; }
    const nb = countWorkDays(debut, fin);
    if(nb<=0) { alert('Aucun jour ouvré dans cette période.'); return; }
    const bal = type==='cp' ? calcCPSolde().solde : calcRECUPSolde().solde;
    if(nb>bal) {
      if(!confirm(`Votre solde ${type==='cp'?'CP':'RECUP'} est de ${bal} jour(s). Soumettre quand même ?`)) return;
    }
    const btn = document.getElementById('btn-submit-leave');
    if(btn) { btn.textContent='Envoi...'; btn.disabled=true; }
    const rec = {
      id:uid(), employee_id:employee.id, site_id:employee.site_id,
      type, date_debut:debut, date_fin:fin, nb_jours:nb, notes,
      status:'pending_ka',
      validated_by_ka:null, validated_at_ka:null, ka_notes:null,
      validated_by_admin:null, validated_at_admin:null, admin_notes:null,
      rejected_by:null, rejected_at:null, rejection_reason:null,
      created_by:session.username, created_at:nowISO(), updated_at:null
    };
    try {
      const {error} = await SB.from('sh_leave_requests').insert(rec);
      if(error) throw error;
      leaveRequests.unshift(rec);
      document.getElementById('leave-form-overlay')?.remove();
      const tabBody = document.getElementById('tab-body');
      if(tabBody) tabBody.innerHTML = this._buildCongesBody();
    } catch(e) {
      alert('Erreur : '+e.message);
      if(btn) { btn.textContent='Soumettre la demande'; btn.disabled=false; }
    }
  },

    const overlay = document.createElement('div');

    overlay.id = 'pwd-overlay';
    overlay.innerHTML = `
      <div class="leave-form-sheet">
        <div class="leave-form-title">
          <span>🔑 Changer mon mot de passe</span>
          <button style="background:rgba(255,255,255,0.08);border:none;width:32px;height:32px;border-radius:10px;color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="document.getElementById('pwd-overlay').remove()">✕</button>
        </div>
        <div id="pwd-err" style="background:rgba(217,48,37,0.12);border:1px solid rgba(217,48,37,0.25);color:#ff7b72;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none"></div>

        </div>
        <div class="field" style="margin-bottom:14px">
          <label style="display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:rgba(255,255,255,0.35);margin-bottom:8px">Nouveau mot de passe</label>
          <input id="pwd-new" type="password" autocomplete="new-password" placeholder="••••••••"
            style="width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:white;font-size:16px;outline:none;font-family:inherit">

          <input id="pwd-confirm" type="password" autocomplete="new-password" placeholder="••••••••"
            style="width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:white;font-size:16px;outline:none;font-family:inherit">
        </div>
        <button id="pwd-btn" onclick="ClockApp.savePwd()"
          style="width:100%;padding:17px;background:#FF622C;color:white;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit">
          Enregistrer le nouveau mot de passe
        </button>
        <div style="font-size:11px;color:rgba(255,255,255,0.2);text-align:center;margin-top:12px">Minimum 6 caractères</div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('pwd-current').focus();
  },

  async savePwd() {
    const current = document.getElementById('pwd-current').value;
    const next    = document.getElementById('pwd-new').value;
    const confirm = document.getElementById('pwd-confirm').value;
    const errEl   = document.getElementById('pwd-err');
    const btn     = document.getElementById('pwd-btn');

    const showErr = (msg) => { errEl.textContent=msg; errEl.style.display='block'; };

    if(!current||!next||!confirm) { showErr('Tous les champs sont requis.'); return; }
    if(next.length < 6)           { showErr('Le mot de passe doit contenir au moins 6 caractères.'); return; }
    if(next !== confirm)          { showErr('Les deux nouveaux mots de passe ne correspondent pas.'); return; }

    btn.textContent='Vérification…'; btn.disabled=true;
    errEl.style.display='none';

    try {
      // ── Vérifier le mot de passe actuel via Supabase Auth ──
      btn.textContent='Vérification…';
      const email = session.username + '@stayhere.internal';
      const { error: verifyErr } = await SB.auth.signInWithPassword({ email, password: current });
      if (verifyErr) {
        showErr('Mot de passe actuel incorrect.');
        btn.textContent='Enregistrer le nouveau mot de passe'; btn.disabled=false;
        return;
      }

      // ── Mettre à jour via Supabase Auth ────────────────────
      btn.textContent='Enregistrement…';
      const { error } = await SB.auth.updateUser({ password: next });
      if(error) throw error;

      document.getElementById('pwd-overlay').remove();
      // Petit feedback visuel
      const flash = document.createElement('div');
      flash.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#008160;color:white;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:999;animation:fadein 0.2s';
      flash.textContent='✓ Mot de passe modifié avec succès';
      document.body.appendChild(flash);
      setTimeout(()=>flash.remove(), 3000);
    } catch(e) {
      showErr('Erreur : '+e.message);
      btn.textContent='Enregistrer le nouveau mot de passe'; btn.disabled=false;
    }
  },

  async logout() {
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
    session=null; employee=null; schedule=null; todayShift=null;
    leaveBalance=null; leaveRequests=[]; myPointage=[]; allHolidays=[];
    todayPointage=null; siteCoords=null;
    currentTab='pointage';
    setPause(null);
    await SB.auth.signOut();
    this.showLogin();
  }
};
