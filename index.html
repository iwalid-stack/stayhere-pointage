  async setOffDay(empId, date) {
    if(!date){this.renderPlanning();return;}
    setSyncStatus('busy','↻...');
    const days=this._weekDays();
    // Supprimer l'ancien OFF de la semaine pour cet employé
    for(const d of days){
      const e=DB.getPointageByEmpDate(empId,d);
      if(e&&e.type==='off') await DB.deletePointage(empId,d,currentSession);
    }
    if(date) await DB.setPointage(empId,date,'off','Jour de repos (planning)',currentSession);
    setSyncStatus('ok','● En ligne');
    this.renderPlanning();
  },

  async genererPlanning() {
    const days=this._weekDays();
    const employees=DB.getEmployees(this.currentSite).filter(e=>e.actif);
    if(!employees.length) return;
    const compteAFaire=employees.reduce((n,emp)=>n+days.filter(d=>{const isFerie=DB.isHoliday(d);const lock=DB.getLock(emp.site_id,DB.getPeriodKey(d));const exist=DB.getPointageByEmpDate(emp.id,d);return !isFerie&&!lock&&!exist;}).length,0);
    if(!confirm(`Générer le planning pour ${employees.length} collaborateurs ?\n\n${compteAFaire} cellule(s) vide(s) seront remplies avec "Présent".\nLes jours déjà saisis (Présent, Double Shift, OFF…) ne seront pas modifiés.`)) return;
    setSyncStatus('busy','↻ Génération du planning...');
    let count=0;
    for(const emp of employees) {
      for(const date of days) {
        if(DB.isHoliday(date)) continue;
        if(DB.getLock(emp.site_id,DB.getPeriodKey(date))) continue;
        const existing=DB.getPointageByEmpDate(emp.id,date); if(existing) continue;
        await DB.setPointage(emp.id,date,'travaille','Planning automatique',currentSession);
        count++;
      }
    }
    setSyncStatus('ok','● En ligne');
    this.renderPlanning();
  },

  // ---- SHIFTS ROTATIFS ----
  renderRotation() {
    if(!this._rotWeek) this._rotWeek=this._getMonday(new Date());
    const days=this._weekDays(this._rotWeek);
    const DAY_SHORT=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
    const DAY_FULL =['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
    const shiftTypes=DB.getShiftTypes().filter(s=>s.actif);
    const sites=DB.getSites().filter(s=>s.actif);
    const canEdit=this.canGererRotation();

    // Tous les employés en rotation (tous sites pour les globaux, site filtré sinon)
    const allRotEmps=DB.getEmployees().filter(e=>e.actif&&e.has_rotation&&
      (this.canGlobal()||e.site_id===this.currentSite));

    // Employés sans rotation (pour le toggle)
    const noRotEmps=DB.getEmployees().filter(e=>e.actif&&!e.has_rotation&&
      (this.canGlobal()||e.site_id===this.currentSite));

    const siteSelector=this.canGlobal()
      ?`<select onchange="App.changeSite(this.value)" style="max-width:220px">${sites.map(s=>`<option value="${s.id}" ${s.id===this.currentSite?'selected':''}>${s.nom}</option>`).join('')}</select>`
      :`<strong>${DB.getSiteById(this.currentSite)?.nom||''}</strong>`;

    // Légende shifts
    const shiftLegend=shiftTypes.map(st=>`
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;margin-right:10px">
        <span style="width:10px;height:10px;border-radius:50%;background:${st.couleur};display:inline-block"></span>
        <strong>${st.nom}</strong> ${st.heure_debut}–${st.heure_fin==='00:00'?'Minuit':st.heure_fin}
      </span>`).join('');

    // Entête colonnes jours
    const hdrCells=days.map((date,i)=>{
      const d=parseInt(date.split('-')[2]);
      const bg=i>=5?'background:#2d3748':'';
      return`<th style="${bg};min-width:110px;text-align:center">${DAY_SHORT[i]}<br><small style="opacity:0.7">${d}</small></th>`;
    }).join('');

    // Lignes par employé
    const rows=allRotEmps.map(emp=>{
      const site=DB.getSiteById(emp.site_id);
      const cells=days.map((date,i)=>{
        const entry=DB.getWeeklySchedule(emp.id,date);
        const bg=i>=5?'background:#1a202c':'';

        if(!canEdit) {
          // Lecture seule
          if(!entry||(!entry.shift_type_id&&!entry.is_off)) {
            return`<td style="text-align:center;padding:5px 4px;${bg}"><span style="color:#555;font-size:13px">—</span></td>`;
          }
          if(entry.is_off) {
            return`<td style="text-align:center;padding:5px 4px;background:#2a1a1a"><span style="color:#f87171;font-weight:700;font-size:11px">OFF</span></td>`;
          }
          const st=DB.getShiftType(entry.shift_type_id);
          return`<td style="text-align:center;padding:5px 4px;background:${st?.couleur||'#333'}22">
            <span style="color:${st?.couleur||'#ccc'};font-weight:700;font-size:11px">${st?.nom||'?'}</span>
            <div style="font-size:9px;color:${st?.couleur||'#ccc'};opacity:0.8">${st?.heure_debut||''}–${st?.heure_fin==='00:00'?'00:00':st?.heure_fin||''}</div>
          </td>`;
        }

        // Éditable : sélecteur inline
        const selOpts=`<option value="" ${!entry||(!entry.shift_type_id&&!entry.is_off)?'selected':''}>—</option>`
          +shiftTypes.map(st=>`<option value="${st.id}" ${entry?.shift_type_id===st.id&&!entry?.is_off?'selected':''}>${st.nom}</option>`).join('')
          +`<option value="off" ${entry?.is_off?'selected':''}>OFF</option>`;
        const cellBg=entry?.is_off?'background:#2a1a1a'
          :entry?.shift_type_id?`background:${DB.getShiftType(entry.shift_type_id)?.couleur||'#333'}22`
          :(i>=5?'background:#1a202c':'');
        return`<td style="padding:3px 4px;${cellBg}">
          <select style="width:100%;font-size:11px;padding:3px 4px;background:transparent;border:1px solid #334;color:inherit;border-radius:4px"
            onchange="App.setRotationCell('${emp.id}','${date}',this.value)">${selOpts}</select>
        </td>`;
      }).join('');

      return`<tr>
        <td style="min-width:170px;padding:8px 10px">
          <strong style="font-size:13px">${emp.prenom} ${emp.nom}</strong>
          <div style="font-size:10px;color:var(--text-muted)">${emp.poste}${this.canGlobal()&&site?` · ${site.nom}`:''}</div>
          ${canEdit?`<button class="btn btn-ghost" style="font-size:10px;padding:1px 6px;margin-top:3px;color:#f87171" onclick="App.toggleRotationEmp('${emp.id}')">Retirer de la rotation</button>`:''}
        </td>
        ${cells}
      </tr>`;
    }).join('');

    // Section ajout d'employé à la rotation
    const addSection=canEdit&&noRotEmps.length?`
      <div style="margin-top:20px;padding:16px;background:var(--card);border-radius:8px;border:1px solid var(--border)">
        <strong style="font-size:13px">➕ Ajouter des collaborateurs à la rotation</strong>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <select id="rot-add-emp" style="flex:1;min-width:200px;padding:6px 10px">
            <option value="">— Choisir un collaborateur —</option>
            ${noRotEmps.map(e=>{
              const s=DB.getSiteById(e.site_id);
              return`<option value="${e.id}">${e.prenom} ${e.nom} · ${e.poste}${this.canGlobal()&&s?' ('+s.nom+')':''}`;
            }).join('')}
          </select>
          <button class="btn btn-primary btn-sm" onclick="App.addToRotation()">Ajouter</button>
        </div>
      </div>`:'';

    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls" style="flex-wrap:wrap;gap:10px">
        ${siteSelector}
        <div class="date-nav">
          <button onclick="App.prevRotWeek()">‹</button>
          <span style="min-width:240px;font-size:13px">${this._fmtWeekLabel(days)}</span>
          <button onclick="App.nextRotWeek()">›</button>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="App.goRotCurrentWeek()">Cette semaine</button>
        ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="App.copyPrevRotWeek()" title="Copier le planning de la semaine précédente">📋 Copier semaine préc.</button>`:''}
      </div>
      <div style="margin:12px 0 16px;display:flex;flex-wrap:wrap;gap:4px;align-items:center">
        <span style="font-size:11px;color:var(--text-muted);margin-right:4px">Shifts :</span>
        ${shiftLegend}
        <span style="font-size:11px;color:var(--text-muted);margin-left:6px">· <strong style="color:#f87171">OFF</strong> = Repos</span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:4px">· <strong>—</strong> = Non défini (bloqué sur l'horloge)</span>
      </div>
      ${allRotEmps.length===0
        ?`<div class="alert alert-warning">Aucun collaborateur en rotation sur ce site. Ajoutez-en ci-dessous.</div>`
        :`<div class="pointage-table-wrapper">
          <table class="pointage-table">
            <thead><tr><th class="col-emp">Collaborateur</th>${hdrCells}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`}
      ${addSection}`;
  },

  prevRotWeek()       { const d=new Date(this._rotWeek+'T12:00:00');d.setDate(d.getDate()-7);this._rotWeek=d.toISOString().substring(0,10);this.renderRotation(); },
  nextRotWeek()       { const d=new Date(this._rotWeek+'T12:00:00');d.setDate(d.getDate()+7);this._rotWeek=d.toISOString().substring(0,10);this.renderRotation(); },
  goRotCurrentWeek()  { this._rotWeek=this._getMonday(new Date());this.renderRotation(); },

  async setRotationCell(empId, date, val) {
    setSyncStatus('busy','↻...');
    try {
      const emp=DB.getEmployees().find(e=>e.id===empId);
      if(!val) {
        // Effacer : supprime le planning rotatif + le pointage + le shift non démarré
        await DB.clearWeeklySchedule(empId,date);
        try { await DB.deletePointage(empId,date,currentSession); } catch(e){}
        await this._clearPlannedShift(empId,date);
      } else if(val==='off') {
        // Repos : marque OFF dans le planning rotatif, le pointage et supprime le shift non démarré
        await DB.setWeeklySchedule(empId,date,null,true);
        try { await DB.setPointage(empId,date,'off','Repos (rotation)',currentSession,emp?.site_id); } catch(e){}
        await this._clearPlannedShift(empId,date);
      } else {
        // Shift type : sync sh_weekly_schedule + sh_shifts (horaires prévus) + sh_pointage (travaillé)
        await DB.setWeeklySchedule(empId,date,val,false);
        try { await DB.setPointage(empId,date,'travaille','Shift rotatif planifié',currentSession,emp?.site_id); } catch(e){}
        await this._upsertRotationShift(empId,date,val,emp);
      }
      setSyncStatus('ok','● En ligne');
    } catch(e) {
      setSyncStatus('error','⚠ Erreur');
      alert('Erreur : '+e.message);
    }
    this.renderRotation();
  },

  async toggleRotationEmp(empId) {
    const emp=DB.getEmployees().find(e=>e.id===empId);
    if(!emp||!confirm(`Retirer ${emp.prenom} ${emp.nom} de la rotation ? Les plannings existants sont conservés.`)) return;
    await DB.toggleRotation(empId);
    this.renderRotation();
  },

  async addToRotation() {
    const empId=document.getElementById('rot-add-emp')?.value;
    if(!empId) return;
    await DB.toggleRotation(empId);
    this.renderRotation();
  },

  async copyPrevRotWeek() {
    const days=this._weekDays(this._rotWeek);
    const prevDays=days.map(d=>{const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()-7);return dt.toISOString().substring(0,10);});
    const rotEmps=DB.getEmployees().filter(e=>e.actif&&e.has_rotation&&(this.canGlobal()||e.site_id===this.currentSite));
    if(!rotEmps.length){alert('Aucun collaborateur en rotation.');return;}
    let copied=0,skipped=0;
    setSyncStatus('busy','↻ Copie...');
    for(const emp of rotEmps){
      for(let i=0;i<7;i++){
        const targetDate=days[i];
        const sourceDate=prevDays[i];
        if(DB.getWeeklySchedule(emp.id,targetDate)) {skipped++;continue;}
        const prev=DB.getWeeklySchedule(emp.id,sourceDate);
        if(!prev) continue;
        await DB.setWeeklySchedule(emp.id,targetDate,prev.shift_type_id,prev.is_off||false);
        // Sync sh_shifts + sh_pointage
        if(prev.is_off) {
          try { await DB.setPointage(emp.id,targetDate,'off','Repos (rotation)',currentSession,emp.site_id); } catch(e){}
          await this._clearPlannedShift(emp.id,targetDate);
        } else if(prev.shift_type_id) {
          try { await DB.setPointage(emp.id,targetDate,'travaille','Shift rotatif planifié',currentSession,emp.site_id); } catch(e){}
          await this._upsertRotationShift(emp.id,targetDate,prev.shift_type_id,emp);
        }
        copied++;
      }
    }
    setSyncStatus('ok','● En ligne');
    alert(`${copied} cellule(s) copiée(s). ${skipped} déjà renseignée(s), conservées.`);
    this.renderRotation();
  },

        <button class="btn btn-secondary btn-sm" onclick="App.exportSyntheseParSociete('BeInterim')" title="Synthèse BeInterim">⬇ BeInterim</button>

      ${view==='site'

        content+=`<div class="card"><div class="card-header"><div class="card-title">🏠 ${site.nom}</div><button class="btn btn-ghost btn-sm" onclick="App.exportSiteCSV('${site.id}')">⬇ Export</button></div>
          <div class="table-wrapper"><table class="synth-table"><thead><tr><th>Collaborateur</th><th>Affectation</th>${TYPES.map(t=>`<th style="background:var(--${t.key});color:white" title="${t.label}">${t.short}</th>`).join('')}</tr></thead>
          <tbody>
            ${emps.map(({emp,totals:t})=>`<tr onclick="App.openCollabDetail('${emp.id}')" style="cursor:pointer" title="Voir le détail">

              ${TYPES.map(type=>`<td class="num" style="color:var(--${type.key})">${t[type.key]||''}</td>`).join('')}

    document.getElementById('page-content').innerHTML=controls+(content||'<div class="alert alert-info">Aucune donnée pour cette période.</div>');
    // Remettre focus sur la recherche si active
    if(view==='collab'&&this._synthSearch){const el=document.getElementById('synth-search');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}}

  _rerenderSyntheseCollab(){
    const container=document.getElementById('synth-collab-container');
    if(!container){this.renderSynthese();return;}
    const siteFilter=this.canGlobal()?null:this.currentSite;
    container.innerHTML=this._buildCollabSyntheseHTML(siteFilter);
  },

  _buildCollabSyntheseHTML(siteFilter){
    const all=DB.getSyntheseByCollab(this.currentYear,this.currentMonth+1,siteFilter);
    const q=(this._synthSearch||'').toLowerCase().trim();
    const data=q?all.filter(({emp})=>`${emp.prenom} ${emp.nom} ${emp.imm||''} ${emp.poste} ${emp.affectation||''}`.toLowerCase().includes(q)):all;
    if(!data.length) return '<div class="alert alert-info">Aucune entrée pour cette période'+(q?` correspondant à "${this._synthSearch}"`:'')+`.</div>`;

    // Ne montrer que les types qui ont au moins 1 occurrence dans la vue actuelle
    const activeTypes=TYPES.filter(t=>data.some(({totals})=>(totals[t.key]||0)>0));

    const rows=data.map(({emp,totals,sites})=>{
      const total=TYPES.reduce((s,t)=>s+(totals[t.key]||0),0);
      const siteBadges=sites.map(sid=>{
        const s=DB.getSiteById(sid);
        return`<span style="font-size:10px;background:#e3f2fd;color:#01579b;border-radius:4px;padding:1px 6px;margin:1px;display:inline-block">${s?.nom||sid}</span>`;
      }).join('');
      return`<tr onclick="App.openCollabDetail('${emp.id}')" style="cursor:pointer" title="Voir le détail jour par jour">
        <td class="text-muted text-sm">${emp.imm||'—'}</td>
        <td><strong>${emp.prenom} ${emp.nom}</strong><div style="font-size:10px;color:var(--text-muted)">${emp.poste}${emp.affectation?` · ${emp.affectation}`:''}</div></td>
        <td>${siteBadges||'—'}</td>
        ${activeTypes.map(t=>`<td class="num" style="color:var(--${t.key})">${totals[t.key]||''}</td>`).join('')}
        <td class="num"><strong>${total||''}</strong></td>
        <td onclick="event.stopPropagation()"><button class="btn btn-ghost btn-xs" onclick="App.exportCollabCSV('${emp.id}')">⬇</button></td>
      </tr>`;
    }).join('');

    const grandTotals=activeTypes.map(t=>data.reduce((s,{totals})=>s+(totals[t.key]||0),0));
    const grandTotal=data.reduce(({totals:prev},{totals})=>({totals:Object.fromEntries(TYPES.map(t=>[t.key,(prev[t.key]||0)+(totals[t.key]||0)]))}),{totals:Object.fromEntries(TYPES.map(t=>[t.key,0]))}).totals;
    const grandTotalAll=TYPES.reduce((s,t)=>s+(grandTotal[t.key]||0),0);

    return`<div class="card" style="padding:0;overflow:hidden">
      <div class="card-header">
        <div class="card-title">👤 ${data.length} collaborateur${data.length>1?'s':''}</div>
        <button class="btn btn-ghost btn-sm" onclick="App.exportAllCollabCSV()">⬇ Tout exporter</button>
      </div>
      <div class="table-wrapper"><table class="synth-table">
        <thead><tr>
          <th>IMM</th><th>Collaborateur</th><th>Sites</th>
          ${activeTypes.map(t=>`<th style="background:var(--${t.key});color:white" title="${t.label}">${t.short}</th>`).join('')}
          <th>Total</th><th></th>
        </tr></thead>
        <tbody>
          ${rows}
          <tr style="font-weight:700;background:var(--bg)">
            <td colspan="3">TOTAL</td>
            ${grandTotals.map(n=>`<td class="num">${n||''}</td>`).join('')}
            <td class="num">${grandTotalAll||''}</td><td></td>
          </tr>
        </tbody>
      </table></div>
    </div>`;
  },

  openCollabDetail(empId){
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const year=this.currentYear; const month=this.currentMonth+1;
    const entries=DB.getPointage(null,year,month).filter(p=>p.employee_id===empId).sort((a,b)=>a.date.localeCompare(b.date));
    const byType={};
    TYPES.forEach(t=>{const cnt=entries.filter(p=>p.type===t.key).length;if(cnt)byType[t.key]={short:t.short,cnt};});
    const pills=Object.values(byType).map(({short,cnt})=>`<span class="badge" style="margin:2px">${short} : <strong>${cnt}</strong></span>`).join('');
    const rows=entries.map(p=>{
      const site=DB.getSiteById(p.site_id);
      const type=TYPES.find(t=>t.key===p.type);
      return`<tr>
        <td>${p.date}</td>
        <td><span style="font-size:11px;background:#e3f2fd;color:#01579b;border-radius:4px;padding:2px 6px">${site?.nom||p.site_id}</span></td>
        <td><span class="badge badge-${p.type}">${type?.label||p.type}</span></td>
        <td class="text-muted text-sm" style="max-width:200px;white-space:normal">${p.notes||'—'}</td>
        <td><span class="badge ${p.validated?'badge-success':'badge-warning'}" style="font-size:10px">${p.validated?'✓ Validé':'En attente'}</span></td>
      </tr>`;
    }).join('');
    this.showModal(`
      <div class="modal-header">
        <div class="modal-title">📋 ${emp.prenom} ${emp.nom} — ${fmtPeriod(year,month-1)}</div>
        <button class="modal-close" onclick="App.closeModal()">✕</button>
      </div>
      <p class="text-muted text-sm" style="margin-bottom:10px">${emp.poste}${emp.affectation?` · ${emp.affectation}`:''} · Site habituel : ${DB.getSiteById(emp.site_id)?.nom||'?'}</p>
      <div style="margin-bottom:14px">${pills||'<span class="text-muted text-sm">Aucune entrée ce mois.</span>'}</div>
      ${rows?`<div class="table-wrapper" style="max-height:400px;overflow-y:auto"><table class="data-table">
        <thead><tr><th>Date</th><th>Site</th><th>Type</th><th>Notes</th><th>Statut</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`:'<div class="alert alert-info">Aucune entrée pour ce mois.</div>'}
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="App.closeModal()">Fermer</button>
        <button class="btn btn-ghost" onclick="App.exportCollabCSV('${empId}')">⬇ Exporter CSV</button>
      </div>`);
  },

  exportCollabCSV(empId){
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const year=this.currentYear; const month=this.currentMonth+1;
    const entries=DB.getPointage(null,year,month).filter(p=>p.employee_id===empId).sort((a,b)=>a.date.localeCompare(b.date));
    let csv='N° IMM;Nom;Prénom;Poste;Affectation;Site;Date;Code;Notes;Saisi par;Validé\n';
    entries.forEach(p=>{
      const site=DB.getSiteById(p.site_id);
      csv+=`"${emp.imm||''}";"${emp.nom}";"${emp.prenom}";"${emp.poste}";"${emp.affectation||''}";"${site?.nom||p.site_id}";"${p.date}";"${TYPE_CODES[p.type]||p.type}";"${p.notes||''}";"${p.created_by}";"${p.validated?'Oui':'Non'}"\n`;
    });
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download=`pointage_${emp.nom}_${emp.prenom}_${year}-${String(month).padStart(2,'0')}.csv`;
    a.click();
  },

  exportAllCollabCSV(){
    const siteFilter=this.canGlobal()?null:this.currentSite;
    const data=DB.getSyntheseByCollab(this.currentYear,this.currentMonth+1,siteFilter);
    data.forEach(({emp})=>this.exportCollabCSV(emp.id));
  },

  exportSiteCSV(id){const csv=DB.exportCSV(id,this.currentYear,this.currentMonth+1);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download=`pointage_${id}_${this.currentYear}-${String(this.currentMonth+1).padStart(2,'0')}.csv`;a.click();},
  exportAllCSV(){DB.getSites().filter(s=>s.actif).forEach(s=>this.exportSiteCSV(s.id));},

  // ---- VALIDATION ----
  renderValidation(){
    const entries=DB.getPointage(this.canGlobal()?null:this.currentSite,this.currentYear,this.currentMonth+1).filter(p=>!p.validated);
    const sites=DB.getSites(); const emps=DB.getEmployees();
    const rows=entries.map(p=>{const emp=emps.find(e=>e.id===p.employee_id);const site=sites.find(s=>s.id===p.site_id);const type=TYPES.find(t=>t.key===p.type);
      return`<tr><td>${site?.nom||p.site_id}</td><td>${emp?emp.prenom+' '+emp.nom:'—'}</td><td class="text-muted text-sm">${emp?.affectation||emp?.poste||'—'}</td><td>${p.date}</td><td><span class="badge badge-${p.type}">${type?.label||p.type}</span></td><td class="text-muted text-sm">${p.notes||'—'}</td><td class="text-muted text-sm">${p.created_by}</td><td><button class="btn btn-success btn-xs" onclick="App.validateEntry('${p.id}')">✓</button></td></tr>`;
    }).join('');
    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls">
        <div class="month-nav"><button onclick="App.prevMonth();App.renderValidation()">‹</button><span>${fmtPeriod(this.currentYear,this.currentMonth)}</span><button onclick="App.nextMonth();App.renderValidation()">›</button></div>
        ${entries.length?`<button class="btn btn-success btn-sm" onclick="App.validateAll()">✓ Tout valider</button>`:''}
      </div>
      ${!entries.length?'<div class="alert alert-success">✓ Toutes les entrées sont validées.</div>':''}
      ${rows?`<div class="card"><div class="table-wrapper"><table class="data-table"><thead><tr><th>Site</th><th>Collaborateur</th><th>Affectation</th><th>Date</th><th>Type</th><th>Notes</th><th>Saisi par</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`:''}`;
  },
  async validateEntry(id){setSyncStatus('busy','↻...');await DB.validateEntry(id,currentSession);setSyncStatus('ok','● En ligne');this.renderValidation();},
  async validateAll(){
    if(!confirm('Valider toutes les entrées ?'))return;
    setSyncStatus('busy','↻ Validation...');
    const entries=DB.getPointage(null,this.currentYear,this.currentMonth+1).filter(p=>!p.validated);
    for(const p of entries) await DB.validateEntry(p.id,currentSession);
    setSyncStatus('ok','● En ligne'); this.renderValidation();
  },

  // ---- COLLABORATEURS ----
  _collabSearch: '',
  _collabFilterPoste: '',
  _collabFilterSociete: '',
  renderCollaborateurs(search){
    if(search!==undefined) this._collabSearch=search;
    const q=(this._collabSearch||'').toLowerCase().trim();
    const fPoste=this._collabFilterPoste||'';
    const fSociete=this._collabFilterSociete||'';
    const extra=document.getElementById('topbar-extra');
    if(extra) extra.innerHTML=`
      ${this.canGlobal()?`<button class="btn btn-danger btn-sm" onclick="App.openPurgeUsers()" style="background:rgba(217,48,37,0.12);color:var(--danger);border:1px solid rgba(217,48,37,0.3)">🗑 Vider la liste</button>`:''}
      <button class="btn btn-secondary btn-sm" onclick="App.importExcel()">📥 Importer Excel</button>
      <button class="btn btn-primary btn-sm" onclick="App.openAddEmployee()">+ Nouveau</button>`;
    const all=DB.getEmployees().filter(e=>e.actif);
    const postes=[...new Set(all.map(e=>e.poste).filter(Boolean))].sort();
    const societes=['StayHere','Syndic Foncier','BeInterim'];
    const filtered=all.filter(e=>{
      const site=DB.getSiteById(e.site_id);
      const matchQ=!q||`${e.prenom} ${e.nom} ${e.nom} ${e.prenom} ${e.imm||''} ${e.poste} ${e.affectation||''} ${site?.nom||''}`.toLowerCase().includes(q);
      const matchPoste=!fPoste||e.poste===fPoste;
      const matchSociete=!fSociete||e.societe===fSociete;
      return matchQ&&matchPoste&&matchSociete;
    });
    const rows=filtered.map(emp=>{
      const site=DB.getSiteById(emp.site_id);
      const sched=DB.getSchedule(emp.id);
      const schedStr=sched?`<span class="schedule-badge" style="font-size:12px">${sched.heure_debut}–${sched.heure_fin}</span>`:`<span style="color:#f57c00;font-size:11px">Non configuré</span>`;
      const cp=DB.calcCP(emp.id); const recup=DB.calcRECUP(emp.id);
      const balBadge=`<span class="lp-cp leave-type-pill" style="font-size:10px">CP ${cp.solde}j</span> <span class="lp-recup leave-type-pill" style="font-size:10px">R ${recup.solde}j</span>`;
      // Affectation temporaire
      const activeTemp=DB.getActiveTempAssignment(emp.id, todayStr());
      const siteCell=activeTemp
        ?`${site?.nom||'?'} <span style="font-size:10px;background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:4px;padding:1px 5px">🔄 → ${DB.getSiteById(activeTemp.site_id_temp)?.nom||'?'} jusqu'au ${activeTemp.date_fin}</span>`
        :(site?.nom||emp.site_id);
      const tempBtn=this.canManage()
        ?(activeTemp
          ?`<button class="btn btn-ghost btn-xs" onclick="App.endTempAssignmentUI('${activeTemp.id}','${emp.prenom} ${emp.nom}')" title="Terminer l'affectation temporaire">⛔ Fin détachement</button>`
          :`<button class="btn btn-ghost btn-xs" onclick="App.openTempAssignment('${emp.id}')" title="Affecter temporairement à un autre site">🔄 Détacher</button>`)
        :'';
      const societeBadge=emp.societe?`<span style="font-size:10px;background:#e8f0fe;color:#1a73e8;border:1px solid #c5d8fb;border-radius:4px;padding:1px 6px;white-space:nowrap">${emp.societe}</span>`:'';
      return`<tr><td class="text-muted text-sm">${emp.imm||'—'}</td><td><strong>${emp.prenom} ${emp.nom}</strong>${societeBadge?'<br>'+societeBadge:''}</td><td>${emp.poste}</td><td>${siteCell}</td><td class="text-muted text-sm">${emp.affectation||'—'}</td><td>${schedStr}</td><td>${balBadge}</td><td style="white-space:nowrap"><button class="btn btn-ghost btn-xs" onclick="App.openEditEmployee('${emp.id}')">Modifier</button> ${tempBtn} ${this.canManage()?`<button class="btn btn-ghost btn-xs" onclick="App.congesEditBalance('${emp.id}')" title="Saisir soldes CP/RECUP">💰 Soldes</button> `:''}${this.canManage()?`<button class="btn btn-danger btn-xs" onclick="App.deleteEmployee('${emp.id}')">Désactiver</button>`:''}</td></tr>`;
    }).join('');
    const hasFilter=q||fPoste||fSociete;
    const countLabel=`<span class="text-muted text-sm">${filtered.length}${hasFilter?' / '+all.length:''} collaborateur${filtered.length>1?'s':''}</span>`;
    const resetBtn=hasFilter?`<button class="btn btn-ghost btn-sm" onclick="App._collabSearch='';App._collabFilterPoste='';App._collabFilterSociete='';App.renderCollaborateurs()">✕ Réinitialiser</button>`:'';
    document.getElementById('page-content').innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <div style="position:relative;flex:1;min-width:180px;max-width:320px">
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px">🔍</span>
          <input id="collab-search" type="search" placeholder="Nom, IMM, site…"
            value="${this._collabSearch}"
            oninput="App.renderCollaborateurs(this.value)"
            style="width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface)">
        </div>
        <select onchange="App._collabFilterPoste=this.value;App.renderCollaborateurs()" style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text)">
          <option value="">— Tous les postes —</option>
          ${postes.map(p=>`<option value="${p}" ${p===fPoste?'selected':''}>${p}</option>`).join('')}
        </select>
        <select onchange="App._collabFilterSociete=this.value;App.renderCollaborateurs()" style="padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text)">
          <option value="">— Toutes les sociétés —</option>
          ${societes.map(s=>`<option value="${s}" ${s===fSociete?'selected':''}>${s}</option>`).join('')}
        </select>
        ${countLabel}${resetBtn}
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div class="table-wrapper"><table class="data-table">
          <thead><tr><th>N° IMM</th><th>Nom</th><th>Poste</th><th>Site</th><th>Affectation</th><th>Planning shift</th><th>Soldes</th><th>Actions</th></tr></thead>
          <tbody>${rows||`<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text-muted)">${q?'Aucun résultat pour "'+q+'"':'Aucun collaborateur.'}</td></tr>`}</tbody>
        </table></div>
      </div>`;
    // Remettre le focus sur la barre de recherche si elle était active
    if(q) { const el=document.getElementById('collab-search'); if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);} }
  },

  // ---- IMPORT EXCEL ----
  _importData: [],

  // Nettoie une chaîne pour créer un identifiant
  _toSlug(str) {
    if(!str) return '';
    return str.trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-z0-9]/g,'.')
      .replace(/\.+/g,'.').replace(/^\.|\.$/g,'');
  },

  // Génère un identifiant unique
  _genUsername(prenom, nom) {
    const base = this._toSlug(prenom).charAt(0) + '.' + this._toSlug(nom);
    const existing = DB.getUsers().map(u=>u.username);
    if(!existing.includes(base)) return base;
    for(let i=2;i<99;i++) { const t=base+i; if(!existing.includes(t)) return t; }
    return base + Date.now();
  },

  // Génère un mot de passe simple
  _genPassword(imm, prenom) {
    const digits = (imm||'').replace(/\D/g,'').slice(-3).padStart(3,'0');
    if(digits!=='000') return 'sh' + digits;
    const slug = this._toSlug(prenom||'').slice(0,4).padEnd(3,'x');
    return slug + Math.floor(100+Math.random()*900);
  },

  processImport(file) {
    if(!file) return;
    if(typeof XLSX==='undefined'){alert('Bibliothèque Excel non chargée. Vérifiez votre connexion internet.');return;}
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array'});
        // Mapping feuille → site
        const SHEET_SITE = {
          'CASABLANCA':'site_casa','CASA':'site_casa',
          'RABAT':'site_rabat',
          'AGADIR':'site_agadir',
          'OFFICE':'site_office','SIEGE':'site_office'
        };
        const defaultSite = document.getElementById('import-default-site')?.value;
        const allRows = [];

        wb.SheetNames.forEach(sheetName => {
          const upper = sheetName.toUpperCase();
          // Ignorer les feuilles non-employés
          if(['CODE COULEUR','AFFECTATION','DOUBLES SHIFT','HS','SUMMARY'].some(x=>upper.includes(x))) return;
          const siteId = SHEET_SITE[upper] || defaultSite;
          const ws = wb.Sheets[sheetName];
          const json = XLSX.utils.sheet_to_json(ws, {defval:''});
          json.forEach(row => {
            // Détection flexible des colonnes
            const nom = (row['NOM']||row['Nom']||row['nom']||'').toString().trim();
            const prenom = (row['PRENOM']||row['Prénom']||row['PRÉNOM']||row['prenom']||'').toString().trim();
            if(!nom||!prenom||nom.toUpperCase()===nom&&nom.length<2) return; // skip headers/empty
            const imm = (row['N° IMM']||row['IMM']||row['N°IMM']||row['Num']||'').toString().trim();
            const poste = (row['POSITION']||row['POSTE']||row['Poste']||row['Position']||'').toString().trim();
            const affectation = (row['AFFECTATION']||row['Affectation']||'').toString().trim();
            const role = (row['ROLE']||row['Role']||row['role']||'collaborateur').toString().trim()||'collaborateur';
            const accesHorloge = String(row['ACCES_HORLOGE']||row['acces_horloge']||'').toLowerCase() !== 'false';

            // ── Détection du site : colonne SITE > onglet > défaut ──
            const siteColRaw = (row['SITE']||row['Site']||row['site']||'').toString().trim();
            let rowSiteId = siteId; // fallback : onglet ou défaut
            if(siteColRaw) {
              // Chercher par nom : exact d'abord, puis partiel (DB contient la valeur Excel)
              const allSites = DB.getSites();
              const siteColLower = siteColRaw.toLowerCase();
              const match =
                allSites.find(s => s.nom?.toLowerCase() === siteColLower) ||
                allSites.find(s => s.nom?.toLowerCase().includes(siteColLower));
              if(match) rowSiteId = match.id;
            }

            allRows.push({nom, prenom, imm, poste, affectation, role, accesHorloge, siteId: rowSiteId, sheetName});
          });
        });

        if(allRows.length===0){
          document.getElementById('import-preview').innerHTML='<div class="alert alert-danger">Aucun collaborateur détecté. Vérifiez que le fichier contient des colonnes NOM et PRENOM.</div>';
          return;
        }

        // Générer identifiants et mots de passe
        const usedUsernames = new Set(DB.getUsers().map(u=>u.username));
        const processed = allRows.map(row => {
          let base = this._toSlug(row.prenom).charAt(0)+'.'+this._toSlug(row.nom);
          let username = base;
          let n=2; while(usedUsernames.has(username)){username=base+n;n++;}
          usedUsernames.add(username);
          const password = this._genPassword(row.imm, row.prenom);
          const site = DB.getSiteById(row.siteId);
          return {...row, username, password, siteName:site?.nom||row.siteId};
        });

        this._importData = processed;

        const rows = processed.map((r,i)=>`<tr>
          <td>${r.prenom} ${r.nom}</td>
          <td class="text-muted" style="font-size:11px">${r.imm||'—'}</td>
          <td class="text-muted" style="font-size:11px">${r.poste||'—'}</td>
          <td class="text-muted" style="font-size:11px">${r.affectation||'—'}</td>
          <td class="text-muted" style="font-size:11px">${r.siteName||'—'}</td>
          <td class="text-muted" style="font-size:11px">${r.role||'collaborateur'}</td>
          <td><span class="cred-user">${r.username}</span></td>
          <td><span class="cred-pass">${r.password}</span></td>
        </tr>`).join('');

        document.getElementById('import-preview').innerHTML=`
          <div class="alert alert-success">✓ <strong>${processed.length} collaborateurs</strong> détectés — identifiants et mots de passe générés automatiquement.</div>
          <div style="overflow-x:auto"><table class="import-table">
            <thead><tr><th>Nom complet</th><th>N° IMM</th><th>Poste</th><th>Affectation</th><th>Site</th><th>Rôle</th><th>Identifiant</th><th>Mot de passe</th></tr></thead>
            <tbody>${rows}</tbody>
          </table></div>`;

        document.getElementById('import-actions').innerHTML=`
          <button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button>
          <button class="btn btn-ghost btn-sm" onclick="App.exportCredentialsPreview()">⬇ Télécharger les accès</button>
          <button class="btn btn-primary" onclick="App.confirmImport()">✓ Importer ${processed.length} collaborateurs</button>`;
      } catch(err) {
        document.getElementById('import-preview').innerHTML=`<div class="alert alert-danger">Erreur de lecture : ${err.message}</div>`;
      }
    };
    reader.readAsArrayBuffer(file);
  },

  exportCredentialsPreview() {
    if(!this._importData.length) return;
    let csv='Prénom;Nom;N° IMM;Poste;Site;Affectation;Identifiant;Mot de passe\n';
    this._importData.forEach(r=>{
      csv+=`"${r.prenom}";"${r.nom}";"${r.imm||''}";"${r.poste||''}";"${r.siteName}";"${r.affectation||''}";"${r.username}";"${r.password}"\n`;
    });
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download=`stayhere_acces_collaborateurs_${new Date().toISOString().substring(0,10)}.csv`;
    a.click();

  async confirmImport() {
    const data = this._importData;
    if(!data.length) return;
    setSyncStatus('busy','↻ Import en cours...');
    document.getElementById('import-actions').innerHTML=`<div class="alert alert-warning" style="margin:0;flex:1">⏳ Import en cours... ne fermez pas cette fenêtre.</div>`;

    // Ajouter les nouvelles affectations dans sh_affectations
    const newAffectations = [...new Set(data.map(r=>r.affectation).filter(Boolean))];
    for(const aff of newAffectations) {
      if(aff && !DB.getAffectations().includes(aff)) {
        try { await DB.addAffectation(aff); } catch(e) { /* ignore doublon */ }
      }
    }

    let created=0, errors=0;
    for(const r of data) {
      try {
        // Vérifier que l'employé n'existe pas déjà
        const exists = Cache.employees.find(e=>
          e.nom.toLowerCase()===r.nom.toLowerCase()&&
          e.prenom.toLowerCase()===r.prenom.toLowerCase()&&
          e.site_id===r.siteId);
        let empId;
        if(!exists) {
          const emp={imm:r.imm,prenom:r.prenom,nom:r.nom,poste:r.poste||'Kindness Host',site_id:r.siteId,affectation:r.affectation||''};
          await DB.addEmployee(emp); empId=emp.id; created++;
        } else { empId=exists.id; }
        // Créer le compte utilisateur si pas déjà existant (sh_users legacy + sh_user_profiles via auto-migrate au 1er login)
        if(!DB.getUsers().find(u=>u.username===r.username)) {
          const hash=await sha256(r.password);
          const role = r.role||'collaborateur';
          const accesHorloge = r.accesHorloge !== false;
          const accesPrincipal = !['collaborateur'].includes(role);
          await DB.addUser({username:r.username,nom:r.prenom+' '+r.nom,password:r.password,password_hash:hash,role,site_id:r.siteId,employee_id:empId,acces_horloge:accesHorloge,acces_principal:accesPrincipal});
        }
      } catch(e) { errors++; console.error(e); }
    }

    setSyncStatus('ok','● En ligne');
    // Télécharger automatiquement le fichier des accès
    this.exportCredentialsPreview();

    document.getElementById('import-actions').innerHTML=`
      <div class="alert alert-success" style="margin:0;flex:1">✓ <strong>${created} collaborateurs</strong> importés. ${errors>0?`<span style="color:var(--danger)">${errors} erreurs.</span>`:''} Le fichier des accès a été téléchargé automatiquement.</div>
      <button class="btn btn-primary" onclick="App.closeModal();App.renderCollaborateurs()">Fermer</button>`;
    this._importData=[];
  },

      <p class="text-muted text-sm" style="margin-bottom:14px">Site habituel : <strong>${DB.getSiteById(emp.site_id)?.nom||emp.site_id}</strong></p>
      <div class="form-group">
        <label>Site de détachement</label>
        <select id="temp-site">
          <option value="">— Choisir un site —</option>

        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label>Du</label><input id="temp-debut" type="date" value="${today}"></div>
        <div class="form-group"><label>Au</label><input id="temp-fin" type="date" value="${today}"></div>
      </div>
      <div class="form-group">
        <label>Motif (facultatif)</label>
        <input id="temp-reason" type="text" placeholder="Ex: Remplacement congé, Renfort événement…">
      </div>
      ${histHtml}
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="App.saveTempAssignment('${empId}')">✓ Créer le détachement</button>
      </div>`);
  },

  async saveTempAssignment(empId) {
    const siteId=document.getElementById('temp-site').value;
    const debut=document.getElementById('temp-debut').value;
    const fin=document.getElementById('temp-fin').value;
    const reason=document.getElementById('temp-reason').value.trim();
    if(!siteId){alert('Veuillez choisir un site de détachement.');return;}
    if(!debut||!fin){alert('Les dates sont requises.');return;}
    if(fin<debut){alert('La date de fin doit être après la date de début.');return;}
    setSyncStatus('busy','↻...');
    await DB.addTempAssignment(empId,siteId,debut,fin,reason,currentSession);
    setSyncStatus('ok','● En ligne');
    this.closeModal();
    this.renderCollaborateurs();
  },

  async endTempAssignmentUI(id, empName) {
    if(!confirm(`Terminer le détachement de ${empName} maintenant ?`)) return;
    setSyncStatus('busy','↻...');
    await DB.endTempAssignment(id, currentSession);
    setSyncStatus('ok','● En ligne');
    this.renderCollaborateurs();
  },

  // ---- SITES ----

    const extra=document.getElementById('topbar-extra');

    document.getElementById('page-content').innerHTML=`<div class="card"><div class="table-wrapper"><table class="data-table"><thead><tr><th>Nom / GPS</th><th>Ville</th><th>Statut</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  },

  _siteFormHTML(s){
    return`
      <div class="form-group"><label>Nom du site</label><input id="site-nom" type="text" value="${s?.nom||''}" placeholder="Ex: Casablanca — Centre"></div>
      <div class="form-group"><label>Ville</label><input id="site-ville" type="text" value="${s?.ville||''}"></div>
      <div style="border-top:1px solid var(--border);margin:16px 0 12px;padding-top:14px">
        <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">📍 Géolocalisation (anti-fraude pointage)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div class="form-group" style="margin:0"><label>Latitude</label><input id="site-lat" type="number" step="any" value="${s?.latitude||''}" placeholder="ex: 33.5731"></div>
          <div class="form-group" style="margin:0"><label>Longitude</label><input id="site-lng" type="number" step="any" value="${s?.longitude||''}" placeholder="ex: -7.5898"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end">
          <div class="form-group" style="margin:0"><label>Rayon (mètres)</label><input id="site-radius" type="number" min="10" max="500" value="${s?.geofence_radius||50}" placeholder="50"></div>
          <button id="btn-capture-gps" class="btn btn-secondary" type="button" onclick="App._captureSiteGPS()" style="margin-bottom:0">📍 Ma position actuelle</button>
        </div>
        <div id="gps-feedback" style="font-size:12px;margin-top:8px;color:var(--text-muted)"></div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px;line-height:1.5">Si aucune coordonnée n'est définie, le pointage est autorisé sans restriction géographique.</div>

  openAddSite(){
    this.showModal(`
      <div class="modal-header"><div class="modal-title">Nouveau site</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
      ${this._siteFormHTML(null)}
      <div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.saveSite()">Créer le site</button></div>`);
  },

  openEditSite(id){
    const s=DB.getSiteById(id);
    if(!s)return;
    this.showModal(`
      <div class="modal-header"><div class="modal-title">Modifier le site</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
      ${this._siteFormHTML(s)}
      <div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.saveEditSite('${id}')">Enregistrer</button></div>`);
  },

  _captureSiteGPS(){
    const fb=document.getElementById('gps-feedback');
    const btn=document.getElementById('btn-capture-gps');
    if(!navigator.geolocation){if(fb)fb.textContent='Géolocalisation non disponible sur cet appareil.';return;}
    if(btn){btn.disabled=true;btn.textContent='⏳ Localisation...';}
    if(fb){fb.textContent='Récupération des coordonnées GPS…';fb.style.color='var(--text-muted)';}
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const lat=pos.coords.latitude.toFixed(6);
        const lng=pos.coords.longitude.toFixed(6);
        const acc=Math.round(pos.coords.accuracy);
        const latEl=document.getElementById('site-lat');
        const lngEl=document.getElementById('site-lng');
        if(latEl)latEl.value=lat;
        if(lngEl)lngEl.value=lng;
        if(btn){btn.disabled=false;btn.textContent='📍 Ma position actuelle';}
        if(fb){fb.textContent=`✓ Position capturée : ${lat}, ${lng} (précision ±${acc}m)`;fb.style.color='var(--success)';}
      },
      (err)=>{
        if(btn){btn.disabled=false;btn.textContent='📍 Ma position actuelle';}
        let msg='Impossible d\'obtenir la position.';
        if(err.code===1)msg='Accès à la géolocalisation refusé dans les paramètres du navigateur.';
        else if(err.code===2)msg='Signal GPS indisponible. Essayez depuis le site physique.';
        else if(err.code===3)msg='Délai dépassé. Réessayez.';
        if(fb){fb.textContent=msg;fb.style.color='var(--danger)';}
      },
      {enableHighAccuracy:true,timeout:12000,maximumAge:0}
    );
  },

  async saveSite(){
    const nom=document.getElementById('site-nom').value.trim();
    const ville=document.getElementById('site-ville').value.trim();
    if(!nom||!ville){alert('Le nom et la ville sont requis.');return;}
    const lat=document.getElementById('site-lat').value.trim();
    const lng=document.getElementById('site-lng').value.trim();
    const radius=parseInt(document.getElementById('site-radius').value)||50;
    const s={nom,ville,geofence_radius:radius};
    if(lat&&lng){s.latitude=parseFloat(lat);s.longitude=parseFloat(lng);}
    await DB.addSite(s);
    this.closeModal();this.renderSites();
  },

  async saveEditSite(id){
    const nom=document.getElementById('site-nom').value.trim();
    const ville=document.getElementById('site-ville').value.trim();
    if(!nom||!ville){alert('Le nom et la ville sont requis.');return;}
    const lat=document.getElementById('site-lat').value.trim();
    const lng=document.getElementById('site-lng').value.trim();
    const radius=parseInt(document.getElementById('site-radius').value)||50;
    const upd={nom,ville,geofence_radius:radius,latitude:lat?parseFloat(lat):null,longitude:lng?parseFloat(lng):null};
    await DB.updateSite(id,upd);
    this.closeModal();this.renderSites();
  },

  async toggleSite(id,actif){await DB.updateSite(id,{actif});this.renderSites();},

  // ---- FERIES ----
  renderFeries(){

    document.getElementById('page-content').innerHTML=`<div class="card"><div class="table-wrapper"><table class="data-table"><thead><tr><th>Date</th><th>Nom</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;

  openAddHoliday(){this.showModal(`<div class="modal-header"><div class="modal-title">Jour férié</div><button class="modal-close" onclick="App.closeModal()">✕</button></div><div class="form-group"><label>Date</label><input id="h-date" type="date"></div><div class="form-group"><label>Nom</label><input id="h-nom" type="text"></div><div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.saveHoliday()">Ajouter</button></div>`);},
  async saveHoliday(){const date=document.getElementById('h-date').value;const nom=document.getElementById('h-nom').value.trim();if(!date||!nom){alert('Requis.');return;}await DB.addHoliday(date,nom);this.closeModal();this.renderFeries();},
  async deleteHoliday(date){if(!confirm('Supprimer ?'))return;await DB.removeHoliday(date);this.renderFeries();},

  // ---- UTILISATEURS ----
  _userSearch: '',
  _userLoginFilter: null, // null=tous | 'connected' | 'never'
  renderUtilisateurs(search, loginFilter){
    if(search!==undefined) this._userSearch=search;
    if(loginFilter!==undefined){
      // toggle : cliquer le filtre actif revient à tout afficher
      this._userLoginFilter = (this._userLoginFilter===loginFilter) ? null : loginFilter;
    }
    const q=(this._userSearch||'').toLowerCase().trim();
    const lf=this._userLoginFilter; // null | 'connected' | 'never'
    const extra=document.getElementById('topbar-extra');
    if(extra) extra.innerHTML=`<button class="btn btn-primary btn-sm" onclick="App.openAddUser()">+ Nouvel utilisateur</button>`;
    const getRoleLabel=role=>{const r=DB.getRoleById(role);return r?r.nom:(ROLES[role]||role);};
    const all=DB.getUsers();
    const neverCount=all.filter(u=>!u.first_login_at).length;
    const connectedCount=all.length-neverCount;
    let filtered=q?all.filter(u=>{
      const site=u.site_id?DB.getSiteById(u.site_id):null;
      return `${u.username} ${u.nom} ${getRoleLabel(u.role)} ${site?.nom||''}`.toLowerCase().includes(q);
    }):all;
    if(lf==='never')     filtered=filtered.filter(u=>!u.first_login_at);
    if(lf==='connected') filtered=filtered.filter(u=>!!u.first_login_at);
    // Tri : jamais connectés en premier, puis par last_login_at décroissant
    filtered=[...filtered].sort((a,b)=>{
      if(!a.first_login_at&&b.first_login_at) return -1;
      if(a.first_login_at&&!b.first_login_at) return 1;
      return (b.last_login_at||'').localeCompare(a.last_login_at||'');
    });
    const fmtLogin=iso=>{
      if(!iso) return '<span style="color:var(--text-muted);font-size:11px">—</span>';
      const d=new Date(iso);
      const today=new Date(); today.setHours(0,0,0,0);
      const isToday=d>=today;
      const yesterday=new Date(today); yesterday.setDate(yesterday.getDate()-1);
      const isYest=d>=yesterday&&d<today;
      const label=isToday?'Aujourd\'hui':isYest?'Hier':d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
      const time=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
      return `<span style="font-size:11px">${label} <span style="color:var(--text-muted)">${time}</span></span>`;
    };
    const rows=filtered.map(u=>{
      const site=u.site_id?DB.getSiteById(u.site_id):null;
      const perms=DB.getPerms(u.role);
      const permBadges=[
        perms.voir_tous_sites?'<span class="badge" style="background:#e3f2fd;color:#01579b;font-size:10px">Tous sites</span>':'',
        perms.valider?'<span class="badge" style="background:#e8f5e9;color:#1b5e20;font-size:10px">Valider</span>':'',
        perms.administrer?'<span class="badge" style="background:#fff8e1;color:#e65100;font-size:10px">Admin</span>':'',
        perms.verrouiller?'<span class="badge" style="background:#fce4ec;color:#880e4f;font-size:10px">Verrous</span>':'',
        perms.exporter?'<span class="badge" style="background:#f3e5f5;color:#4a148c;font-size:10px">Export</span>':'',
      ].filter(Boolean).join(' ');
      const appBadges=[
        u.acces_principal!==false?'<span style="font-size:10px;padding:1px 6px;background:#e8f5e9;color:var(--success);border-radius:10px">🖥 Principal</span>':'',
        u.acces_horloge!==false?'<span style="font-size:10px;padding:1px 6px;background:#e3f2fd;color:#01579b;border-radius:10px">📱 Mobile</span>':'',
      ].filter(Boolean).join(' ');
      const loginStatus=u.first_login_at
        ?'<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;background:#e8f5e9;color:var(--success);font-weight:700">✓ Connecté</span>'
        :'<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;background:#f5f5f5;color:var(--text-muted);font-weight:700">⚫ Jamais</span>';
      return`<tr${!u.first_login_at?' style="opacity:0.75"':''}>
        <td><strong>${u.username}</strong><div style="margin-top:2px">${loginStatus}</div></td>
        <td>${u.nom}</td>
        <td><span class="badge badge-role">${getRoleLabel(u.role)}</span><div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:3px">${permBadges||'<span style="font-size:10px;color:var(--text-muted)">Accès site uniquement</span>'}</div></td>
        <td>${site?site.nom:'— Tous —'}</td>
        <td style="white-space:nowrap">${appBadges}</td>
        <td>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">1re connexion</div>
          ${fmtLogin(u.first_login_at)}
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;margin-bottom:2px">Dernière connexion</div>
          ${fmtLogin(u.last_login_at)}
        </td>
        <td style="white-space:nowrap">
          <button class="btn btn-ghost btn-xs" onclick="App.openEditUser('${u.id}')">✏ Modifier</button>
          <button class="btn btn-ghost btn-xs" onclick="App.openChangePwd('${u.id}')">🔑 MDP</button>
          ${u.id!==currentSession.id?`<button class="btn btn-danger btn-xs" onclick="App.deleteUser('${u.id}')">✕</button>`:''}
        </td>
      </tr>`;
    }).join('');
    const countLabel=`<span class="text-muted text-sm">${filtered.length}${q||lf?' / '+all.length:''} utilisateur${filtered.length>1?'s':''}</span>`;
    const cardStyle=(active,accentColor)=>`cursor:pointer;user-select:none;background:var(--surface);border:2px solid ${active?accentColor:'var(--border)'};border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:8px;transition:border-color .15s;${active?'box-shadow:0 0 0 3px '+accentColor+'22;':''}`;
    document.getElementById('page-content').innerHTML=`
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <div style="${cardStyle(lf==='connected','var(--accent-green)')}" onclick="App.renderUtilisateurs(undefined,'connected')" title="Filtrer : déjà connectés">
          <span style="font-size:20px">✅</span>
          <div><div style="font-size:18px;font-weight:800;color:var(--accent-green)">${connectedCount}</div><div style="font-size:11px;color:var(--text-muted)">Déjà connectés</div></div>
        </div>
        <div style="${cardStyle(lf==='never','var(--accent)')}" onclick="App.renderUtilisateurs(undefined,'never')" title="Filtrer : jamais connectés">
          <span style="font-size:20px">⚫</span>
          <div><div style="font-size:18px;font-weight:800;color:${neverCount>0?'var(--accent)':'var(--text-muted)'}">${neverCount}</div><div style="font-size:11px;color:var(--text-muted)">Jamais connectés</div></div>
        </div>
        <div style="${cardStyle(lf===null&&!q,'var(--text-muted)')}" onclick="App.renderUtilisateurs(undefined,null)" title="Afficher tous">
          <span style="font-size:20px">👥</span>
          <div><div style="font-size:18px;font-weight:800">${all.length}</div><div style="font-size:11px;color:var(--text-muted)">Total utilisateurs</div></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
        <div style="position:relative;flex:1;min-width:200px;max-width:380px">
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px">🔍</span>
          <input id="user-search" type="search" placeholder="Rechercher par identifiant, nom, rôle, site…"
            value="${this._userSearch||''}"
            oninput="App.renderUtilisateurs(this.value)"
            style="width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface)">
        </div>
        ${countLabel}
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div class="table-wrapper"><table class="data-table">
          <thead><tr><th>Identifiant</th><th>Nom</th><th>Rôle & Permissions</th><th>Site</th><th>Apps</th><th>Connexions</th><th>Actions</th></tr></thead>
          <tbody>${rows||`<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">Aucun résultat.</td></tr>`}</tbody>
        </table></div>
      </div>`;
    if(q) { const el=document.getElementById('user-search'); if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);} }
  },

    const builtins=Object.entries(ROLES).map(([k,v])=>`<option value="${k}" ${selectedRole===k?'selected':''}>${v}</option>`).join('');
    const customs=DB.getRoles().filter(r=>!ROLES[r.id]).map(r=>`<option value="${r.id}" ${selectedRole===r.id?'selected':''}>${r.nom}</option>`).join('');
    return builtins+(customs?`<optgroup label="— Rôles personnalisés —">${customs}</optgroup>`:'');

    const perms=DB.getPerms(roleId);
    const grp=document.getElementById('u-site-grp');

  async saveUser(id=null){
    const username=document.getElementById('u-un').value.trim();
    const nom=document.getElementById('u-nom').value.trim();
    const role=document.getElementById('u-role').value;
    const perms=DB.getPerms(role);
    const site_id=perms.voir_tous_sites?null:(document.getElementById('u-site')?.value||null)||null;
    const employee_id=document.getElementById('u-employee')?.value||null;
    const acces_principal=document.getElementById('u-acces-principal')?.checked!==false;
    const acces_horloge=document.getElementById('u-acces-horloge')?.checked!==false;
    if(!username||!nom){alert('Identifiant et nom requis.');return;}
    setSyncStatus('busy','↻...');
    if(id){
      await DB.updateUser(id,{nom,role,site_id,employee_id:employee_id||null,acces_principal,acces_horloge});
      if(id===currentSession.id){currentSession={...currentSession,nom,role,site_id};localStorage.setItem('sh_session',JSON.stringify(currentSession));}
    } else {
      if(DB.getUsers().find(u=>u.username.toLowerCase()===username.toLowerCase())){alert('Identifiant déjà utilisé.');setSyncStatus('ok','● En ligne');return;}
      const password=document.getElementById('u-pw')?.value||'';
      if(!password){alert('Mot de passe requis.');setSyncStatus('ok','● En ligne');return;}
      const password_hash=await sha256(password);
      await DB.addUser({username,nom,password,password_hash,role,site_id,employee_id:employee_id||null,acces_principal,acces_horloge});
    }
    setSyncStatus('ok','● En ligne'); this.closeModal(); this.renderUtilisateurs();
  },

  openChangePwd(id){this.showModal(`<div class="modal-header"><div class="modal-title">Changer le mot de passe</div><button class="modal-close" onclick="App.closeModal()">✕</button></div><div class="form-group"><label>Nouveau mot de passe</label><input id="pw1" type="password"></div><div class="form-group"><label>Confirmer</label><input id="pw2" type="password"></div><div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.savePwd('${id}')">Enregistrer</button></div>`);},
  async savePwd(id){
    const p1=document.getElementById('pw1').value;
    const p2=document.getElementById('pw2').value;
    if(!p1){alert('Requis.');return;}
    if(p1.length<6){alert('Minimum 6 caractères.');return;}
    if(p1!==p2){alert('Les mots de passe ne correspondent pas.');return;}
    // Trouver le username de l'utilisateur cible
    const targetUser = Cache.users.find(u=>u.id===id);
    if(!targetUser){alert('Utilisateur introuvable.');return;}
    try {
      const {data:{session:sbSess}} = await SB.auth.getSession();
      const res = await fetch(`${SB_URL}/functions/v1/admin-reset-password`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${sbSess?.access_token}`,'apikey':SB_KEY},
        body:JSON.stringify({targetUsername:targetUser.username,newPassword:p1})
      });
      const json = await res.json();
      if(!res.ok||!json.ok) throw new Error(json.error||`Erreur ${res.status}`);
      this.closeModal();
      alert('✓ Mot de passe modifié avec succès.');
    } catch(e){alert('Erreur : '+e.message);}
  },
  async deleteUser(id){if(!confirm('Supprimer ?'))return;await DB.deleteUser(id);this.renderUtilisateurs();},
