<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayHere — Pointage RH</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <style>
:root {
  --primary:#272724; --accent:#FF622C; --accent-green:#008160; --accent-light:#ffb899;
  --bg:#F6F7EA; --surface:#fff; --border:#deded4; --text:#272724; --text-muted:#6b6b60;
  --danger:#d93025; --success:#008160; --info:#0277bd;
  --travaille:#008160; --travaille-bg:#e0f2ec;
  --off:#4a4a45;      --off-bg:#ebebdf;
  --maladie:#FF622C;  --maladie-bg:#fff0eb;
  --recup:#9E6EFF;    --recup-bg:#f0ebff;
  --conge:#0277bd;    --conge-bg:#e1f5fe;
  --depart:#b71c1c;   --depart-bg:#fce4ec;
  --absence:#c62828;  --absence-bg:#ffebee;
  --at:#e65100;       --at-bg:#fff3e0;
  --ferie:#c9a800;    --ferie-bg:#fffde7;
  --aj:#0077a8;       --aj-bg:#e0f7fa;
  --nvrecru:#558b2f;  --nvrecru-bg:#f1f8e9;
  --standby:#78909c;  --standby-bg:#eceff1;
  --double:#1565c0;   --double-bg:#e3f2fd;
  --mise_a_pied:#880e4f; --mise_a_pied-bg:#fce4ec;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* CONFIG / LOADING */
.setup-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--primary) 0%,#3a3a34 100%)}
.setup-card{background:var(--surface);border-radius:16px;padding:40px;width:500px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.setup-logo{text-align:center;margin-bottom:28px}
.setup-logo h1{font-size:24px;font-weight:700;color:var(--primary)}
.logo-circle{color:var(--accent-green)} .logo-triangle{color:var(--accent)}
.setup-logo p{color:var(--text-muted);font-size:13px;margin-top:4px}
.setup-steps{counter-reset:step;margin-bottom:20px}
.setup-step{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-body{flex:1}
.step-body a{color:var(--accent);text-decoration:none;font-weight:600}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--primary) 0%,#3a3a34 100%)}
.login-card{background:var(--surface);border-radius:16px;padding:48px 40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:28px;font-weight:700;color:var(--primary)}
.login-logo p{color:var(--text-muted);font-size:13px;margin-top:4px}

/* APP */
#app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--primary);color:white;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo h2{font-size:18px;font-weight:700;color:white}
.sidebar-logo p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px}
.sidebar-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:12px}
.sidebar-user .user-name{font-weight:600;color:white}
.sidebar-user .user-role{color:var(--accent-light);font-size:11px}
.sidebar nav{flex:1;padding:8px 0}
.nav-section{padding:12px 20px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,0.35);font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;font-size:13px}
.nav-item:hover{background:rgba(255,255,255,0.06);color:white}
.nav-item.active{background:rgba(255,98,44,0.12);color:#ffb899;border-left-color:var(--accent)}
.nav-item .icon{width:18px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08)}
.btn-logout{width:100%;padding:8px;background:rgba(217,48,37,0.15);color:#ff6b6b;border:1px solid rgba(217,48,37,0.3);border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.15s}
.btn-logout:hover{background:rgba(217,48,37,0.25)}
.main-content{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:16px;font-weight:600;color:var(--text)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.page{padding:24px}

/* SYNC STATUS */
.sync-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.sync-ok{background:#e0f2ec;color:var(--success)}
.sync-busy{background:#fff8e1;color:#c07000}
.sync-error{background:#ffebee;color:var(--danger)}

/* FORMS */
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);background:var(--surface);transition:border-color 0.15s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,98,44,0.12)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;font-family:inherit}
.btn-primary{background:var(--accent);color:white} .btn-primary:hover{background:#d94f20}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)} .btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--danger);color:white} .btn-danger:hover{background:#b71c1c}
.btn-success{background:var(--success);color:white}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)} .btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:12px} .btn-xs{padding:3px 8px;font-size:11px}
.w-full{width:100%}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:var(--text)}

/* POINTAGE GRID */
.grid-controls{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.month-nav{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px}
.month-nav span{min-width:120px;text-align:center;font-weight:600;font-size:14px}
.month-nav button{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:6px;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.month-nav button:hover{background:var(--bg)}
.pointage-table-wrapper{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.pointage-table{border-collapse:collapse;min-width:100%;font-size:12px}
.pointage-table th{background:var(--primary);color:white;padding:8px 6px;text-align:center;font-weight:600;font-size:11px;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);position:sticky;top:0;z-index:10}
.pointage-table th.col-emp{text-align:left;padding-left:12px;min-width:180px;position:sticky;left:0;z-index:20}
.pointage-table th.day-weekend{background:#2d3748} .pointage-table th.day-ferie{background:#7c4a00}
.pointage-table td{border:1px solid var(--border);padding:0;text-align:center;min-width:34px}
.pointage-table td.col-emp{text-align:left;padding:8px 12px;background:var(--surface);position:sticky;left:0;z-index:5;border-right:2px solid var(--border)}
.emp-name{font-weight:600;color:var(--text)} .emp-poste{font-size:10px;color:var(--text-muted)}
.pointage-table tr:hover td{background:rgba(255,98,44,0.03)}
.pointage-table tr:hover td.col-emp{background:#fafaf8}
.cell-btn{width:100%;height:34px;border:none;background:transparent;cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;transition:all 0.12s;display:flex;align-items:center;justify-content:center}
.cell-btn:hover{filter:brightness(0.92)}
.cell-btn.travaille{background:var(--travaille-bg);color:var(--travaille)}
.cell-btn.off{background:var(--off-bg);color:var(--off)}
.cell-btn.maladie{background:var(--maladie-bg);color:var(--maladie)}
.cell-btn.recup{background:var(--recup-bg);color:var(--recup)}
.cell-btn.conge{background:var(--conge-bg);color:var(--conge)}
.cell-btn.depart{background:var(--depart-bg);color:var(--depart)}
.cell-btn.absence{background:var(--absence-bg);color:var(--absence)}
.cell-btn.at{background:var(--at-bg);color:var(--at)}
.cell-btn.ferie{background:var(--ferie-bg);color:var(--ferie)}
.cell-btn.aj{background:var(--aj-bg);color:var(--aj)}
.cell-btn.nvrecru{background:var(--nvrecru-bg);color:var(--nvrecru)}
.cell-btn.standby{background:var(--standby-bg);color:var(--standby)}
.cell-btn.double{background:var(--double-bg);color:var(--double)}
.cell-btn.mise_a_pied{background:var(--mise_a_pied-bg);color:var(--mise_a_pied)}
.cell-btn.weekend{background:#f0f0f0;color:#bbb;cursor:default}
.cell-btn.locked{opacity:0.7;cursor:not-allowed}
td.has-entry{position:relative}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* TABLES */
.table-wrapper{overflow-x:auto}
table.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);font-weight:700}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,98,44,0.03)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-travaille{background:var(--travaille-bg);color:var(--travaille)} .badge-off{background:var(--off-bg);color:var(--off)}
.badge-maladie{background:var(--maladie-bg);color:var(--maladie)} .badge-recup{background:var(--recup-bg);color:var(--recup)}
.badge-conge{background:var(--conge-bg);color:var(--conge)} .badge-depart{background:var(--depart-bg);color:var(--depart)}
.badge-absence{background:var(--absence-bg);color:var(--absence)} .badge-at{background:var(--at-bg);color:var(--at)}
.badge-ferie{background:var(--ferie-bg);color:var(--ferie)} .badge-aj{background:var(--aj-bg);color:var(--aj)}
.badge-nvrecru{background:var(--nvrecru-bg);color:var(--nvrecru)} .badge-standby{background:var(--standby-bg);color:var(--standby)}
.badge-double{background:var(--double-bg);color:var(--double)} .badge-mise_a_pied{background:var(--mise_a_pied-bg);color:var(--mise_a_pied)}
.badge-success{background:#e0f2ec;color:var(--success)} .badge-warning{background:#fff8e1;color:#c07000}
.badge-role{background:rgba(255,98,44,0.1);color:var(--primary)} .badge-lock{background:#fbe9e7;color:var(--danger)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:16px;padding:28px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:32px;height:32px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.modal-close:hover{background:var(--border)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* TYPE GRID */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.type-btn{padding:10px 6px;border-radius:10px;border:2px solid transparent;cursor:pointer;text-align:center;transition:all 0.15s;font-weight:700;font-size:11px;text-transform:uppercase}
.type-btn.travaille{background:var(--travaille-bg);color:var(--travaille)} .type-btn.off{background:var(--off-bg);color:var(--off)}
.type-btn.maladie{background:var(--maladie-bg);color:var(--maladie)} .type-btn.recup{background:var(--recup-bg);color:var(--recup)}
.type-btn.conge{background:var(--conge-bg);color:var(--conge)} .type-btn.depart{background:var(--depart-bg);color:var(--depart)}
.type-btn.absence{background:var(--absence-bg);color:var(--absence)} .type-btn.at{background:var(--at-bg);color:var(--at)}
.type-btn.ferie{background:var(--ferie-bg);color:var(--ferie)} .type-btn.aj{background:var(--aj-bg);color:var(--aj)}
.type-btn.nvrecru{background:var(--nvrecru-bg);color:var(--nvrecru)} .type-btn.standby{background:var(--standby-bg);color:var(--standby)}
.type-btn.double{background:var(--double-bg);color:var(--double)} .type-btn.mise_a_pied{background:var(--mise_a_pied-bg);color:var(--mise_a_pied)}
.type-btn.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(39,39,36,0.1);transform:scale(0.97)}
.type-btn:hover{opacity:0.85}

/* ALERTS */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.alert-danger{background:#ffebee;color:var(--danger);border:1px solid #ffcdd2}
.alert-success{background:#e8f5e9;color:var(--success);border:1px solid #c8e6c9}
.alert-warning{background:#fff8e1;color:#e65100;border:1px solid #ffe0b2}
.alert-info{background:#e3f2fd;color:#01579b;border:1px solid #bbdefb}

/* SYNTHESE */
.synth-table{width:100%;border-collapse:collapse;font-size:12px}
.synth-table th{background:var(--primary);color:white;padding:8px 10px;text-align:center;font-size:11px}
.synth-table th:first-child,.synth-table th:nth-child(2){text-align:left}
.synth-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:center}
.synth-table td:first-child{text-align:left;font-weight:600} .synth-table td:nth-child(2){text-align:left}
.synth-table .num{font-weight:700;font-size:14px}
.synth-table tr:hover td{background:var(--bg)}

/* AUDIT */
.audit-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;font-size:12px}
.audit-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.audit-create{background:#e8f5e9;color:var(--success)} .audit-update{background:#fff8e1;color:#f57f17}
.audit-delete{background:#ffebee;color:var(--danger)} .audit-validate{background:#e3f2fd;color:#01579b}
.audit-lock{background:#fce4ec;color:#880e4f}
.audit-body{flex:1} .audit-body strong{color:var(--text)} .audit-time{color:var(--text-muted);margin-top:2px}

/* LOCK */
.lock-indicator{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#fbe9e7;color:var(--danger);border-radius:4px;font-size:11px;font-weight:700}

/* SHIFTS */
.shift-table{width:100%;border-collapse:collapse;font-size:13px}
.shift-table th{background:var(--primary);color:white;padding:9px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.shift-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.shift-table tr:last-child td{border-bottom:none}
.shift-table tr:hover td{background:rgba(255,98,44,0.03)}
.shift-status{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;gap:4px}
.shift-complet{background:var(--travaille-bg);color:var(--travaille)}
.shift-incomplet{background:var(--maladie-bg);color:var(--maladie)}
.shift-en_cours{background:#fff8e1;color:#c07000}
.shift-vide{background:var(--off-bg);color:var(--off)}
.time-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:border-color 0.15s}
.time-pill:hover{border-color:var(--accent);color:var(--accent)}
.time-pill.retard{border-color:var(--maladie);color:var(--maladie);background:var(--maladie-bg)}
.retard-badge{font-size:10px;padding:1px 5px;background:var(--maladie-bg);color:var(--maladie);border-radius:10px;font-weight:700}
.date-nav{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px}
.date-nav span{min-width:130px;text-align:center;font-weight:600;font-size:14px}
.date-nav button{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:6px;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.date-nav button:hover{background:var(--bg)}
.schedule-badge{font-size:11px;color:var(--text-muted)}

/* MODAL LARGE */
.modal-lg{max-width:900px}
.import-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:12px}
.import-table th{background:var(--primary);color:white;padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase;white-space:nowrap}
.import-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.import-table tr:hover td{background:rgba(255,98,44,0.03)}
.cred-user{font-family:monospace;font-size:12px;background:var(--bg);padding:2px 6px;border-radius:4px;color:var(--primary)}
.cred-pass{font-family:monospace;font-size:12px;background:#e8f5e9;padding:2px 6px;border-radius:4px;color:var(--success)}
.import-step{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:12px;font-size:13px}
.step-circle{width:22px;height:22px;border-radius:50%;background:var(--accent);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ROLES */
.perm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px}
.perm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;transition:border-color 0.15s}
.perm-item:hover{border-color:var(--accent)}
.perm-item input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}
.perm-item.checked{background:rgba(255,98,44,0.06);border-color:var(--accent)}
.role-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.role-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.role-name{font-weight:700;font-size:14px}
.role-system{font-size:10px;padding:2px 6px;background:var(--bg);color:var(--text-muted);border-radius:10px;border:1px solid var(--border)}

/* UTILS */
.text-muted{color:var(--text-muted)} .text-sm{font-size:12px} .font-bold{font-weight:700}
.hidden{display:none!important} .mb-16{margin-bottom:16px}
/* CONGÉS */
.leave-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:20px;border:1px solid var(--border)}
.leave-tab-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-muted);font-family:inherit;transition:all 0.15s}
.leave-tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.leave-status{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;gap:4px}
.leave-pending-ka{background:#fff8e1;color:#c07000}.leave-pending-admin{background:#e8f5e9;color:#2e7d32}
.leave-approved{background:#e0f2ec;color:var(--success)}.leave-rejected{background:#ffebee;color:var(--danger)}
.leave-type-pill{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.lp-cp{background:var(--conge-bg);color:var(--conge)}.lp-recup{background:var(--recup-bg);color:var(--recup)}
.balance-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:20px}
.balance-card-admin{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.bal-name{font-weight:700;font-size:14px;margin-bottom:4px}.bal-sub{font-size:12px;color:var(--text-muted);margin-bottom:12px}
.bal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.bal-row:last-child{border-bottom:none}.bal-label{font-size:12px;color:var(--text-muted)}.bal-val{font-size:15px;font-weight:700}
.bal-cp{color:var(--conge)}.bal-recup{color:var(--recup)}
.val-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
/* HAMBURGER + OVERLAY */
.hamburger{display:none;width:38px;height:38px;border:none;background:transparent;cursor:pointer;font-size:22px;color:var(--text);align-items:center;justify-content:center;border-radius:8px;flex-shrink:0}
.hamburger:hover{background:var(--bg)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150}
.sidebar-overlay.visible{display:block}
/* MOBILE */
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{transform:translateX(-100%);transition:transform 0.25s ease;z-index:200;width:260px}
  .sidebar.sidebar-open{transform:translateX(0)}
  .main-content{margin-left:0}
  .page{padding:12px}
  .type-grid{grid-template-columns:repeat(3,1fr)}
  .modal-overlay{align-items:flex-end;padding:0}
  .modal{border-radius:20px 20px 0 0;max-height:90vh;margin:0;width:100%;padding:20px}
  .modal-lg{max-width:100%}
  .topbar{padding:0 12px;gap:8px}
  .topbar h2{font-size:14px}
  .topbar-actions{gap:6px}
  .cell-btn{height:28px;font-size:9px}
  .pointage-table th{font-size:10px;padding:6px 3px}
  .data-table th,.data-table td{padding:7px 6px;font-size:12px}
  .grid-controls{gap:8px}
  .card{padding:14px}
  .shift-table{font-size:12px}
  .shift-table th,.shift-table td{padding:7px 6px}
  .btn{padding:8px 12px;font-size:12px}
  .synth-table th,.synth-table td{padding:5px 4px;font-size:10px}
  .login-card{padding:28px 20px;width:100%}
}
  </style>
</head>
<body>
<script>
// ============================================================
// CONSTANTES
// ============================================================
// POSTES chargés dynamiquement depuis la DB (fallback si vide)
const POSTES_DEFAULT=['Kindness Ambassador','Kindness Host','Femme de chambre','Technicien','Valet','Coursier','Jardinier','Réceptionniste','Manager de site'];
function getPostes() { return Cache.postes.length ? Cache.postes : POSTES_DEFAULT; }
const TYPES=[
  {key:'travaille',label:'Présent',short:'1'},
  {key:'double',label:'Double Shift',short:'2×'},
  {key:'off',label:'Off / Repos',short:'OFF'},
  {key:'maladie',label:'Maladie',short:'M'},
  {key:'conge',label:'Congé',short:'C'},
  {key:'recup',label:'Récupération',short:'R'},
  {key:'depart',label:'Départ',short:'D'},
  {key:'absence',label:'Absent',short:'A'},
  {key:'at',label:'Acc. Travail',short:'AT'},
  {key:'ferie',label:'Férié',short:'F'},
  {key:'aj',label:'Abs. Justifiée',short:'AJ'},
  {key:'nvrecru',label:'Nouveau Recruté',short:'NR'},
  {key:'standby',label:'Stand By',short:'SB'},
  {key:'mise_a_pied',label:'Mise à pied',short:'MAP',restricted:true},
];
// Types réservés à certains rôles (juriste, cluster_ops, responsable_financier)
function canSaisirTypeRestreint() {
  const r=currentSession?.role;
  return r==='cluster_ops'||r==='juriste'||r==='responsable_financier';
}
const ROLES={
  cluster_ops:'Cluster Ops Manager',
  juriste:'Juriste',
  responsable_financier:'Responsable Financier',
  kindness_ambassador:'Kindness Ambassador',
  gouvernante_generale:'Gouvernante Générale',
  assistante_gouvernante:'Assistante Gouvernante',
  collaborateur:'Collaborateur',
};
// Postes gérés par gouvernante / assistante gouvernante
const POSTES_TERRAIN=['Femme de chambre','Valet','Technicien','Jardinier','Coursier'];
const TYPE_CODES={travaille:'1',double:'2×',off:'OFF',maladie:'M',conge:'C',recup:'R',depart:'D',absence:'A',at:'AT',ferie:'F',aj:'AJ',nvrecru:'NV RECRU',standby:'STAND BY',mise_a_pied:'MAP'};

// ============================================================
// SUPABASE — Config & Client (credentials depuis config.js)
// ============================================================
if (!window.SUPABASE_CONFIG) {
  alert('⚠️ Fichier config.js manquant.\nCopiez config.example.js → config.js et renseignez vos credentials Supabase.');
  throw new Error('SUPABASE_CONFIG non défini — config.js manquant');
}
const SB_URL = window.SUPABASE_CONFIG.url;
const SB_KEY = window.SUPABASE_CONFIG.anonKey;
let SB = null;

function initSB() {
  const { createClient } = window.supabase;
  SB = createClient(SB_URL, SB_KEY);
}

// ============================================================
// CACHE — Données en mémoire
// ============================================================
const Cache = {
  users:[], sites:[], employees:[], pointage:[],
  audit:[], locks:[], holidays:[], affectations:[],
  shifts:[], schedules:[], postes:[], roles:[],
  leaveRequests:[], leaveBalances:[], shiftChangeRequests:[],
  tempAssignments:[], shiftTypes:[], weeklySchedules:[],
};
let currentSession = null;

async function loadAll() {
  const [users, sites, affRows, employees, holidays, pointage, locks, audit, shifts, schedules, postes, roles, leaveReqs, leaveBals, tempAssign, shiftTypes, weeklyScheds, userProfiles] = await Promise.all([
    SB.from('sh_users').select('*'),
    SB.from('sh_sites').select('*'),
    SB.from('sh_affectations').select('*'),
    SB.from('sh_employees').select('*'),
    SB.from('sh_holidays').select('*'),
    SB.from('sh_pointage').select('*'),
    SB.from('sh_locks').select('*'),
    SB.from('sh_audit').select('*').order('created_at',{ascending:false}).limit(300),
    SB.from('sh_shifts').select('*').order('date',{ascending:false}).limit(2000),
    SB.from('sh_schedules').select('*'),
    SB.from('sh_postes').select('*').order('nom'),
    SB.from('sh_roles').select('*'),
    SB.from('sh_leave_requests').select('*').order('created_at',{ascending:false}),
    SB.from('sh_leave_balances').select('*'),
    SB.from('sh_temp_assignments').select('*').order('date_debut',{ascending:false}),
    SB.from('sh_shift_types').select('*').order('ordre'),
    SB.from('sh_weekly_schedule').select('*'),
    SB.from('sh_user_profiles').select('*'),
  ]);
  // Fusionner sh_users (legacy, a le password_hash) et sh_user_profiles (source de vérité Auth)
  // sh_users a priorité (contient password_hash), sh_user_profiles comble les manques
  const byUsername = new Map();
  for (const u of (users.data||[])) byUsername.set(u.username, u);
  for (const p of (userProfiles.data||[])) {
    if (!byUsername.has(p.username)) byUsername.set(p.username, p);
  }
  Cache.users = [...byUsername.values()];
  Cache.sites = sites.data||[];
  Cache.affectations = (affRows.data||[]).map(r=>r.nom);
  Cache.employees = employees.data||[];
  Cache.holidays = holidays.data||[];
  Cache.pointage = pointage.data||[];
  Cache.locks = locks.data||[];
  Cache.audit = audit.data||[];
  Cache.shifts = shifts.data||[];
  Cache.schedules = schedules.data||[];
  Cache.postes = (postes.data||[]).map(r=>r.nom);
  Cache.roles = roles.data||[];
  Cache.leaveRequests = leaveReqs.data||[];
  Cache.leaveBalances = leaveBals.data||[];
  Cache.tempAssignments = tempAssign.data||[];
  Cache.shiftTypes = shiftTypes.data||[];
  Cache.weeklySchedules = weeklyScheds.data||[];
  const shiftChangeReqs = await SB.from('sh_shift_change_requests').select('*').order('requested_at',{ascending:false});
  Cache.shiftChangeRequests = shiftChangeReqs.data||[];
}

async function refreshPointage() {
  const {data} = await SB.from('sh_pointage').select('*');
  Cache.pointage = data||[];
}

// ============================================================
// UTILITAIRES
// ============================================================
async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
function nowISO() { return new Date().toISOString(); }
function todayStr() { return new Date().toISOString().substring(0,10); }
function daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function dayOfWeek(y,m,d) { return new Date(y,m,d).getDay(); }
function fmtDate(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function fmtMonth(y,m) { return ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][m]+' '+y; }
function fmtDT(iso) { if(!iso)return'—'; const d=new Date(iso); return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }

function setSyncStatus(status, text) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.className = 'sync-badge sync-'+status;
  el.textContent = text;
}

// ============================================================
// DB — Opérations cache + flush Supabase
// ============================================================
const DB = {
  // USERS
  getUserByHash(username, hash) { return Cache.users.find(u=>u.username.toLowerCase()===username.toLowerCase()&&u.password_hash===hash)||null; },
  getUsers() { return Cache.users; },
  async addUser(u) {
    u.id = uid();
    const plainPassword = u.password; // mot de passe en clair pour la Edge Function
    delete u.password;                // ne pas stocker en clair dans le cache
    Cache.users.push(u);
    // Utiliser l'Edge Function create-user pour créer Auth + profil directement
    const {data:{session:s}} = await SB.auth.getSession();
    const res = await fetch(`${SB_URL}/functions/v1/create-user`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${s?.access_token}`,'apikey':SB_KEY},
      body: JSON.stringify({...u, password: plainPassword}),
    });
    const json = await res.json();
    if (!res.ok || !json.ok) throw new Error(json.error || `Erreur création utilisateur (${res.status})`);
  },
  async updateUserPassword(id, hash) {
    const u=Cache.users.find(x=>x.id===id); if(u)u.password_hash=hash;
    await SB.from('sh_users').update({password_hash:hash}).eq('id',id);
  },
  async deleteUser(id) {
    const u=Cache.users.find(x=>x.id===id);
    Cache.users = Cache.users.filter(u=>u.id!==id);
    await SB.from('sh_users').delete().eq('id',id);
    if(u?.username) await SB.from('sh_user_profiles').delete().eq('username',u.username);
  },

  // SITES
  getSites() { return Cache.sites; },
  getSiteById(id) { return Cache.sites.find(s=>s.id===id); },
  async addSite(s) {
    s.id='site_'+Date.now(); s.actif=true; Cache.sites.push(s);
    await SB.from('sh_sites').insert(s);
  },
  async updateSite(id, upd) {
    const i=Cache.sites.findIndex(s=>s.id===id); if(i>=0)Cache.sites[i]={...Cache.sites[i],...upd};
    await SB.from('sh_sites').update(upd).eq('id',id);
  },

  // AFFECTATIONS
  getAffectations() { return Cache.affectations; },
  async addAffectation(nom) {
    if(!Cache.affectations.includes(nom)) { Cache.affectations.push(nom); await SB.from('sh_affectations').insert({nom}); }
  },
  async removeAffectation(nom) {
    Cache.affectations=Cache.affectations.filter(a=>a!==nom);
    await SB.from('sh_affectations').delete().eq('nom',nom);
  },

  // ROLES
  getRoles() { return Cache.roles; },
  getRoleById(id) { return Cache.roles.find(r=>r.id===id)||null; },
  // Fallback permissions si la table sh_roles est vide
  _defaultPerms(roleId) {
    // voir_equipe_terrain = voit les postes terrain (FC, valet...) de son site
    // saisir_planning = peut accéder au planning semaine et le générer
    // modifier_shifts_prevus = peut modifier les horaires prévus d'un shift
    const d={
      cluster_ops:              {voir_tous_sites:true, valider:true, administrer:true, verrouiller:true, exporter:true, voir_equipe:true, voir_equipe_terrain:true, saisir_restreint:true, saisir_planning:true, modifier_shifts_prevus:true, gerer_rotation:true},
      juriste:                  {voir_tous_sites:true, valider:true, administrer:true, verrouiller:false,exporter:true, voir_equipe:true, voir_equipe_terrain:true, saisir_restreint:true, saisir_planning:false,modifier_shifts_prevus:false,gerer_rotation:false},
      responsable_financier:    {voir_tous_sites:true, valider:true, administrer:true, verrouiller:false,exporter:true, voir_equipe:true, voir_equipe_terrain:true, saisir_restreint:true, saisir_planning:false,modifier_shifts_prevus:false,gerer_rotation:false},
      cluster_revenue_manager:  {voir_tous_sites:true, valider:false,administrer:false,verrouiller:false,exporter:true, voir_equipe:true, voir_equipe_terrain:false,saisir_restreint:false,saisir_planning:false,modifier_shifts_prevus:false,gerer_rotation:true},
      kindness_ambassador:      {voir_tous_sites:false,valider:false,administrer:false,verrouiller:false,exporter:false,voir_equipe:true, voir_equipe_terrain:true, saisir_restreint:false,saisir_planning:true, modifier_shifts_prevus:true, gerer_rotation:false},
      gouvernante_generale:     {voir_tous_sites:false,valider:false,administrer:false,verrouiller:false,exporter:false,voir_equipe:false,voir_equipe_terrain:true, saisir_restreint:false,saisir_planning:true, modifier_shifts_prevus:true, gerer_rotation:false},
      assistante_gouvernante:   {voir_tous_sites:false,valider:false,administrer:false,verrouiller:false,exporter:false,voir_equipe:false,voir_equipe_terrain:true, saisir_restreint:false,saisir_planning:true, modifier_shifts_prevus:true, gerer_rotation:false},
      collaborateur:            {voir_tous_sites:false,valider:false,administrer:false,verrouiller:false,exporter:false,voir_equipe:false,voir_equipe_terrain:false,saisir_restreint:false,saisir_planning:false,modifier_shifts_prevus:false,gerer_rotation:false},
    };
    return d[roleId]||{voir_tous_sites:false,valider:false,administrer:false,verrouiller:false,exporter:false,voir_equipe:false,voir_equipe_terrain:false,saisir_restreint:false,saisir_planning:false,modifier_shifts_prevus:false,gerer_rotation:false};
  },
  getPerms(roleId) {
    const r=this.getRoleById(roleId);
    return r||this._defaultPerms(roleId);
  },
  async addRole(role) {
    role.id=uid(); Cache.roles.push(role);
    await SB.from('sh_roles').insert(role);
  },
  async updateRole(id, upd) {
    const i=Cache.roles.findIndex(r=>r.id===id);
    if(i>=0) {
      Cache.roles[i]={...Cache.roles[i],...upd};
      await SB.from('sh_roles').update(upd).eq('id',id);
    } else {
      // Rôle système pas encore en DB → on l'insère (upsert)
      const nom=ROLES[id]||id;
      const base={...this._defaultPerms(id),...upd};
      const rec={id,nom,...base};
      Cache.roles.push(rec);
      await SB.from('sh_roles').upsert(rec);
    }
    if(currentSession?.role===id) currentSession={...currentSession,...upd};
  },
  async deleteRole(id) {
    if(Cache.users.some(u=>u.role===id)){throw new Error('Ce rôle est assigné à des utilisateurs.');}
    Cache.roles=Cache.roles.filter(r=>r.id!==id);
    await SB.from('sh_roles').delete().eq('id',id);
  },
  async updateUser(id, upd) {
    const i=Cache.users.findIndex(u=>u.id===id); if(i>=0)Cache.users[i]={...Cache.users[i],...upd};
    // Mettre à jour sh_users ET sh_user_profiles (les deux peuvent être source de données)
    const {error:e1} = await SB.from('sh_users').update(upd).eq('id',id);
    if(e1) console.warn('updateUser sh_users error:', e1.message);
    // sh_user_profiles utilise l'username pour retrouver l'entrée (son id est l'UUID Auth)
    const u=Cache.users.find(x=>x.id===id);
    if(u?.username) {
      const profileUpd={nom:upd.nom,role:upd.role,site_id:upd.site_id,employee_id:upd.employee_id,acces_horloge:upd.acces_horloge,acces_principal:upd.acces_principal};
      Object.keys(profileUpd).forEach(k=>profileUpd[k]===undefined&&delete profileUpd[k]);
      const {error:e2,data:d2} = await SB.from('sh_user_profiles').update(profileUpd).eq('username',u.username).select();
      if(e2) console.warn('updateUser sh_user_profiles error:', e2.message);
      else if(!d2?.length) console.warn('updateUser sh_user_profiles: aucune ligne mise à jour pour username=', u.username);
      else console.log('updateUser sh_user_profiles OK:', d2);
    }
  },

  // POSTES
  getPostes() { return Cache.postes.length ? Cache.postes : POSTES_DEFAULT; },
  async addPoste(nom) {
    if(!Cache.postes.includes(nom)) { Cache.postes.push(nom); Cache.postes.sort(); await SB.from('sh_postes').insert({nom}); }
  },
  async removePoste(nom) {
    Cache.postes=Cache.postes.filter(p=>p!==nom);
    await SB.from('sh_postes').delete().eq('nom',nom);
  },

  // EMPLOYEES
  getEmployees(siteId=null) { return siteId ? Cache.employees.filter(e=>e.site_id===siteId) : Cache.employees; },
  async addEmployee(e) {
    e.id=uid(); e.actif=true; Cache.employees.push(e);
    await SB.from('sh_employees').insert(e);
  },
  async updateEmployee(id, upd) {
    const i=Cache.employees.findIndex(e=>e.id===id); if(i>=0)Cache.employees[i]={...Cache.employees[i],...upd};
    await SB.from('sh_employees').update(upd).eq('id',id);
  },

  // HOLIDAYS
  getHolidays() { return Cache.holidays; },
  isHoliday(date) { return Cache.holidays.some(h=>h.date===date); },
  getHolidayName(date) { return Cache.holidays.find(h=>h.date===date)?.nom||null; },
  async addHoliday(date, nom) {
    if(!Cache.holidays.find(h=>h.date===date)) { Cache.holidays.push({date,nom}); await SB.from('sh_holidays').insert({date,nom}); }
  },
  async removeHoliday(date) {
    Cache.holidays = Cache.holidays.filter(h=>h.date!==date);
    await SB.from('sh_holidays').delete().eq('date',date);
  },

  // POINTAGE
  getPointage(siteId=null, year=null, month=null) {
    let e = Cache.pointage;
    if(siteId) e=e.filter(p=>p.site_id===siteId);
    if(year!==null) e=e.filter(p=>p.date.startsWith(`${year}-`));
    if(month!==null) { const m=String(month).padStart(2,'0'); e=e.filter(p=>p.date.startsWith(`${year}-${m}`)); }
    return e;
  },
  getPointageByEmpDate(empId, date) { return Cache.pointage.find(p=>p.employee_id===empId&&p.date===date)||null; },
  async setPointage(empId, date, type, notes, session) {
    const emp=Cache.employees.find(e=>e.id===empId); if(!emp) return;
    // Site effectif : temporaire si affectation active, sinon site permanent
    const effectiveSiteId=this.getEffectiveSiteId(empId, date);
    const lock=this.getLock(effectiveSiteId, date.substring(0,7));
    if(lock) throw new Error(`Mois ${date.substring(0,7)} verrouillé.`);

    const existing=Cache.pointage.find(p=>p.employee_id===empId&&p.date===date);
    const now=nowISO();

    if(existing) {
      const oldType=existing.type;
      existing.type=type; existing.notes=notes||''; existing.updated_by=session.username; existing.updated_at=now;
      await SB.from('sh_pointage').update({type,notes:notes||'',updated_by:session.username,updated_at:now}).eq('id',existing.id);
      await this.addAudit('update',existing.id,session.username,{type:oldType},{type},effectiveSiteId);
    } else {
      const entry={id:uid(),employee_id:empId,site_id:effectiveSiteId,date,type,notes:notes||'',created_by:session.username,created_at:now,updated_by:null,updated_at:null,validated:false,validated_by:null,validated_at:null};
      Cache.pointage.push(entry);
      await SB.from('sh_pointage').insert(entry);
      await this.addAudit('create',entry.id,session.username,null,{type},effectiveSiteId);
    }
  },
  async validateEntry(id, session) {
    const p=Cache.pointage.find(x=>x.id===id); if(!p)return;
    const now=nowISO();
    p.validated=true; p.validated_by=session.username; p.validated_at=now;
    await SB.from('sh_pointage').update({validated:true,validated_by:session.username,validated_at:now}).eq('id',id);
    await this.addAudit('validate',id,session.username,null,null,p.site_id);
  },
  async deletePointage(empId, date, session) {
    const emp=Cache.employees.find(e=>e.id===empId);
    const lock=this.getLock(emp?.site_id, date.substring(0,7));
    if(lock) throw new Error('Mois verrouillé.');
    const entry=Cache.pointage.find(p=>p.employee_id===empId&&p.date===date);
    if(entry) {
      await this.addAudit('delete',entry.id,session.username,{type:entry.type},null,entry.site_id);

  // SHIFTS
  getShifts(siteId=null, date=null) {
    let s=Cache.shifts;
    if(siteId) s=s.filter(x=>x.site_id===siteId);
    if(date) s=s.filter(x=>x.date===date);
    return s;
  },
  getShiftByEmpDate(empId, date) { return Cache.shifts.find(s=>s.employee_id===empId&&s.date===date)||null; },
  // Calcule retard en minutes
  calcRetard(heureArrivee, heureDebutPrevue) {
    if(!heureArrivee||!heureDebutPrevue) return 0;
    const [ah,am]=heureArrivee.split(':').map(Number);
    const [ph,pm]=heureDebutPrevue.split(':').map(Number);
    const diff=(ah*60+am)-(ph*60+pm);
    return diff>0?diff:0;
  },
  // Calcule durée en minutes entre deux heures HH:MM
  calcDuree(heureDebut, heureFin) {
    if(!heureDebut||!heureFin) return 0;
    const [dh,dm]=heureDebut.split(':').map(Number);
    const [fh,fm]=heureFin.split(':').map(Number);
    return Math.max(0,(fh*60+fm)-(dh*60+dm));
  },
  // Durée prévue en minutes
  dureePrevue(schedule) {
    if(!schedule) return 0;
    return this.calcDuree(schedule.heure_debut, schedule.heure_fin);
  },
  // Statut shift
  shiftStatut(shift, schedule) {
    if(!shift||(!shift.heure_arrivee&&!shift.heure_depart)) return 'vide';
    if(shift.heure_arrivee&&!shift.heure_depart) return 'en_cours';
    const duree=this.calcDuree(shift.heure_arrivee,shift.heure_depart);
    // Priorité : horaires modifiés stockés sur le shift, sinon schedule habituel
    const prevue=shift.heure_debut_prevue&&shift.heure_fin_prevue
      ? this.calcDuree(shift.heure_debut_prevue,shift.heure_fin_prevue)
      : this.dureePrevue(schedule);
    // Complet si durée >= 80% de la durée prévue (tolérance petite pause)
    if(!prevue||duree>=prevue*0.8) return 'complet';
    return 'incomplet';
  },
  async pointageArrivee(empId, date, heureArrivee, session, debutPrevu=null, finPrevue=null) {
    const emp=Cache.employees.find(e=>e.id===empId); if(!emp) return;
    const schedule=this.getSchedule(empId);
    // Priorité : horaire modifié par l'utilisateur, sinon schedule habituel
    const heureDebutRef=debutPrevu||schedule?.heure_debut;
    const heureFinRef=finPrevue||schedule?.heure_fin;
    const retard=this.calcRetard(heureArrivee, heureDebutRef);
    const existing=this.getShiftByEmpDate(empId,date);
    const now=nowISO();
    if(existing) {
      const upd={heure_arrivee:heureArrivee,retard_minutes:retard,updated_by:session.username,updated_at:now};
      if(debutPrevu) upd.heure_debut_prevue=debutPrevu;
      if(finPrevue) upd.heure_fin_prevue=finPrevue;
      Object.assign(existing,upd);
      await SB.from('sh_shifts').update(upd).eq('id',existing.id);
    } else {
      const rec={id:uid(),employee_id:empId,site_id:this.getEffectiveSiteId(empId,date),date,heure_arrivee:heureArrivee,heure_depart:null,
        heure_debut_prevue:debutPrevu||schedule?.heure_debut||null,
        heure_fin_prevue:finPrevue||schedule?.heure_fin||null,
        retard_minutes:retard,duree_minutes:0,pause_minutes:0,
        validated_by_ka:null,validated_at_ka:null,created_by:session.username,created_at:now,updated_by:null,updated_at:null};
      Cache.shifts.unshift(rec);
      await SB.from('sh_shifts').insert(rec);
    }
    await this.addAudit('arrivee',empId,session.username,null,{date,heure:heureArrivee,retard,debutPrevu},this.getEffectiveSiteId(empId,date));
  },
  async pointageDepart(empId, date, heureDepart, session) {
    const emp=Cache.employees.find(e=>e.id===empId); if(!emp) return;
    const schedule=this.getSchedule(empId);
    const shift=this.getShiftByEmpDate(empId,date);
    if(!shift) throw new Error('Aucune arrivée enregistrée pour ce collaborateur aujourd\'hui.');
    const duree=this.calcDuree(shift.heure_arrivee,heureDepart);
    const statut=this.shiftStatut({...shift,heure_depart:heureDepart},schedule);
    const now=nowISO();
    shift.heure_depart=heureDepart; shift.duree_minutes=duree; shift.updated_by=session.username; shift.updated_at=now;
    await SB.from('sh_shifts').update({heure_depart:heureDepart,duree_minutes:duree,updated_by:session.username,updated_at:now}).eq('id',shift.id);
    // Auto-create/update pointage travaillé si shift complet
    if(statut==='complet') {
      const lock=this.getLock(emp.site_id,date.substring(0,7));
      if(!lock) {
        const existing=Cache.pointage.find(p=>p.employee_id===empId&&p.date===date);
        const note='Shift complet — '+shift.heure_arrivee+(shift.retard_minutes>0?' (+'+this.fmtMinutes(shift.retard_minutes)+' retard)':'')+'–'+heureDepart+' ('+this.fmtMinutes(duree)+')';
        if(!existing) {
          await this.setPointage(empId,date,'travaille',note,session);
        } else if(existing.type==='off') {
          // Repos annulé — la personne est quand même venue
          await this.setPointage(empId,date,'travaille','Repos annulé — '+note,session);
        }
        // Si autre type existant (maladie, congé…) on ne touche pas
      }
    }
    await this.addAudit('depart',empId,session.username,null,{date,heure:heureDepart,duree,statut},emp.site_id);
  },

  // DOUBLE SHIFT — Arrivée 2ème shift
  async pointageArrivee2(empId, date, heureArrivee2, session) {
    const shift=this.getShiftByEmpDate(empId,date);
    if(!shift) throw new Error('Aucun 1er shift enregistré pour ce collaborateur.');
    if(!shift.heure_depart) throw new Error('Le 1er shift doit être terminé avant de saisir le 2ème.');
    const emp=Cache.employees.find(e=>e.id===empId); if(!emp)return;
    const schedule=this.getSchedule(empId);
    // Retard calculé par rapport à l'heure de fin du 1er shift (si pas de 2ème planning spécifique)
    const retard2=schedule?Math.max(0,this.calcRetard(heureArrivee2,shift.heure_depart)):0;
    const now=nowISO();
    shift.heure_arrivee_2=heureArrivee2; shift.retard_minutes_2=retard2; shift.updated_by=session.username; shift.updated_at=now;
    await SB.from('sh_shifts').update({heure_arrivee_2:heureArrivee2,retard_minutes_2:retard2,updated_by:session.username,updated_at:now}).eq('id',shift.id);
    await this.addAudit('arrivee2',empId,session.username,null,{date,heure:heureArrivee2},emp.site_id);
  },

  // DOUBLE SHIFT — Départ 2ème shift
  async pointageDepart2(empId, date, heureDepart2, session) {
    const emp=Cache.employees.find(e=>e.id===empId); if(!emp)return;
    const shift=this.getShiftByEmpDate(empId,date);
    if(!shift?.heure_arrivee_2) throw new Error('Aucune arrivée 2ème shift enregistrée.');
    const duree2=this.calcDuree(shift.heure_arrivee_2, heureDepart2);
    const duree1=shift.duree_minutes||0;
    const dureeTotale=duree1+duree2;
    const now=nowISO();
    shift.heure_depart_2=heureDepart2; shift.duree_minutes_2=duree2; shift.updated_by=session.username; shift.updated_at=now;
    await SB.from('sh_shifts').update({heure_depart_2:heureDepart2,duree_minutes_2:duree2,updated_by:session.username,updated_at:now}).eq('id',shift.id);
    // Auto-pointage Double Shift
    const lock=this.getLock(emp.site_id,date.substring(0,7));
    if(!lock) {
      const note=`Double shift — Shift 1: ${shift.heure_arrivee}→${shift.heure_depart} (${this.fmtMinutes(duree1)}) · Shift 2: ${shift.heure_arrivee_2}→${heureDepart2} (${this.fmtMinutes(duree2)}) · Total: ${this.fmtMinutes(dureeTotale)}`;
      const existing=Cache.pointage.find(p=>p.employee_id===empId&&p.date===date);
      if(!existing) {
        await this.setPointage(empId,date,'double',note,session);
      } else {
        await this.setPointage(empId,date,'double',note,session);
      }
    }
    await this.addAudit('depart2',empId,session.username,null,{date,heure:heureDepart2,duree2,dureeTotale},emp.site_id);
  },

  fmtMinutes(min) {
    if(!min||min<=0) return '0h';
    const h=Math.floor(min/60),m=min%60;
    return m?`${h}h${String(m).padStart(2,'0')}`:`${h}h`;
  },

  async approveShiftChange(reqId, session) {
    const req=Cache.shiftChangeRequests.find(r=>r.id===reqId); if(!req)return;
    const now=nowISO();
    // Appliquer les changements sur le shift
    let shift=this.getShiftByEmpDate(req.employee_id,req.date);
    const emp=Cache.employees.find(e=>e.id===req.employee_id);
    if(!emp) throw new Error('Employé introuvable.');

    const upd={};
    if(req.heure_arrivee!==null) upd.heure_arrivee=req.heure_arrivee;
    if(req.heure_depart!==null) upd.heure_depart=req.heure_depart;
    if(req.heure_arrivee_2!==null) upd.heure_arrivee_2=req.heure_arrivee_2;
    if(req.heure_depart_2!==null) upd.heure_depart_2=req.heure_depart_2;
    if(req.heure_debut_prevue!==null) upd.heure_debut_prevue=req.heure_debut_prevue;
    if(req.heure_fin_prevue!==null) upd.heure_fin_prevue=req.heure_fin_prevue;
    upd.updated_by=session.username; upd.updated_at=now;

    if(shift) {
      Object.assign(shift,upd);
      await SB.from('sh_shifts').update(upd).eq('id',shift.id);
      // Recalculer retard si arrivée changée
      if(req.heure_arrivee&&(shift.heure_debut_prevue||req.heure_debut_prevue)) {
        const debutRef=req.heure_debut_prevue||shift.heure_debut_prevue;
        const retard=this.calcRetard(req.heure_arrivee,debutRef);
        shift.retard_minutes=retard;
        await SB.from('sh_shifts').update({retard_minutes:retard}).eq('id',shift.id);
      }
      // Recalculer durée si arrivée ET départ changés
      const arr=req.heure_arrivee||shift.heure_arrivee;
      const dep=req.heure_depart||shift.heure_depart;
      if(arr&&dep) {
        const duree=this.calcDuree(arr,dep);
        shift.duree_minutes=duree;
        await SB.from('sh_shifts').update({duree_minutes:duree}).eq('id',shift.id);
        // Auto-pointage si complet
        const schedule=this.getSchedule(req.employee_id);
        const statut=this.shiftStatut(shift,schedule);
        if(statut==='complet') {
          const lock=this.getLock(emp.site_id,req.date.substring(0,7));
          if(!lock) {
            const note=`Shift modifié (demande ${reqId}) — ${arr}→${dep} (${this.fmtMinutes(duree)})`;
            const existPt=Cache.pointage.find(p=>p.employee_id===req.employee_id&&p.date===req.date);
            if(!existPt) await this.setPointage(req.employee_id,req.date,'travaille',note,session);
            else if(existPt.type==='off') await this.setPointage(req.employee_id,req.date,'travaille','Repos annulé — '+note,session);
          }
        }
      }
    } else if(req.create_if_missing&&req.heure_arrivee) {
      // Créer le shift s'il n'existe pas
      const schedule=this.getSchedule(req.employee_id);
      const rec={
        id:uid(), employee_id:req.employee_id, site_id:emp.site_id, date:req.date,
        heure_arrivee:req.heure_arrivee, heure_depart:req.heure_depart||null,
        heure_debut_prevue:req.heure_debut_prevue||schedule?.heure_debut||null,
        heure_fin_prevue:req.heure_fin_prevue||schedule?.heure_fin||null,
        retard_minutes:this.calcRetard(req.heure_arrivee,req.heure_debut_prevue||schedule?.heure_debut||null),
        duree_minutes:req.heure_depart?this.calcDuree(req.heure_arrivee,req.heure_depart):0,
        pause_minutes:0,
        validated_by_ka:null, validated_at_ka:null,
        created_by:session.username, created_at:now,
        updated_by:null, updated_at:null
      };
      Cache.shifts.unshift(rec);
      await SB.from('sh_shifts').upsert(rec,{onConflict:'employee_id,date'});
    }

    // Marquer la demande comme approuvée
    req.status='approved'; req.approved_by=session.username; req.approved_at=now;
    await SB.from('sh_shift_change_requests').update({status:'approved',approved_by:session.username,approved_at:now}).eq('id',reqId);
    await this.addAudit('shift_change_approved',reqId,session.username,null,{empId:req.employee_id,date:req.date},req.site_id);
  },

  },

  // ---- CONGÉS & RÉCUPÉRATION ----
  getLeaveRequests(siteId=null, empId=null) {
    let r=Cache.leaveRequests;
    if(siteId) r=r.filter(x=>x.site_id===siteId);

  },
  getLeaveBalance(empId) { return Cache.leaveBalances.find(b=>b.employee_id===empId)||null; },

  // Calcule solde CP pour un employé (en jours)
  calcCP(empId) {
    const bal=this.getLeaveBalance(empId);
    const initial=Number(bal?.cp_initial||0);
    const dateRef=bal?.date_reference;
    let acquis=0;
    if(dateRef) {
      const ref=new Date(dateRef+'T00:00:00');
      const now=new Date();
      const months=Math.max(0,(now.getFullYear()-ref.getFullYear())*12+(now.getMonth()-ref.getMonth()));
      acquis=Math.round(months*1.5*2)/2;
    }
    const pris=Cache.leaveRequests.filter(r=>r.employee_id===empId&&r.type==='cp'&&r.status==='approved').reduce((s,r)=>s+Number(r.nb_jours||0),0);
    return {initial,acquis,pris,solde:Math.max(0,initial+acquis-pris)};
  },

  // Calcule solde RECUP pour un employé
  calcRECUP(empId) {
    const bal=this.getLeaveBalance(empId);
    const initial=Number(bal?.recup_initial||0);
    const holidays=Cache.holidays.map(h=>h.date);
    const feries=Cache.pointage.filter(p=>p.employee_id===empId&&holidays.includes(p.date)&&['travaille','double'].includes(p.type)).length;
    const pris=Cache.leaveRequests.filter(r=>r.employee_id===empId&&r.type==='recup'&&r.status==='approved').reduce((s,r)=>s+Number(r.nb_jours||0),0);
    return {initial,acquis:feries,pris,solde:Math.max(0,initial+feries-pris)};
  },

  // Nombre de jours ouvrés (hors dimanche + fériés) entre deux dates
  countWorkDays(dateFrom, dateTo) {
    if(!dateFrom||!dateTo||dateTo<dateFrom) return 0;
    const holidays=Cache.holidays.map(h=>h.date);
    let count=0;
    const d=new Date(dateFrom+'T00:00:00');
    const end=new Date(dateTo+'T00:00:00');
    while(d<=end){
      if(d.getDay()!==0){
        const ds=d.toISOString().split('T')[0];
        if(!holidays.includes(ds)) count++;
      }
      d.setDate(d.getDate()+1);
    }
    return count;
  },

  async setLeaveBalance(empId, cpInitial, recupInitial, dateRef, session) {
    const now=nowISO();
    const existing=Cache.leaveBalances.find(b=>b.employee_id===empId);
    if(existing) {
      existing.cp_initial=cpInitial; existing.recup_initial=recupInitial;
      existing.date_reference=dateRef; existing.updated_by=session.username; existing.updated_at=now;
      await SB.from('sh_leave_balances').update({cp_initial:cpInitial,recup_initial:recupInitial,date_reference:dateRef,updated_by:session.username,updated_at:now}).eq('employee_id',empId);
    } else {
      const rec={id:uid(),employee_id:empId,cp_initial:cpInitial,recup_initial:recupInitial,date_reference:dateRef,updated_by:session.username,updated_at:now};
      Cache.leaveBalances.push(rec);
      await SB.from('sh_leave_balances').insert(rec);
    }
  },

  async approveLeaveByKA(reqId, notes, session) {
    const req=Cache.leaveRequests.find(r=>r.id===reqId); if(!req)return;
    const now=nowISO();
    req.status='pending_admin'; req.validated_by_ka=session.username; req.validated_at_ka=now; req.ka_notes=notes||''; req.updated_at=now;
    await SB.from('sh_leave_requests').update({status:'pending_admin',validated_by_ka:session.username,validated_at_ka:now,ka_notes:notes||'',updated_at:now}).eq('id',reqId);
    await this.addAudit('leave_approve_ka',reqId,session.username,null,{type:req.type,nb_jours:req.nb_jours},req.site_id);
  },

  async approveLeaveByAdmin(reqId, notes, session) {
    const req=Cache.leaveRequests.find(r=>r.id===reqId); if(!req)return;
    const now=nowISO();
    req.status='approved'; req.validated_by_admin=session.username; req.validated_at_admin=now; req.admin_notes=notes||''; req.updated_at=now;
    await SB.from('sh_leave_requests').update({status:'approved',validated_by_admin:session.username,validated_at_admin:now,admin_notes:notes||'',updated_at:now}).eq('id',reqId);
    // Créer les entrées de pointage pour chaque jour ouvré
    const d=new Date(req.date_debut+'T00:00:00');
    const end=new Date(req.date_fin+'T00:00:00');
    const holidays=Cache.holidays.map(h=>h.date);
    const ptType=req.type==='cp'?'conge':'recup';
    const emp=Cache.employees.find(e=>e.id===req.employee_id);
    if(emp) {
      while(d<=end){
        if(d.getDay()!==0){
          const ds=d.toISOString().split('T')[0];
          if(!holidays.includes(ds)){
            const lock=this.getLock(emp.site_id,ds.substring(0,7));
            if(!lock){
              const existPt=Cache.pointage.find(p=>p.employee_id===req.employee_id&&p.date===ds);
              const note=`${req.type==='cp'?'Congé Payé':'RECUP'} — Demande approuvée par ${session.username}`;
              if(!existPt){
                const entry={id:uid(),employee_id:req.employee_id,site_id:emp.site_id,date:ds,type:ptType,notes:note,created_by:session.username,created_at:now,updated_by:null,updated_at:null,validated:true,validated_by:session.username,validated_at:now};
                Cache.pointage.push(entry);
                await SB.from('sh_pointage').insert(entry);
              } else if(existPt.type==='off'||!existPt.type){
                existPt.type=ptType; existPt.notes=note; existPt.updated_by=session.username; existPt.updated_at=now; existPt.validated=true; existPt.validated_by=session.username; existPt.validated_at=now;
                await SB.from('sh_pointage').update({type:ptType,notes:note,updated_by:session.username,updated_at:now,validated:true,validated_by:session.username,validated_at:now}).eq('id',existPt.id);
              }
            }
          }
        }
        d.setDate(d.getDate()+1);
      }
    }
    await this.addAudit('leave_approve_admin',reqId,session.username,null,{type:req.type,nb_jours:req.nb_jours},req.site_id);
  },

  async rejectLeave(reqId, reason, session) {
    const req=Cache.leaveRequests.find(r=>r.id===reqId); if(!req)return;
    const now=nowISO();
    req.status='rejected'; req.rejected_by=session.username; req.rejected_at=now; req.rejection_reason=reason||''; req.updated_at=now;
    await SB.from('sh_leave_requests').update({status:'rejected',rejected_by:session.username,rejected_at:now,rejection_reason:reason||'',updated_at:now}).eq('id',reqId);
    await this.addAudit('leave_reject',reqId,session.username,null,{reason},req.site_id);
  },
  async validateShift(shiftId, session) {
    const shift=Cache.shifts.find(s=>s.id===shiftId); if(!shift)return;
    const now=nowISO();
    shift.validated_by_ka=session.username; shift.validated_at_ka=now;
    await SB.from('sh_shifts').update({validated_by_ka:session.username,validated_at_ka:now}).eq('id',shiftId);
    await this.addAudit('validate_shift',shiftId,session.username,null,null,shift.site_id);
  },

  // SYNTHESE
  getSynthese(siteId, year, month) {
    const entries=this.getPointage(siteId,year,month);
    const emps=this.getEmployees(siteId).filter(e=>e.actif);
    const result={};
    emps.forEach(emp=>{
      result[emp.id]={emp,totals:{}};
      TYPES.forEach(t=>{ result[emp.id].totals[t.key]=entries.filter(p=>p.employee_id===emp.id&&p.type===t.key).length; });
    });
    return result;
  },

  // Synthèse agrégée par collaborateur (toutes ses entrées, tous sites confondus)
  getSyntheseByCollab(year, month, siteId=null) {
    const entries=this.getPointage(siteId,year,month);
    const result={};
    entries.forEach(p=>{
      if(!result[p.employee_id]){
        const emp=Cache.employees.find(e=>e.id===p.employee_id); if(!emp) return;
        result[p.employee_id]={emp, totals:{}, sites:[]};
        TYPES.forEach(t=>result[p.employee_id].totals[t.key]=0);
      }
      result[p.employee_id].totals[p.type]=(result[p.employee_id].totals[p.type]||0)+1;
      if(!result[p.employee_id].sites.includes(p.site_id)) result[p.employee_id].sites.push(p.site_id);
    });
    // Aussi inclure les employés actifs du site sans entrées ce mois (pour cohérence)
    return Object.values(result).sort((a,b)=>(a.emp.nom+a.emp.prenom).localeCompare(b.emp.nom+b.emp.prenom));
  },

  // EXPORT CSV
  exportCSV(siteId, year, month) {
    const entries=this.getPointage(siteId,year,month);
    const emps=this.getEmployees(siteId);
    const site=this.getSiteById(siteId);
    let csv='N° IMM;Société;Site;Affectation;Collaborateur;Poste;Date;Code;Notes;Saisi par;Validé\n';
    entries.forEach(p=>{
      const emp=emps.find(e=>e.id===p.employee_id); if(!emp)return;
      csv+=`"${emp.imm||''}";"${emp.societe||''}";"${site?.nom||siteId}";"${emp.affectation||''}";"${emp.nom} ${emp.prenom}";"${emp.poste}";"${p.date}";"${TYPE_CODES[p.type]||p.type}";"${p.notes}";"${p.created_by}";"${p.validated?'Oui':'Non'}"\n`;
    });
    return csv;
  },

  exportCSVGlobal(year, month) {
    // Export de TOUS les sites en un seul fichier (détail jour par jour)
    const allSites=this.getSites().filter(s=>s.actif);
    const allEmps=this.getEmployees();
    const allEntries=this.getPointage(null,year,month);
    let csv='N° IMM;Société;Site;Affectation;Collaborateur;Poste;Date;Code;Notes;Saisi par;Validé\n';
    allEntries.forEach(p=>{
      const emp=allEmps.find(e=>e.id===p.employee_id); if(!emp)return;
      const site=allSites.find(s=>s.id===p.site_id);
      csv+=`"${emp.imm||''}";"${emp.societe||''}";"${site?.nom||p.site_id||''}";"${emp.affectation||''}";"${emp.nom} ${emp.prenom}";"${emp.poste}";"${p.date}";"${TYPE_CODES[p.type]||p.type}";"${p.notes||''}";"${p.created_by||''}";"${p.validated?'Oui':'Non'}"\n`;
    });
    return csv;
  },

  exportSyntheseBySociete(year, month, societe) {
    // Export synthèse (totaux par collaborateur) filtrée par société
    const allData=this.getSyntheseByCollab(year, month, null);
    const filtered=societe?allData.filter(({emp})=>emp.societe===societe):allData;
    const typeKeys=TYPES.map(t=>t.key);
    const typeHeaders=TYPES.map(t=>t.short).join(';');
    let csv=`N° IMM;Société;Site(s);Affectation;Collaborateur;Poste;${typeHeaders};TOTAL\n`;
    filtered.forEach(({emp,totals,sites})=>{
      const siteNames=sites.map(sid=>this.getSiteById(sid)?.nom||sid).join(' / ');
      const typeCols=typeKeys.map(k=>totals[k]||0).join(';');
      const total=typeKeys.reduce((s,k)=>s+(totals[k]||0),0);
      csv+=`"${emp.imm||''}";"${emp.societe||''}";"${siteNames}";"${emp.affectation||''}";"${emp.nom} ${emp.prenom}";"${emp.poste}";${typeCols};${total}\n`;
    });
    return csv;
  },
};

const SESSION_TIMEOUT_MS = 30 * 60 * 1000; // 30 minutes
let _sessionTimer = null;
let _sessionLastActivity = Date.now();

function _resetSessionTimer() {
  _sessionLastActivity = Date.now();
  if(_sessionTimer) clearTimeout(_sessionTimer);
  _sessionTimer = setTimeout(async () => {
    // Vérifier qu'on est bien connecté
    if(!currentSession?.id) return;
    // Sauvegarder la page courante avant déconnexion
    try { localStorage.setItem('sh_session_page', App.currentPage); } catch {}
    // Afficher un message avant déconnexion
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:sans-serif';
    overlay.innerHTML = '<div style="background:white;border-radius:16px;padding:36px;max-width:360px;width:90%;text-align:center"><div style="font-size:36px;margin-bottom:12px">⏱</div><h3 style="margin-bottom:8px;color:#272724">Session expirée</h3><p style="color:#6b6b60;font-size:13px;margin-bottom:20px">Votre session a expiré après 30 minutes d\'inactivité. Vous allez être déconnecté.</p></div>';
    document.body.appendChild(overlay);
    setTimeout(() => { App.logout(); }, 2000);
  }, SESSION_TIMEOUT_MS);
}

function _initSessionWatcher() {
  _resetSessionTimer();
  // Réinitialiser le timer sur toute interaction utilisateur
  ['click','keydown','scroll','mousemove','touchstart','touchmove'].forEach(ev => {
    document.addEventListener(ev, _resetSessionTimer, { passive: true });
  });
}

  showLogin() {
    document.body.innerHTML=`
    <div class="login-page"><div class="login-card">
      <div class="login-logo">
        <h1><span class="logo-circle">●</span> StayHere <span class="logo-triangle">▲</span></h1>
        <p>Système de Pointage — Gestion RH</p>
      </div>
      <div id="login-error" class="alert alert-danger hidden"></div>

        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:8px">Se connecter</button>
      </form>
    </div></div>`;
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('un').value.trim().toLowerCase();
      const password = document.getElementById('pw').value;
      const errEl = document.getElementById('login-error');
      const btn = document.querySelector('#login-form button[type=submit]');
      if(btn) { btn.textContent = 'Connexion...'; btn.disabled = true; }

      try {
        let profile = null;

        // ── Tentative 1 : Supabase Auth (utilisateur déjà migré) ──
        const email = username + '@stayhere.internal';
        const { data, error } = await SB.auth.signInWithPassword({ email, password });

        if (!error && data?.user) {
          // Utilisateur déjà migré → récupérer son profil
          const { data: p } = await SB.from('sh_user_profiles').select('*').eq('id', data.user.id).single();
          profile = p;
        } else {
          // ── Tentative 2 : Migration automatique (premier login) ──
          if(btn) btn.textContent = 'Migration du compte…';
          const res = await fetch(`${SB_URL}/functions/v1/auto-migrate-user`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
            body: JSON.stringify({ username, password }),
          });
          const json = await res.json();

          if (!res.ok || !json.ok) {
            // Mauvais identifiants (ni dans Auth ni dans sh_users)
            errEl.textContent = 'Identifiant ou mot de passe incorrect.';
            errEl.classList.remove('hidden');
            if(btn) { btn.textContent = 'Se connecter'; btn.disabled = false; }
            return;
          }

          // Migration réussie → restaurer la session Supabase retournée par l'Edge Function
          await SB.auth.setSession({
            access_token: json.session.access_token,
            refresh_token: json.session.refresh_token,
          });
          profile = json.profile;
        }

        if (!profile) {
          errEl.textContent = 'Profil utilisateur introuvable. Contactez l\'administrateur.';
          errEl.classList.remove('hidden');
          await SB.auth.signOut();
          if(btn) { btn.textContent = 'Se connecter'; btn.disabled = false; }
          return;
        }
        if (profile.acces_principal === false) {
          errEl.textContent = 'Vous n\'avez pas accès à cette application.';
          errEl.classList.remove('hidden');
          await SB.auth.signOut();
          if(btn) { btn.textContent = 'Se connecter'; btn.disabled = false; }
          return;
        }

        currentSession = { ...profile };
        await loadAll();
        this.showApp();
        this.setupRealtime();
        _initSessionWatcher();
      } catch(err) {
        errEl.textContent = 'Erreur de connexion : ' + err.message;
        errEl.classList.remove('hidden');
        if(btn) { btn.textContent = 'Se connecter'; btn.disabled = false; }
      }
    });
  },

  // ---- REAL-TIME ----
  setupRealtime() {
    if(!SB) return;
    SB.channel('app-changes')
      .on('postgres_changes',{event:'*',schema:'public',table:'sh_pointage'}, async ()=>{
        setSyncStatus('busy','↻ Mise à jour...');
        await refreshPointage();
        setSyncStatus('ok','● En ligne');
        if(this.currentPage==='pointage') this.renderPointage();
        if(this.currentPage==='validation') this.renderValidation();
        if(this.currentPage==='planning') this.renderPlanning();
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'sh_locks'}, async ()=>{
        const {data}=await SB.from('sh_locks').select('*');
        Cache.locks=data||[];
        if(this.currentPage==='verrous') this.renderVerrous();
        if(this.currentPage==='pointage') this.renderPointage();
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'sh_shifts'}, async ()=>{
        setSyncStatus('busy','↻ Mise à jour...');
        const {data}=await SB.from('sh_shifts').select('*').order('date',{ascending:false}).limit(2000);
        Cache.shifts=data||[];
        setSyncStatus('ok','● En ligne');
        if(this.currentPage==='shifts') this.renderShifts();
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'sh_users'}, async (payload)=>{
        // Refresh users cache
        const {data}=await SB.from('sh_users').select('*');
        Cache.users=data||[];
        // If IT'S the current user who was updated → rebuild entire app with new permissions
        if(payload.new && payload.new.id===currentSession?.id) {
          currentSession=payload.new;
          localStorage.setItem('sh_session',JSON.stringify(payload.new));
          this.showApp();
          this.setupRealtime();
        }
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'sh_employees'}, async ()=>{
        const {data}=await SB.from('sh_employees').select('*');
        Cache.employees=data||[];
        if(this.currentPage==='pointage') this.renderPointage();
        if(this.currentPage==='shifts') this.renderShifts();
        if(this.currentPage==='planning') this.renderPlanning();
        if(this.currentPage==='collaborateurs') this.renderCollaborateurs();
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'sh_shift_change_requests'}, async ()=>{
        setSyncStatus('busy','↻ Mise à jour...');
        const {data}=await SB.from('sh_shift_change_requests').select('*').order('requested_at',{ascending:false});
        Cache.shiftChangeRequests=data||[];
        setSyncStatus('ok','● En ligne');
        if(this.currentPage==='shifts') this.renderShifts();
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'sh_leave_requests'}, async ()=>{
        setSyncStatus('busy','↻ Mise à jour...');
        const {data}=await SB.from('sh_leave_requests').select('*').order('created_at',{ascending:false});
        Cache.leaveRequests=data||[];
        setSyncStatus('ok','● En ligne');
        if(this.currentPage==='conges') this.renderConges();
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'sh_leave_balances'}, async ()=>{
        const {data}=await SB.from('sh_leave_balances').select('*');
        Cache.leaveBalances=data||[];
        if(this.currentPage==='conges') this.renderConges();
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'sh_temp_assignments'}, async ()=>{
        const {data}=await SB.from('sh_temp_assignments').select('*').order('date_debut',{ascending:false});
        Cache.tempAssignments=data||[];
        if(this.currentPage==='collaborateurs') this.renderCollaborateurs();
        if(this.currentPage==='planning') this.renderPlanning();

      .on('postgres_changes',{event:'*',schema:'public',table:'sh_weekly_schedule'}, async ()=>{
        const {data}=await SB.from('sh_weekly_schedule').select('*');

        if(this.currentPage==='rotation') this.renderRotation();
      })
      .subscribe();
  },

  async refresh() {
    setSyncStatus('busy','↻ Actualisation...');
    try {
      await loadAll();
      // Sync session with fresh DB data
      if(currentSession?.id) {
        const freshUser=Cache.users.find(u=>u.id===currentSession.id);
        if(freshUser) {
          const roleChanged=freshUser.role!==currentSession.role;
          currentSession=freshUser;
          localStorage.setItem('sh_session',JSON.stringify(freshUser));
          if(roleChanged) { this.showApp(); this.setupRealtime(); return; }
        }
      }
      setSyncStatus('ok','● En ligne'); this.renderPage();
    }
    catch { setSyncStatus('error','⚠ Hors ligne'); }
  },

  _perm(key) { return !!DB.getPerms(currentSession?.role)?.[key]; },
  canGlobal()   { return this._perm('voir_tous_sites'); },
  canValidate() { return this._perm('valider'); },
  canManage()   { return this._perm('administrer'); },
  canLock()     { return this._perm('verrouiller'); },
  canExport()              { return this._perm('exporter'); },
  canVoirEquipe()          { return this._perm('voir_equipe'); },
  canVoirEquipeTerrain()   { return this._perm('voir_equipe_terrain'); },
  canSaisirMap()           { return this._perm('saisir_restreint') || canSaisirTypeRestreint(); },
  canSaisirPlanning()      { return this._perm('saisir_planning'); },
  canModifierShiftsPrevus(){ return this._perm('modifier_shifts_prevus'); },
  canGererRotation()       { return this._perm('gerer_rotation'); },

  // Retourne les collaborateurs visibles selon le rôle de l'utilisateur connecté
  _getVisibleEmps(siteId) {
    // Date de référence : 1er jour de la semaine de planning si on est sur cette page, sinon aujourd'hui
    const refDate=(this.currentPage==='planning'&&this._planningWeek)?this._planningWeek:todayStr();
    // Tous les employés actifs, filtrés par site effectif (permanent OU temporaire à cette date)
    const all=DB.getEmployees().filter(e=>e.actif);
    const inSite=siteId?all.filter(e=>DB.getEffectiveSiteId(e.id,refDate)===siteId):all;

    if(this.canGlobal()) return inSite;
    if(this.canVoirEquipe()) return inSite;
    if(this.canVoirEquipeTerrain()) {
      return inSite.filter(e=>POSTES_TERRAIN.includes(e.poste)||e.id===currentSession.employee_id);
    }
    if(currentSession.employee_id) return inSite.filter(e=>e.id===currentSession.employee_id);
    return [];
  },

  // Peut modifier le pointage d'un employé donné (pas seulement voir)
  _canEditEmp(empId) {
    if(this.canManage()) return true;
    if(this.canVoirEquipe()) return true;
    if(this.canVoirEquipeTerrain()) {
      const emp=DB.getEmployees().find(e=>e.id===empId);
      return emp&&POSTES_TERRAIN.includes(emp.poste);
    }
    return empId===currentSession.employee_id;
  },
