  _captureSiteGPS(){
    const fb=document.getElementById('gps-feedback');
    const btn=document.getElementById('btn-capture-gps');
    if(!navigator.geolocation){if(fb)fb.textContent='Géolocalisation non disponible sur cet appareil.';return;}
    if(btn){btn.disabled=true;btn.textContent='⏳ Localisation...';}
    if(fb){fb.textContent='Récupération des coordonnées GPS…';fb.style.color='var(--text-muted)';}
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const lat=pos.coords.latitude.toFixed(6);
        const lng=pos.coords.longitude.toFixed(6);
        const acc=Math.round(pos.coords.accuracy);
        const latEl=document.getElementById('site-lat');
        const lngEl=document.getElementById('site-lng');
        if(latEl)latEl.value=lat;
        if(lngEl)lngEl.value=lng;
        if(btn){btn.disabled=false;btn.textContent='📍 Ma position actuelle';}
        if(fb){fb.textContent=`✓ Position capturée : ${lat}, ${lng} (précision ±${acc}m)`;fb.style.color='var(--success)';}
      },
      (err)=>{
        if(btn){btn.disabled=false;btn.textContent='📍 Ma position actuelle';}
        let msg='Impossible d\'obtenir la position.';
        if(err.code===1)msg='Accès à la géolocalisation refusé dans les paramètres du navigateur.';
        else if(err.code===2)msg='Signal GPS indisponible. Essayez depuis le site physique.';
        else if(err.code===3)msg='Délai dépassé. Réessayez.';
        if(fb){fb.textContent=msg;fb.style.color='var(--danger)';}
      },
      {enableHighAccuracy:true,timeout:12000,maximumAge:0}
    );
  },

  async saveUser(id=null){
    const username=document.getElementById('u-un').value.trim();
    const nom=document.getElementById('u-nom').value.trim();
    const role=document.getElementById('u-role').value;
    const perms=DB.getPerms(role);
    const site_id=perms.voir_tous_sites?null:(document.getElementById('u-site')?.value||null)||null;
    const employee_id=document.getElementById('u-employee')?.value||null;
    const acces_principal=document.getElementById('u-acces-principal')?.checked!==false;
    const acces_horloge=document.getElementById('u-acces-horloge')?.checked!==false;
    if(!username||!nom){alert('Identifiant et nom requis.');return;}
    setSyncStatus('busy','↻...');
    if(id){
      await DB.updateUser(id,{nom,role,site_id,employee_id:employee_id||null,acces_principal,acces_horloge});
      if(id===currentSession.id){currentSession={...currentSession,nom,role,site_id};localStorage.setItem('sh_session',JSON.stringify(currentSession));}
    } else {
      if(DB.getUsers().find(u=>u.username.toLowerCase()===username.toLowerCase())){alert('Identifiant déjà utilisé.');setSyncStatus('ok','● En ligne');return;}
      const password=document.getElementById('u-pw')?.value||'';
      if(!password){alert('Mot de passe requis.');setSyncStatus('ok','● En ligne');return;}
      const password_hash=await sha256(password);
      await DB.addUser({username,nom,password,password_hash,role,site_id,employee_id:employee_id||null,acces_principal,acces_horloge});
    }
    setSyncStatus('ok','● En ligne'); this.closeModal(); this.renderUtilisateurs();
  },

  openChangePwd(id){this.showModal(`<div class="modal-header"><div class="modal-title">Changer le mot de passe</div><button class="modal-close" onclick="App.closeModal()">✕</button></div><div class="form-group"><label>Nouveau mot de passe</label><input id="pw1" type="password"></div><div class="form-group"><label>Confirmer</label><input id="pw2" type="password"></div><div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.savePwd('${id}')">Enregistrer</button></div>`);},
  async savePwd(id){
    const p1=document.getElementById('pw1').value;
    const p2=document.getElementById('pw2').value;
    if(!p1){alert('Requis.');return;}
    if(p1.length<6){alert('Minimum 6 caractères.');return;}
    if(p1!==p2){alert('Les mots de passe ne correspondent pas.');return;}
    // Trouver le username de l'utilisateur cible
    const targetUser = Cache.users.find(u=>u.id===id);
    if(!targetUser){alert('Utilisateur introuvable.');return;}
    try {
      const {data:{session:sbSess}} = await SB.auth.getSession();
      const res = await fetch(`${SB_URL}/functions/v1/admin-reset-password`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${sbSess?.access_token}`,'apikey':SB_KEY},
        body:JSON.stringify({targetUsername:targetUser.username,newPassword:p1})
      });
      const json = await res.json();
      if(!res.ok||!json.ok) throw new Error(json.error||`Erreur ${res.status}`);
      this.closeModal();
      alert('✓ Mot de passe modifié avec succès.');
    } catch(e){alert('Erreur : '+e.message);}
  },

      <div style="margin-bottom:8px"><label>Permissions</label></div>

      <div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.saveRole()">Créer le rôle</button></div>`);
  },

    const role={id:this._toSlug(nom)||uid(),nom,
      voir_tous_sites:    document.getElementById('perm-voir_tous_sites')?.checked||false,
      voir_equipe:        document.getElementById('perm-voir_equipe')?.checked||false,
      voir_equipe_terrain:document.getElementById('perm-voir_equipe_terrain')?.checked||false,
      valider:            document.getElementById('perm-valider')?.checked||false,
      administrer:        document.getElementById('perm-administrer')?.checked||false,
      verrouiller:        document.getElementById('perm-verrouiller')?.checked||false,
      exporter:           document.getElementById('perm-exporter')?.checked||false,
      saisir_restreint:   document.getElementById('perm-saisir_restreint')?.checked||false,
      saisir_planning:    document.getElementById('perm-saisir_planning')?.checked||false,
      modifier_shifts_prevus:document.getElementById('perm-modifier_shifts_prevus')?.checked||false,
      gerer_rotation:     document.getElementById('perm-gerer_rotation')?.checked||false,
    };
    setSyncStatus('busy','↻...');
    await DB.addRole(role);
    setSyncStatus('ok','● En ligne'); this.closeModal(); this.renderParametres();
  },
  async togglePerm(roleId, permKey, val, labelEl){
    if(labelEl) labelEl.classList.toggle('checked',val);
    setSyncStatus('busy','↻ Sauvegarde...');
    try {
      await DB.updateRole(roleId,{[permKey]:val});
      setSyncStatus('ok','● En ligne');
    } catch(e) {
      setSyncStatus('error','⚠ Erreur');
      alert('Erreur lors de la sauvegarde : '+e.message);
      // Rétablir visuellement
      if(labelEl) labelEl.classList.toggle('checked',!val);
    }
  },
  async deleteRole(id){
    try{if(!confirm('Supprimer ce rôle ?'))return;setSyncStatus('busy','↻...');await DB.deleteRole(id);setSyncStatus('ok','● En ligne');this.renderParametres();}
    catch(e){setSyncStatus('ok','● En ligne');alert(e.message);}
  },

  async addPoste() {
    const input=document.getElementById('new-poste');
    const nom=input?.value.trim(); if(!nom){alert('Nom du poste requis.');return;}
    if(DB.getPostes().includes(nom)){alert('Ce poste existe déjà.');return;}
    setSyncStatus('busy','↻...');
    await DB.addPoste(nom);
    setSyncStatus('ok','● En ligne'); input.value=''; this.renderParametres();

    const used=Cache.employees.some(e=>e.poste===nom);
    if(used&&!confirm(`Ce poste est utilisé par des collaborateurs. Supprimer quand même ?`))return;
    setSyncStatus('busy','↻...');
    await DB.removePoste(nom);
    setSyncStatus('ok','● En ligne'); this.renderParametres();
  },

  async addAffectation() {
    const input=document.getElementById('new-aff');
    const nom=input?.value.trim(); if(!nom){alert('Nom requis.');return;}
    if(DB.getAffectations().includes(nom)){alert('Cette affectation existe déjà.');return;}
    setSyncStatus('busy','↻...');
    await DB.addAffectation(nom);
    setSyncStatus('ok','● En ligne'); input.value=''; this.renderParametres();
  },

    if(used&&!confirm(`Cette affectation est utilisée par des collaborateurs. Supprimer quand même ?`))return;

  // ---- CONGÉS & RECUP ----
  _congesTab: 'pending',

  renderConges() {
    const isKA = currentSession.role==='kindness_ambassador';
    const isAdmin = this.canManage();
    const isClusterOps = currentSession.role==='cluster_ops';
    const activeTab = this._congesTab||'pending';

    const fmtDate = ds => { if(!ds)return'—'; const[y,m,d]=ds.split('-'); return`${d}/${m}/${y}`; };
    const fmtDays = n => `${n} j.`;

    const statusBadge = s => ({
      pending_ka:`<span class="leave-status leave-pending-ka">⏳ Attente KA</span>`,
      pending_admin:`<span class="leave-status leave-pending-admin">⏳ Attente Admin</span>`,
      approved:`<span class="leave-status leave-approved">✓ Approuvé</span>`,
      rejected:`<span class="leave-status leave-rejected">✕ Refusé</span>`,
    })[s]||`<span class="leave-status">${s}</span>`;

    const typeBadge = t => t==='cp'
      ?`<span class="leave-type-pill lp-cp">Congé Payé</span>`
      :`<span class="leave-type-pill lp-recup">RECUP</span>`;

    const empName = e => e?`${e.prenom} ${e.nom}`:'—';

    // --- Filtrage des demandes selon le rôle ---
    let pendingReqs = [];
    if(isKA) {
      // KA : voit les demandes de son site en attente de sa validation
      pendingReqs = Cache.leaveRequests.filter(r=>r.site_id===currentSession.site_id&&r.status==='pending_ka');
    } else if(isAdmin) {
      // Admin : voit les demandes en attente d'admin (déjà validées par KA)
      pendingReqs = isClusterOps
        ? Cache.leaveRequests.filter(r=>r.status==='pending_ka'||r.status==='pending_admin')
        : Cache.leaveRequests.filter(r=>r.status==='pending_admin');
    }

    // --- Historique ---
    const sites = DB.getSites().filter(s=>s.actif);
    let histReqs = isKA
      ? Cache.leaveRequests.filter(r=>r.site_id===currentSession.site_id)
      : Cache.leaveRequests;
    histReqs = [...histReqs].sort((a,b)=>b.created_at.localeCompare(a.created_at));

    // --- Onglet "À valider" ---
    const renderPending = () => {
      if(pendingReqs.length===0) return `<div class="card"><div style="text-align:center;padding:40px;color:var(--text-muted)">✓ Aucune demande en attente de validation</div></div>`;
      const rows = pendingReqs.map(r=>{
        const emp = DB.getEmployees().find(e=>e.id===r.employee_id);
        const site = DB.getSiteById(r.site_id);
        const showKABtn = (isKA || isClusterOps) && r.status==='pending_ka';
        const showAdminBtn = isAdmin && (r.status==='pending_admin' || (isClusterOps&&r.status==='pending_ka'));
        return `<tr>
          <td><strong>${empName(emp)}</strong><div style="font-size:11px;color:var(--text-muted)">${site?.nom||r.site_id}</div></td>
          <td>${typeBadge(r.type)}</td>
          <td>${fmtDate(r.date_debut)} → ${fmtDate(r.date_fin)}<div style="font-size:11px;color:var(--text-muted)">${fmtDays(r.nb_jours)}</div></td>
          <td>${statusBadge(r.status)}</td>
          <td>${r.notes||'<span class="text-muted">—</span>'}</td>
          <td><div class="val-actions">
            ${showKABtn?`<button class="btn btn-success btn-xs" onclick="App.congesApproveKA('${r.id}')">✓ Valider KA</button>`:''}
            ${showAdminBtn?`<button class="btn btn-primary btn-xs" onclick="App.congesApproveAdmin('${r.id}')">✓ Approuver</button>`:''}
            <button class="btn btn-danger btn-xs" onclick="App.congesReject('${r.id}')">✕ Refuser</button>
          </div></td>
        </tr>`;
      }).join('');
      return `<div class="table-wrapper"><table class="data-table">
        <thead><tr><th>Collaborateur</th><th>Type</th><th>Période</th><th>Statut</th><th>Motif</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody></table></div>`;
    };

    // --- Onglet "Historique" ---
    const renderHistory = () => {
      if(histReqs.length===0) return `<div class="card"><div style="text-align:center;padding:40px;color:var(--text-muted)">Aucune demande</div></div>`;
      const rows = histReqs.map(r=>{
        const emp = DB.getEmployees().find(e=>e.id===r.employee_id);
        const site = DB.getSiteById(r.site_id);
        return `<tr>
          <td><strong>${empName(emp)}</strong><div style="font-size:11px;color:var(--text-muted)">${site?.nom||''}</div></td>
          <td>${typeBadge(r.type)}</td>
          <td>${fmtDate(r.date_debut)} → ${fmtDate(r.date_fin)}<div style="font-size:11px;color:var(--text-muted)">${fmtDays(r.nb_jours)}</div></td>
          <td>${statusBadge(r.status)}</td>
          <td style="font-size:11px;color:var(--text-muted)">
            ${r.validated_by_ka?`KA: ${r.validated_by_ka}<br>`:''}
            ${r.validated_by_admin?`Admin: ${r.validated_by_admin}<br>`:''}
            ${r.rejected_by?`Refus: ${r.rejected_by}${r.rejection_reason?' — '+r.rejection_reason:''}`:'' }
          </td>
          <td style="font-size:11px;color:var(--text-muted)">${fmtDT(r.created_at)}</td>
        </tr>`;
      }).join('');
      return `<div class="table-wrapper"><table class="data-table">
        <thead><tr><th>Collaborateur</th><th>Type</th><th>Période</th><th>Statut</th><th>Validations</th><th>Soumis le</th></tr></thead>
        <tbody>${rows}</tbody></table></div>`;
    };

    // --- Onglet "Soldes" (admin uniquement) ---
    const renderSoldes = () => {
      if(!isAdmin) return `<div class="alert alert-info">Accès réservé aux administrateurs.</div>`;
      const emps = this.canGlobal()
        ? DB.getEmployees().filter(e=>e.actif)
        : DB.getEmployees(currentSession.site_id).filter(e=>e.actif);
      const cards = emps.map(emp=>{
        const cp = DB.calcCP(emp.id);
        const recup = DB.calcRECUP(emp.id);
        const bal = DB.getLeaveBalance(emp.id);
        const site = DB.getSiteById(emp.site_id);
        return `<div class="balance-card-admin">
          <div class="bal-name">${emp.prenom} ${emp.nom}</div>
          <div class="bal-sub">${emp.poste}${site?' · '+site.nom:''}</div>
          <div class="bal-row"><span class="bal-label">CP disponible</span><span class="bal-val bal-cp">${cp.solde} j</span></div>
          <div class="bal-row"><span class="bal-label">CP initial</span><span class="bal-val">${cp.initial} j</span></div>
          <div class="bal-row"><span class="bal-label">CP acquis (auto)</span><span class="bal-val">${cp.acquis} j</span></div>
          <div class="bal-row"><span class="bal-label">CP pris</span><span class="bal-val">${cp.pris} j</span></div>
          <div class="bal-row" style="margin-top:4px"><span class="bal-label">RECUP disponible</span><span class="bal-val bal-recup">${recup.solde} j</span></div>
          <div class="bal-row"><span class="bal-label">RECUP initial</span><span class="bal-val">${recup.initial} j</span></div>
          <div class="bal-row"><span class="bal-label">Fériés travaillés</span><span class="bal-val">${recup.acquis} j</span></div>
          <div class="bal-row"><span class="bal-label">RECUP pris</span><span class="bal-val">${recup.pris} j</span></div>
          <div class="bal-row"><span class="bal-label" style="font-size:11px">Réf. date accrual</span><span style="font-size:11px;color:var(--text-muted)">${bal?.date_reference||'Non définie'}</span></div>
          <button class="btn btn-secondary btn-sm" style="width:100%;margin-top:10px;justify-content:center" onclick="App.congesEditBalance('${emp.id}')">✎ Modifier le solde</button>
        </div>`;
      }).join('');
      return `<div class="alert alert-info" style="margin-bottom:16px">
        <strong>Règles automatiques :</strong> +1,5 j CP par mois entier travaillé (depuis la date de référence) · Jours fériés travaillés → RECUP automatiquement
      </div>
      <div class="balance-grid">${cards||'<p class="text-muted">Aucun collaborateur actif.</p>'}</div>`;
    };

    const tabContent = {pending:renderPending, history:renderHistory, soldes:renderSoldes}[activeTab]?.() || '';

    document.getElementById('page-content').innerHTML=`
      <div class="leave-tabs">
        <button class="leave-tab-btn ${activeTab==='pending'?'active':''}" onclick="App._congesTab='pending';App.renderConges()">
          À valider ${pendingReqs.length>0?`<span style="background:var(--accent);color:white;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px">${pendingReqs.length}</span>`:''}
        </button>
        <button class="leave-tab-btn ${activeTab==='history'?'active':''}" onclick="App._congesTab='history';App.renderConges()">Historique</button>
        ${isAdmin?`<button class="leave-tab-btn ${activeTab==='soldes'?'active':''}" onclick="App._congesTab='soldes';App.renderConges()">Soldes</button>`:''}
      </div>
      ${tabContent}`;
  },

  async congesApproveKA(reqId) {
    const notes = prompt('Note KA (optionnel) :') ?? null;
    if(notes === null) return;
    setSyncStatus('busy','↻...');
    try { await DB.approveLeaveByKA(reqId,notes,currentSession); setSyncStatus('ok','● En ligne'); this.renderConges(); }
    catch(e) { setSyncStatus('error','⚠'); alert(e.message); }
  },

  async congesApproveAdmin(reqId) {
    const req = Cache.leaveRequests.find(r=>r.id===reqId); if(!req)return;
    const emp = DB.getEmployees().find(e=>e.id===req.employee_id);
    const cp = req.type==='cp'?DB.calcCP(req.employee_id):null;
    const recup = req.type==='recup'?DB.calcRECUP(req.employee_id):null;
    const bal = req.type==='cp'?cp.solde:recup.solde;
    const msg = `Approuver ${req.type==='cp'?'Congé Payé':'RECUP'} pour ${emp?emp.prenom+' '+emp.nom:''}?\n${req.nb_jours} jour(s) — du ${req.date_debut} au ${req.date_fin}\nSolde actuel : ${bal} j\n\nNotes (optionnel) :`;
    const notes = prompt(msg) ?? null;
    if(notes === null) return;
    if(Number(req.nb_jours)>bal&&!confirm(`Solde insuffisant (${bal} j disponibles). Approuver quand même ?`)) return;
    setSyncStatus('busy','↻ Approbation...');
    try { await DB.approveLeaveByAdmin(reqId,notes,currentSession); setSyncStatus('ok','● En ligne'); this.renderConges(); }
    catch(e) { setSyncStatus('error','⚠'); alert(e.message); }
  },

  async congesReject(reqId) {
    const reason = prompt('Motif du refus (obligatoire) :');
    if(!reason?.trim()) { alert('Le motif est obligatoire.'); return; }
    setSyncStatus('busy','↻...');
    try { await DB.rejectLeave(reqId,reason.trim(),currentSession); setSyncStatus('ok','● En ligne'); this.renderConges(); }
    catch(e) { setSyncStatus('error','⚠'); alert(e.message); }
  },

        <div class="modal-title">💰 Soldes CP & RECUP — ${emp.prenom} ${emp.nom}</div>

      </div>
      <p class="text-muted text-sm mb-16">${emp.poste}${site?' · '+site.nom:''}</p>

      <!-- Récapitulatif actuel -->

          <div style="font-size:11px;font-weight:700;color:var(--recup);text-transform:uppercase;letter-spacing:0.5px">Jours RECUP disponibles</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:6px;line-height:1.6">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label>Solde CP antérieur (jours)</label>
            <input type="number" id="bal-cp" value="${bal?.cp_initial||0}" min="0" step="0.5" style="font-size:18px;font-weight:700;text-align:center">

            <label>Solde RECUP antérieur (jours)</label>
            <input type="number" id="bal-recup" value="${bal?.recup_initial||0}" min="0" step="0.5" style="font-size:18px;font-weight:700;text-align:center">

      <div class="modal-actions">

  async congesSaveBalance(empId) {
    const cp = parseFloat(document.getElementById('bal-cp')?.value||'0');
    const recup = parseFloat(document.getElementById('bal-recup')?.value||'0');
    const ref = document.getElementById('bal-ref')?.value||'';
    if(isNaN(cp)||cp<0||isNaN(recup)||recup<0){alert('Valeurs invalides (doit être ≥ 0).');return;}
    setSyncStatus('busy','↻ Sauvegarde...');
    try {
      await DB.setLeaveBalance(empId,cp,recup,ref||null,currentSession);
      setSyncStatus('ok','● En ligne');
      this.closeModal();
      // Rafraîchir la page courante
      if(this.currentPage==='conges') this.renderConges();
      else if(this.currentPage==='collaborateurs') this.renderCollaborateurs();
    }
    catch(e) { setSyncStatus('error','⚠ Erreur'); alert('Erreur lors de la sauvegarde : '+e.message); }
  },

  // ---- AUDIT ----
  renderAudit(){
    const log=DB.getAudit(this.canGlobal()?null:this.currentSite).slice(0,300);
    const sites=DB.getSites();
    const icons={create:{i:'+',cls:'audit-create',l:'Création'},update:{i:'✎',cls:'audit-update',l:'Modification'},delete:{i:'✕',cls:'audit-delete',l:'Suppression'},validate:{i:'✓',cls:'audit-validate',l:'Validation'},lock:{i:'🔒',cls:'audit-lock',l:'Verrouillage'},unlock:{i:'🔓',cls:'audit-lock',l:'Déverrouillage'}};
    const items=log.map(entry=>{const a=icons[entry.action]||{i:'?',cls:'',l:entry.action};const site=sites.find(s=>s.id===entry.site_id);const oldV=entry.old_value?`<br><span style="color:#999">Avant: ${JSON.stringify(entry.old_value)}</span>`:'';const newV=entry.new_value?`<br><span>Après: ${JSON.stringify(entry.new_value)}</span>`:'';
      return`<div class="audit-item"><div class="audit-icon ${a.cls}">${a.i}</div><div class="audit-body"><strong>${a.l}</strong>${site?` · ${site.nom}`:''}${oldV}${newV}<div class="audit-time">Par <strong>${entry.username}</strong> · ${fmtDT(entry.created_at)}</div></div></div>`;
    }).join('');
    document.getElementById('page-content').innerHTML=`<div class="card"><div class="card-header"><div class="card-title">📋 ${log.length} modifications</div><button class="btn btn-secondary btn-sm" onclick="App.refresh()">↻ Actualiser</button></div>${items||'<p class="text-muted">Aucune modification enregistrée.</p>'}</div>`;
  },

  // ---- VERROUS ----
  renderVerrous(){
    const sites=DB.getSites().filter(s=>s.actif);
    const rows=sites.map(site=>{
      const months=Array.from({length:12},(_,i)=>{const ym=`${this.currentYear}-${String(i+1).padStart(2,'0')}`;const lock=DB.getLock(site.id,ym);return{ym,lock,lbl:fmtMonth(this.currentYear,i)};});
      return`<div class="card"><div class="card-header"><div class="card-title">🏠 ${site.nom}</div></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px">
          ${months.map(({ym,lock,lbl})=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
            <span style="font-size:13px;font-weight:600">${lbl}</span>
            ${lock?`<span class="lock-indicator">🔒 ${lock.locked_by} <button style="background:transparent;border:none;cursor:pointer;color:inherit;font-size:12px" onclick="App.removeLock('${site.id}','${ym}')">✕</button></span>`:`<button class="btn btn-ghost btn-xs" onclick="App.addLock('${site.id}','${ym}')">🔓 Verrouiller</button>`}
          </div>`).join('')}
        </div></div>`;
    }).join('');
    document.getElementById('page-content').innerHTML=`<div class="alert alert-info">Une période verrouillée empêche toute saisie. Seul le Cluster Ops Manager peut verrouiller/déverrouiller.</div>${rows}`;
  },
  async addLock(siteId,ym){if(!confirm(`Verrouiller ${ym} ?`))return;setSyncStatus('busy','↻...');await DB.addLock(siteId,ym,currentSession);setSyncStatus('ok','● En ligne');this.renderVerrous();},
  async removeLock(siteId,ym){if(!confirm(`Déverrouiller ${ym} ?`))return;setSyncStatus('busy','↻...');await DB.removeLock(siteId,ym,currentSession);setSyncStatus('ok','● En ligne');this.renderVerrous();},

  // ---- MODALE ----
  showModal(html, large=false){const o=document.createElement('div');o.className='modal-overlay';o.id='modal-overlay';o.innerHTML=`<div class="modal${large?' modal-lg':''}">${html}</div>`;o.addEventListener('click',e=>{if(e.target===o)this.closeModal();});document.body.appendChild(o);},
  closeModal(){document.getElementById('modal-overlay')?.remove();this._saisieType=null;},

  // ---- LOGOUT ----
  async logout(){
    if(_sessionTimer){clearTimeout(_sessionTimer);_sessionTimer=null;}
    await SB.auth.signOut();
    currentSession=null;
    this.currentPage='planning';
    this.showLogin();
  },
};

// Démarrage
document.addEventListener('DOMContentLoaded', () => {
  try {
    App.start();
  } catch(e) {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#F6F7EA;font-family:sans-serif;padding:20px">
        <div style="background:white;border-radius:16px;padding:32px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.12);text-align:center">
          <div style="font-size:40px;margin-bottom:16px">⚠️</div>
          <h2 style="color:#272724;margin-bottom:8px">Navigateur non compatible</h2>
          <p style="color:#6b6b60;font-size:14px;margin-bottom:20px">
            Ce navigateur intégré (WhatsApp, Instagram…) ne supporte pas toutes les fonctionnalités requises.
          </p>
          <p style="color:#272724;font-size:13px;font-weight:600;margin-bottom:16px">Ouvrez ce lien dans votre navigateur :</p>
          <div style="background:#f6f7ea;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;word-break:break-all;color:#FF622C;margin-bottom:20px">${location.href}</div>
          <p style="color:#6b6b60;font-size:12px">Sur iPhone → Safari &nbsp;|&nbsp; Sur Android → Chrome</p>
          <p style="color:#999;font-size:11px;margin-top:16px">Détail : ${e.message}</p>
        </div>
      </div>`;
  }
});
</script>
