  // ---- POINTAGE ----
  renderPointage() {
    const sites=DB.getSites().filter(s=>s.actif);
    const isKA=currentSession.role==='kindness_ambassador';
    const site=DB.getSiteById(this.currentSite);
    const ym=`${this.currentYear}-${String(this.currentMonth+1).padStart(2,'0')}`;
    const lock=DB.getLock(this.currentSite,ym);
    const employees=this._getVisibleEmps(this.currentSite);
    const dim=daysInMonth(this.currentYear,this.currentMonth);
    const entries=DB.getPointage(this.currentSite,this.currentYear,this.currentMonth+1);

    const extra=document.getElementById('topbar-extra');
    if(extra&&this.canGlobal()) extra.innerHTML=`<button class="btn btn-secondary btn-sm" onclick="App.exportCSV()">⬇ CSV site</button>`;

    const siteSelector=isKA?`<strong style="color:var(--text-muted)">${site?.nom||''}</strong>`:`<select onchange="App.changeSite(this.value)" style="max-width:220px">${sites.map(s=>`<option value="${s.id}" ${s.id===this.currentSite?'selected':''}>${s.nom}</option>`).join('')}</select>`;
    const legend=TYPES.map(t=>`<div class="legend-item"><div class="legend-dot" style="background:var(--${t.key}-bg);border:1px solid var(--${t.key})"></div><span>${t.label} (${t.short})</span></div>`).join('');
    const dayNames=['D','L','M','M','J','V','S'];
    let hdr='';
    for(let d=1;d<=dim;d++){
      const ds=fmtDate(this.currentYear,this.currentMonth,d);
      const wd=dayOfWeek(this.currentYear,this.currentMonth,d);
      const cls=DB.isHoliday(ds)?'day-ferie':wd===0||wd===6?'day-weekend':'';
      hdr+=`<th class="${cls}" title="${DB.isHoliday(ds)?DB.getHolidayName(ds):''}">${dayNames[wd]}<br>${d}</th>`;
    }
    let rows='';
    employees.forEach(emp=>{
      let cells='';
      for(let d=1;d<=dim;d++){
        const ds=fmtDate(this.currentYear,this.currentMonth,d);
        const wd=dayOfWeek(this.currentYear,this.currentMonth,d);
        const isWE=wd===0||wd===6;
        const isFerie=DB.isHoliday(ds);
        const entry=entries.find(p=>p.employee_id===emp.id&&p.date===ds);
        const lc=lock?' locked':'';
        const ch=lock?'':`onclick="App.openSaisie('${emp.id}','${ds}')"`;
        if(entry){const t=TYPES.find(x=>x.key===entry.type);const vm=entry.validated?' ✓':'';cells+=`<td class="has-entry"><button class="cell-btn ${entry.type}${lc}" ${ch} title="${t?.label||entry.type}${entry.notes?' — '+entry.notes:''}${vm?'(validé)':''}">${t?.short||entry.type}${vm}</button></td>`;}
        else if(isFerie) cells+=`<td><button class="cell-btn ferie${lc}" ${ch} title="${DB.getHolidayName(ds)}">F</button></td>`;
        else cells+=`<td><button class="cell-btn${lc}" style="color:#ccc;font-size:16px" ${ch}>·</button></td>`;
      }
      rows+=`<tr><td class="col-emp"><div class="emp-name">${emp.prenom} ${emp.nom}</div><div class="emp-poste">${emp.poste}${emp.affectation?' · '+emp.affectation:''}</div></td>${cells}</tr>`;
    });
    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls">
        ${siteSelector}
        <div class="month-nav"><button onclick="App.prevMonth()">‹</button><span>${fmtMonth(this.currentYear,this.currentMonth)}</span><button onclick="App.nextMonth()">›</button></div>
        ${lock?`<div class="lock-indicator">🔒 Verrouillé par ${lock.locked_by}</div>`:''}
      </div>
      <div class="legend">${legend}</div>
      ${employees.length===0?'<div class="alert alert-warning">Aucun collaborateur actif sur ce site.</div>':''}
      <div class="pointage-table-wrapper"><table class="pointage-table"><thead><tr><th class="col-emp">Collaborateur</th>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
  },

  openSaisie(empId, date) {
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const existing=DB.getPointageByEmpDate(empId,date);
    // Les collaborateurs sont en lecture seule dans l'app principale (la saisie se fait via l'app mobile)
    const canEdit=currentSession.role!=='collaborateur'&&this._canEditEmp(empId);
    const [y,m,d]=date.split('-');
    // Types visibles selon permissions
    const visibleTypes=TYPES.filter(t=>!t.restricted||this.canSaisirMap());
    if(!canEdit) {
      // Mode lecture seule
      const typeInfo=TYPES.find(t=>t.key===existing?.type);
      const isCollab=currentSession.role==='collaborateur';
      this.showModal(`
        <div class="modal-header"><div class="modal-title">Pointage — ${emp.prenom} ${emp.nom}</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
        <p class="text-muted text-sm mb-16">📅 ${d}/${m}/${y} &nbsp;·&nbsp; ${emp.poste}${emp.affectation?' · '+emp.affectation:''}</p>
        ${existing?`<div class="alert alert-info">Statut : <strong>${typeInfo?.label||existing.type}</strong>${existing.notes?'<br><span style="font-size:12px">'+existing.notes+'</span>':''}</div>`:'<div class="alert alert-info">Aucune saisie pour ce jour.</div>'}
        ${isCollab?'<div class="alert alert-warning" style="font-size:12px">Le pointage est géré par votre responsable. Utilisez l\'application mobile pour pointer vos heures d\'arrivée et de départ.</div>':''}
        <div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Fermer</button></div>`);
      return;
    }
    const typeBtns=visibleTypes.map(t=>`<button class="type-btn ${t.key} ${existing?.type===t.key?'selected':''}" onclick="App.selectType(this,'${t.key}')">${t.label}</button>`).join('');
    const delBtn=existing?`<button class="btn btn-danger btn-sm" onclick="App.deletePointage('${empId}','${date}')">Supprimer</button>`:'';
    this.showModal(`
      <div class="modal-header"><div class="modal-title">Pointage — ${emp.prenom} ${emp.nom}</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
      <p class="text-muted text-sm mb-16">📅 ${d}/${m}/${y} &nbsp;·&nbsp; ${emp.poste}${emp.affectation?' · '+emp.affectation:''}</p>
      <div id="saisie-error" class="alert alert-danger hidden"></div>
      <div class="type-grid">${typeBtns}</div>
      <div class="form-group"><label>Notes (optionnel)</label><textarea id="saisie-notes" rows="2" placeholder="Observation...">${existing?.notes||''}</textarea></div>
      <div class="modal-actions">${delBtn}<button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.saveSaisie('${empId}','${date}')">Enregistrer</button></div>`);
    this._saisieType=existing?.type||null;
  },
  selectType(btn,type){document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');this._saisieType=type;},
  async saveSaisie(empId,date){
    if(!this._saisieType){const e=document.getElementById('saisie-error');e.textContent='Veuillez sélectionner un type.';e.classList.remove('hidden');return;}
    setSyncStatus('busy','↻ Sauvegarde...');
    try{await DB.setPointage(empId,date,this._saisieType,document.getElementById('saisie-notes')?.value||'',currentSession);setSyncStatus('ok','● En ligne');this.closeModal();this.renderPointage();}
    catch(e){setSyncStatus('error','⚠ Erreur');const err=document.getElementById('saisie-error');err.textContent=e.message;err.classList.remove('hidden');}
  },
  async deletePointage(empId,date){
    if(!confirm('Supprimer cette entrée ?'))return;
    setSyncStatus('busy','↻ Suppression...');
    try{await DB.deletePointage(empId,date,currentSession);setSyncStatus('ok','● En ligne');this.closeModal();this.renderPointage();}
    catch(e){setSyncStatus('error','⚠ Erreur');alert(e.message);}
  },

  nextMonth(){if(this.currentMonth===11){this.currentMonth=0;this.currentYear++;}else this.currentMonth++;this.renderPointage();},

  exportCSV(){const csv=DB.exportCSV(this.currentSite,this.currentYear,this.currentMonth+1);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download=`pointage_${this.currentSite}_${this.currentYear}-${String(this.currentMonth+1).padStart(2,'0')}.csv`;a.click();},

  // ---- POINTAGE HORAIRE ----
  _shiftDate: new Date().toISOString().substring(0,10),

  renderShifts() {
    const isKA=currentSession.role==='kindness_ambassador';
    const sites=DB.getSites().filter(s=>s.actif);
    const site=DB.getSiteById(this.currentSite);
    const employees=this._getVisibleEmps(this.currentSite).filter(e=>e.pointage_horaire!==false);
    const date=this._shiftDate;
    const shifts=DB.getShifts(this.currentSite, date);

    const siteSelector=isKA?`<strong style="color:var(--text-muted)">${site?.nom||''}</strong>`:`<select onchange="App.changeSite(this.value)" style="max-width:220px">${sites.map(s=>`<option value="${s.id}" ${s.id===this.currentSite?'selected':''}>${s.nom}</option>`).join('')}</select>`;

    // Demandes en attente sur ce site / cette date
    const pendingChanges = DB.getPendingShiftChanges(this.currentSite).filter(r=>r.date===date);

    const rows=employees.map(emp=>{
      const schedule=DB.getSchedule(emp.id);
      const shift=shifts.find(s=>s.employee_id===emp.id)||null;
      const statut=DB.shiftStatut(shift,schedule);
      const statutLabels={complet:'Complet',incomplet:'Incomplet',en_cours:'En cours',vide:'—'};
      // KA peut soumettre des demandes ; admins peuvent modifier directement
      const canEdit=this.canManage();
      const canRequest=isKA&&!this.canManage();
      const canValidateShift=isKA||this.canManage()||this.canValidate();
      // Demande en attente pour cet employé ce jour
      const pendingReq=Cache.shiftChangeRequests.find(r=>r.employee_id===emp.id&&r.date===date&&r.status==='pending');

      // ---- SHIFT 1 ----
      const retard1=shift?.retard_minutes>0?`<span class="retard-badge">+${DB.fmtMinutes(shift.retard_minutes)}</span>`:'';
      const schedBadge=schedule?`<span class="schedule-badge">${schedule.heure_debut}–${schedule.heure_fin}</span>`:`<span class="schedule-badge" style="color:#f57c00">Non configuré</span>`;
      const validated=shift?.validated_by_ka?`<span class="badge badge-success" style="font-size:10px">✓ ${shift.validated_by_ka}</span>`:'';

      // Bouton arrivée : admin → édition directe, KA → demande de modif, autre → lecture
      let arriveBtn='<span class="text-muted" style="font-size:12px">—</span>';
      if(canEdit) {
        arriveBtn=(!shift||!shift.heure_arrivee)
          ?`<button class="btn btn-primary btn-xs" onclick="App.openPointageArrivee('${emp.id}','${date}',1)">▶ Arrivée</button>`
          :`<span class="time-pill ${shift.retard_minutes>0?'retard':''}" onclick="App.openPointageArrivee('${emp.id}','${date}',1)" title="Modifier">🕐 ${shift.heure_arrivee}${retard1}</span>`;
      } else if(canRequest) {
        arriveBtn=shift?.heure_arrivee
          ?`<span class="time-pill" style="opacity:0.7">🕐 ${shift.heure_arrivee}${retard1}</span>`
          :`<span class="text-muted" style="font-size:12px">—</span>`;
      } else if(shift?.heure_arrivee) {
        arriveBtn=`<span style="font-size:12px">🕐 ${shift.heure_arrivee}${retard1}</span>`;
      }

      let departBtn='<span class="text-muted" style="font-size:12px">—</span>';
      if(canEdit) {
        departBtn=shift?.heure_arrivee&&!shift.heure_depart
          ?`<button class="btn btn-secondary btn-xs" onclick="App.openPointageDepart('${emp.id}','${date}',1)">⏹ Départ</button>`
          :shift?.heure_depart?`<span class="time-pill" onclick="App.openPointageDepart('${emp.id}','${date}',1)" title="Modifier">🕐 ${shift.heure_depart}</span>`
          :'<span class="text-muted" style="font-size:12px">—</span>';
      } else if(shift?.heure_depart) {
        departBtn=`<span style="font-size:12px">🕐 ${shift.heure_depart}</span>`;
      }

      // ---- Bouton "Demander modification" pour KA ----
      let kaRequestBtn='';
      if(canRequest) {
        if(pendingReq) {
          kaRequestBtn=`<span class="badge badge-warning" style="font-size:10px" title="Demande en attente de validation admin">⏳ Modif. en attente</span>`;
        } else {
          kaRequestBtn=`<button class="btn btn-ghost btn-xs" onclick="App.openShiftChangeRequest('${emp.id}','${date}')" title="Demander une modification d'horaire">✎ Modifier</button>`;
        }
      }

      // ---- SHIFT 2 (double shift) ----
      const hasShift1Done=shift?.heure_arrivee&&shift?.heure_depart;
      const hasShift2=shift?.heure_arrivee_2;
      const retard2=shift?.retard_minutes_2>0?`<span class="retard-badge">+${DB.fmtMinutes(shift.retard_minutes_2)}</span>`:'';

      let doubleCol='<span class="text-muted" style="font-size:11px">—</span>';
      if(hasShift1Done&&canEdit) {
        if(!hasShift2) {
          doubleCol=`<button class="btn btn-ghost btn-xs" onclick="App.openDoubleShift('${emp.id}','${date}')">+ 2ème shift</button>`;
        } else {
          const arr2=`<span class="time-pill ${shift.retard_minutes_2>0?'retard':''}" onclick="App.openDoubleShift('${emp.id}','${date}')" title="Modifier 2ème shift">🕐 ${shift.heure_arrivee_2}${retard2}</span>`;
          const dep2=shift.heure_depart_2?`→ <span class="time-pill" onclick="App.openDoubleShift('${emp.id}','${date}')" title="Modifier 2ème shift">🕐 ${shift.heure_depart_2}</span>`
            :`<button class="btn btn-secondary btn-xs" onclick="App.openDoubleShiftDepart('${emp.id}','${date}')">⏹ Départ 2</button>`;
          doubleCol=`<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">${arr2}${dep2}</div>`;
        }
      } else if(hasShift2) {
        doubleCol=`<span style="font-size:11px;color:var(--text-muted)">🕐 ${shift.heure_arrivee_2}${shift.heure_depart_2?'→'+shift.heure_depart_2:' (en cours)'}</span>`;
      }

      // Durée totale
      const duree1=shift?.duree_minutes||0;
      const duree2=shift?.duree_minutes_2||0;
      const dureeTotale=duree1+(duree2||0);
      const dureeStr=dureeTotale>0?`<span style="font-size:12px;font-weight:600">${DB.fmtMinutes(dureeTotale)}${duree2>0?` <span style="font-size:10px;color:var(--info)">(2×)</span>`:''}</span>`:'—';

      const valBtn=canValidateShift&&shift&&shift.heure_arrivee&&!shift.validated_by_ka
        ?`<button class="btn btn-success btn-xs" onclick="App.validateShift('${shift.id}')">✓ Valider</button>`
        :validated;

      return`<tr>
        <td><strong>${emp.prenom} ${emp.nom}</strong><br><span class="text-muted" style="font-size:11px">${emp.poste}</span></td>
        <td>${schedBadge}</td>
        <td>${arriveBtn}</td>
        <td>${departBtn}</td>
        <td>${doubleCol}</td>
        <td>${dureeStr}</td>
        <td><span class="shift-status shift-${statut}">${statutLabels[statut]}</span></td>
        <td><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${valBtn}${kaRequestBtn}</div></td>
      </tr>`;
    }).join('');

    const unvalidated=shifts.filter(s=>s.heure_arrivee&&!s.validated_by_ka).length;

    // --- Bloc "demandes en attente" visible par les admins ---
    const allPending=DB.getPendingShiftChanges(this.canGlobal()?null:this.currentSite);
    const pendingBlock=this.canManage()&&allPending.length>0?`
      <div class="card" style="border-left:3px solid var(--accent);margin-bottom:16px">
        <div class="card-header" style="margin-bottom:12px">
          <div class="card-title">🔔 ${allPending.length} demande${allPending.length>1?'s':''} de modification de shift en attente</div>
        </div>
        <div class="table-wrapper"><table class="data-table">
          <thead><tr><th>Collaborateur</th><th>Date</th><th>Demande</th><th>Motif</th><th>Par</th><th>Actions</th></tr></thead>
          <tbody>${allPending.map(r=>{
            const e=DB.getEmployees().find(x=>x.id===r.employee_id);
            const site=DB.getSiteById(r.site_id);
            const shift=DB.getShiftByEmpDate(r.employee_id,r.date);
            const changes=[];
            if(r.heure_debut_prevue||r.heure_fin_prevue) changes.push(`Planning prévu : ${r.heure_debut_prevue||'?'}→${r.heure_fin_prevue||'?'}`);
            if(r.heure_arrivee!==null) changes.push(`Arrivée : <strong>${shift?.heure_arrivee||'—'}</strong> → <strong>${r.heure_arrivee}</strong>`);
            if(r.heure_depart!==null) changes.push(`Départ : <strong>${shift?.heure_depart||'—'}</strong> → <strong>${r.heure_depart}</strong>`);
            if(r.heure_arrivee_2!==null) changes.push(`Arrivée 2 : ${shift?.heure_arrivee_2||'—'} → ${r.heure_arrivee_2}`);
            if(r.heure_depart_2!==null) changes.push(`Départ 2 : ${shift?.heure_depart_2||'—'} → ${r.heure_depart_2}`);
            if(r.create_if_missing) changes.push('<em>Création du shift</em>');
            return`<tr>
              <td><strong>${e?e.prenom+' '+e.nom:'—'}</strong><br><span class="text-muted" style="font-size:11px">${site?.nom||''}</span></td>
              <td style="white-space:nowrap">${this.fmtDateFr(r.date)}</td>
              <td style="font-size:12px">${changes.join('<br>')}</td>
              <td style="font-size:12px;color:var(--text-muted)">${r.reason||'—'}</td>
              <td style="font-size:11px">${r.requested_by}<br>${fmtDT(r.requested_at)}</td>
              <td><div style="display:flex;gap:6px">
                <button class="btn btn-success btn-xs" onclick="App.approveShiftChange('${r.id}')">✓ Approuver</button>
                <button class="btn btn-danger btn-xs" onclick="App.rejectShiftChange('${r.id}')">✕ Refuser</button>
              </div></td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>`:'';

    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls" style="flex-wrap:wrap;gap:12px">
        ${siteSelector}
        <div class="date-nav">
          <button onclick="App.prevDay()">‹</button>
          <span>${this.fmtDateFr(date)}</span>
          <button onclick="App.nextDay()">›</button>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="App.goToday()">Aujourd'hui</button>
        ${unvalidated>0&&(isKA||currentSession.role==='cluster_ops')?`<button class="btn btn-success btn-sm" onclick="App.validateAllShifts()">✓ Tout valider (${unvalidated})</button>`:''}
      </div>
      ${pendingBlock}
      <div class="alert alert-${isKA&&!this.canManage()?'warning':'info'}" style="margin-bottom:16px">
        ${isKA&&!this.canManage()
          ?'✎ Pour corriger un horaire, cliquez sur <strong>Modifier</strong> sur la ligne concernée. La demande sera soumise à un administrateur pour approbation.'
          :'⏱ Un shift <strong>complet</strong> crée automatiquement un pointage <strong>Présent</strong>. Les retards sont calculés par rapport à l\'heure de début prévue.'}
      </div>
      ${employees.length===0?'<div class="alert alert-warning">Aucun collaborateur actif sur ce site.</div>':''}
      ${employees.length>0?`<div class="card" style="padding:0;overflow:hidden"><table class="shift-table">
        <thead><tr><th>Collaborateur</th><th>Planning prévu</th><th>Arrivée</th><th>Départ</th><th>Double shift</th><th>Durée totale</th><th>Statut</th><th>Validation / Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`:''}`;
  },

  fmtDateFr(dateStr) {
    const [y,m,d]=dateStr.split('-');
    const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const months=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
    const wd=new Date(y,m-1,d).getDay();
    return `${days[wd]} ${parseInt(d)} ${months[m-1]} ${y}`;
  },

  prevDay() {
    const d=new Date(this._shiftDate); d.setDate(d.getDate()-1);
    this._shiftDate=d.toISOString().substring(0,10); this.renderShifts();
  },
  nextDay() {
    const d=new Date(this._shiftDate); d.setDate(d.getDate()+1);
    this._shiftDate=d.toISOString().substring(0,10); this.renderShifts();
  },
  goToday() { this._shiftDate=new Date().toISOString().substring(0,10); this.renderShifts(); },

  openPointageArrivee(empId, date, shiftNum=1) {
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const schedule=DB.getSchedule(empId);
    const shift=DB.getShiftByEmpDate(empId,date);
    const now=new Date();
    const currentTime=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const val=(shiftNum===2?shift?.heure_arrivee_2:shift?.heure_arrivee)||currentTime;
    const titre=shiftNum===2?'Arrivée 2ème shift':'Arrivée';
    const canModify=this.canModifierShiftsPrevus();
    // Heure prévue : priorité shift record, sinon schedule
    const prevuDebut=shift?.heure_debut_prevue||schedule?.heure_debut||'09:00';
    const prevuFin=shift?.heure_fin_prevue||schedule?.heure_fin||'18:00';
    this.showModal(`
      <div class="modal-header"><div class="modal-title">${titre} — ${emp.prenom} ${emp.nom}</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
      <p class="text-muted text-sm mb-16">📅 ${this.fmtDateFr(date)}${schedule?` &nbsp;·&nbsp; Planning habituel : <strong>${schedule.heure_debut}–${schedule.heure_fin}</strong>`:' &nbsp;·&nbsp; <span style="color:#f57c00">Aucun planning configuré</span>'}</p>
      ${canModify&&shiftNum===1?`
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">⏱ Modifier les horaires prévus pour aujourd'hui</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group" style="margin:0"><label>Début prévu</label><input id="shift-debut-prevu" type="time" value="${prevuDebut}"></div>
          <div class="form-group" style="margin:0"><label>Fin prévue</label><input id="shift-fin-prevue" type="time" value="${prevuFin}"></div>
        </div>
      </div>`:''}
      <div class="form-group"><label>Heure d'arrivée réelle</label><input id="heure-arrivee" type="time" value="${val}"></div>
      ${!canModify&&schedule&&shiftNum===1?`<div class="alert alert-info" style="font-size:12px">Heure prévue : <strong>${prevuDebut}</strong>. Tout retard sera automatiquement calculé.</div>`:''}
      ${shiftNum===2?`<div class="alert alert-info" style="font-size:12px">Ce 2ème shift créera un pointage <strong>Double Shift</strong> si les deux shifts sont complets.</div>`:''}
      <div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.saveArrivee('${empId}','${date}',${shiftNum})">Enregistrer</button></div>`);
  },

  async saveArrivee(empId, date, shiftNum=1) {
    const heure=document.getElementById('heure-arrivee').value;
    if(!heure){alert('Heure requise.');return;}
    const debutPrevu=document.getElementById('shift-debut-prevu')?.value||null;
    const finPrevue=document.getElementById('shift-fin-prevue')?.value||null;
    setSyncStatus('busy','↻ Sauvegarde...');
    try {
      if(shiftNum===2) await DB.pointageArrivee2(empId,date,heure,currentSession);
      else await DB.pointageArrivee(empId,date,heure,currentSession,debutPrevu,finPrevue);
      setSyncStatus('ok','● En ligne'); this.closeModal(); this.renderShifts();
    }
    catch(e) { setSyncStatus('error','⚠ Erreur'); alert(e.message); }
  },

  openPointageDepart(empId, date, shiftNum=1) {
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const shift=DB.getShiftByEmpDate(empId,date);
    const now=new Date();
    const currentTime=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const val=(shiftNum===2?shift?.heure_depart_2:shift?.heure_depart)||currentTime;
    const titre=shiftNum===2?'Départ 2ème shift':'Départ';
    const arrInfo=shiftNum===2&&shift?.heure_arrivee_2?` &nbsp;·&nbsp; Arrivée 2 : <strong>${shift.heure_arrivee_2}</strong>`:shift?.heure_arrivee?` &nbsp;·&nbsp; Arrivée : <strong>${shift.heure_arrivee}</strong>`:'';
    this.showModal(`
      <div class="modal-header"><div class="modal-title">${titre} — ${emp.prenom} ${emp.nom}</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
      <p class="text-muted text-sm mb-16">📅 ${this.fmtDateFr(date)}${arrInfo}</p>
      <div class="form-group"><label>Heure de départ</label><input id="heure-depart" type="time" value="${val}"></div>
      <div class="alert alert-info" style="font-size:12px">${shiftNum===2?'Shift complet → pointage <strong>Double Shift</strong> créé automatiquement.':'Si le shift est complet (≥80% de la durée prévue), un pointage <strong>Présent</strong> sera créé automatiquement.'}</div>
      <div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.saveDepart('${empId}','${date}',${shiftNum})">Enregistrer</button></div>`);
  },

  async saveDepart(empId, date, shiftNum=1) {
    const heure=document.getElementById('heure-depart').value;
    if(!heure){alert('Heure requise.');return;}
    setSyncStatus('busy','↻ Sauvegarde...');
    try {
      if(shiftNum===2) await DB.pointageDepart2(empId,date,heure,currentSession);
      else await DB.pointageDepart(empId,date,heure,currentSession);
      setSyncStatus('ok','● En ligne'); this.closeModal(); this.renderShifts();
    }
    catch(e) { setSyncStatus('error','⚠ Erreur'); alert(e.message); }
  },

  openDoubleShift(empId, date) { this.openPointageArrivee(empId,date,2); },
  openDoubleShiftDepart(empId, date) { this.openPointageDepart(empId,date,2); },

  async validateShift(shiftId) {
    setSyncStatus('busy','↻...');
    await DB.validateShift(shiftId,currentSession);
    setSyncStatus('ok','● En ligne'); this.renderShifts();
  },

  async validateAllShifts() {
    if(!confirm('Valider tous les shifts non validés de cette journée ?'))return;
    setSyncStatus('busy','↻ Validation...');
    const shifts=DB.getShifts(this.currentSite,this._shiftDate).filter(s=>s.heure_arrivee&&!s.validated_by_ka);
    for(const s of shifts) await DB.validateShift(s.id,currentSession);
    setSyncStatus('ok','● En ligne'); this.renderShifts();
  },

  openShiftChangeRequest(empId, date) {
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const shift=DB.getShiftByEmpDate(empId,date);
    const schedule=DB.getSchedule(empId);
    const prevuDebut=shift?.heure_debut_prevue||schedule?.heure_debut||'';
    const prevuFin=shift?.heure_fin_prevue||schedule?.heure_fin||'';
    const pending=Cache.shiftChangeRequests.find(r=>r.employee_id===empId&&r.date===date&&r.status==='pending');
    if(pending) { alert('Une demande de modification est déjà en attente pour ce collaborateur ce jour. Attendez la décision de l\'administrateur.'); return; }
    this.showModal(`
      <div class="modal-header"><div class="modal-title">Demande de modification — ${emp.prenom} ${emp.nom}</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
      <p class="text-muted text-sm mb-16">📅 ${this.fmtDateFr(date)} &nbsp;·&nbsp; Votre demande sera soumise à un administrateur pour validation.</p>
      <div class="alert alert-warning" style="font-size:12px;margin-bottom:16px">
        ${shift?`Shift actuel : ${shift.heure_arrivee||'—'}${shift.heure_depart?' → '+shift.heure_depart:''}${shift.heure_arrivee_2?' · Shift 2 : '+shift.heure_arrivee_2+(shift.heure_depart_2?' → '+shift.heure_depart_2:''):''}`:'Aucun shift enregistré pour cette journée.'}
      </div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px">Horaires demandés (laisser vide = pas de changement)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div class="form-group" style="margin:0"><label>Planning prévu : début</label><input type="time" id="scr-debut-prevu" value="${prevuDebut}" placeholder="hh:mm"></div>
          <div class="form-group" style="margin:0"><label>Planning prévu : fin</label><input type="time" id="scr-fin-prevue" value="${prevuFin}" placeholder="hh:mm"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div class="form-group" style="margin:0"><label>Arrivée réelle</label><input type="time" id="scr-arrivee" value="${shift?.heure_arrivee||''}"></div>
          <div class="form-group" style="margin:0"><label>Départ réel</label><input type="time" id="scr-depart" value="${shift?.heure_depart||''}"></div>
        </div>
        ${shift?.heure_arrivee?`
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;margin-top:4px">2ème shift (optionnel)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group" style="margin:0"><label>Arrivée 2</label><input type="time" id="scr-arrivee2" value="${shift?.heure_arrivee_2||''}"></div>
          <div class="form-group" style="margin:0"><label>Départ 2</label><input type="time" id="scr-depart2" value="${shift?.heure_depart_2||''}"></div>
        </div>`:''}
      </div>
      <div class="form-group"><label>Motif de la modification <span style="color:var(--danger)">*</span></label><textarea id="scr-reason" rows="2" placeholder="Ex: Le collaborateur a pointé 08:45 mais était arrivé à 08:30 selon le registre d'accès..."></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="App.submitShiftChangeRequest('${empId}','${date}')">Soumettre la demande</button>
      </div>`);
  },

  async submitShiftChangeRequest(empId, date) {
    const reason=(document.getElementById('scr-reason')?.value||'').trim();
    if(!reason){alert('Le motif est obligatoire.');return;}
    const changes={};
    const debutPrevu=document.getElementById('scr-debut-prevu')?.value||null;
    const finPrevue=document.getElementById('scr-fin-prevue')?.value||null;
    const arrivee=document.getElementById('scr-arrivee')?.value||null;
    const depart=document.getElementById('scr-depart')?.value||null;
    const arrivee2=document.getElementById('scr-arrivee2')?.value||null;
    const depart2=document.getElementById('scr-depart2')?.value||null;
    if(debutPrevu) changes.heure_debut_prevue=debutPrevu;
    if(finPrevue) changes.heure_fin_prevue=finPrevue;
    if(arrivee) changes.heure_arrivee=arrivee;
    if(depart) changes.heure_depart=depart;
    if(arrivee2) changes.heure_arrivee_2=arrivee2;
    if(depart2) changes.heure_depart_2=depart2;
    if(!Object.keys(changes).length){alert('Veuillez renseigner au moins un horaire à modifier.');return;}
    setSyncStatus('busy','↻ Envoi...');
    try {
      await DB.submitShiftChangeRequest(empId,date,changes,reason,currentSession);
      setSyncStatus('ok','● En ligne'); this.closeModal(); this.renderShifts();
    } catch(e) { setSyncStatus('error','⚠'); alert(e.message); }
  },

  async approveShiftChange(reqId) {
    const req=Cache.shiftChangeRequests.find(r=>r.id===reqId); if(!req)return;
    const emp=DB.getEmployees().find(e=>e.id===req.employee_id);
    const shift=DB.getShiftByEmpDate(req.employee_id,req.date);
    const lines=['Approuver cette modification de shift ?',''];
    if(req.heure_debut_prevue||req.heure_fin_prevue) lines.push(`Planning prévu : ${req.heure_debut_prevue||'?'} → ${req.heure_fin_prevue||'?'}`);
    if(req.heure_arrivee!==null) lines.push(`Arrivée : ${shift?.heure_arrivee||'—'} → ${req.heure_arrivee}`);
    if(req.heure_depart!==null) lines.push(`Départ : ${shift?.heure_depart||'—'} → ${req.heure_depart}`);
    if(req.heure_arrivee_2!==null) lines.push(`Arrivée 2 : ${shift?.heure_arrivee_2||'—'} → ${req.heure_arrivee_2}`);
    if(req.heure_depart_2!==null) lines.push(`Départ 2 : ${shift?.heure_depart_2||'—'} → ${req.heure_depart_2}`);
    lines.push(''); lines.push(`Collaborateur : ${emp?emp.prenom+' '+emp.nom:'?'}`);
    lines.push(`Demandé par : ${req.requested_by}`);
    if(req.reason) lines.push(`Motif : ${req.reason}`);
    if(!confirm(lines.join('\n'))) return;
    setSyncStatus('busy','↻ Application...');
    try {
      await DB.approveShiftChange(reqId,currentSession);
      setSyncStatus('ok','● En ligne'); this.renderShifts();
    } catch(e) { setSyncStatus('error','⚠'); alert(e.message); }
  },

  async rejectShiftChange(reqId) {
    const reason=prompt('Motif du refus (obligatoire) :');
    if(!reason?.trim()){alert('Le motif est obligatoire.');return;}
    setSyncStatus('busy','↻...');
    try {
      await DB.rejectShiftChange(reqId,reason.trim(),currentSession);
      setSyncStatus('ok','● En ligne'); this.renderShifts();
    } catch(e) { setSyncStatus('error','⚠'); alert(e.message); }
  },

  // ---- PLANNING SEMAINE ----
  _planningWeek: null,
  _rotWeek: null,

  _getMonday(date) {
    const d=new Date(date); const day=d.getDay();
    const diff=day===0?-6:1-day; d.setDate(d.getDate()+diff);
    return d.toISOString().substring(0,10);
  },
  _weekDays(monday) {
    const start=monday||this._planningWeek;
    return Array.from({length:7},(_,i)=>{const d=new Date(start+'T12:00:00');d.setDate(d.getDate()+i);return d.toISOString().substring(0,10);});
  },
  _fmtWeekLabel(days) {
    const MONTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
    const s=new Date(days[0]+'T12:00:00'), e=new Date(days[6]+'T12:00:00');
    return `Semaine du ${s.getDate()} ${MONTHS[s.getMonth()]} au ${e.getDate()} ${MONTHS[e.getMonth()]} ${e.getFullYear()}`;
  },

  renderPlanning() {
    if(!this._planningWeek) this._planningWeek=this._getMonday(new Date());
    const isKA=currentSession.role==='kindness_ambassador';
    const sites=DB.getSites().filter(s=>s.actif);
    const site=DB.getSiteById(this.currentSite);
    const days=this._weekDays();
    const employees=this._getVisibleEmps(this.currentSite);
    const lock=DB.getLock(this.currentSite, days[0].substring(0,7));
    const DAY_SHORT=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
    const DAY_FULL=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

    const siteSelector=isKA?`<strong style="color:var(--text-muted)">${site?.nom||''}</strong>`
      :`<select onchange="App.changeSite(this.value)" style="max-width:220px">${sites.map(s=>`<option value="${s.id}" ${s.id===this.currentSite?'selected':''}>${s.nom}</option>`).join('')}</select>`;

    const hdrCells=days.map((date,i)=>{
      const isFerie=DB.isHoliday(date);
      const d=parseInt(date.split('-')[2]);
      const bg=isFerie?'background:#7c4a00':i>=5?'background:#2d3748':'';
      const title=isFerie?DB.getHolidayName(date)||'Férié':'';
      return`<th style="${bg};min-width:80px" title="${title}">${DAY_SHORT[i]}<br><small style="opacity:0.7">${d}${isFerie?' 🎌':''}</small></th>`;
    }).join('');

    const rows=employees.map(emp=>{
      const schedule=DB.getSchedule(emp.id);
      const cells=days.map((date,i)=>{
        const entry=DB.getPointageByEmpDate(emp.id,date);
        const isFerie=DB.isHoliday(date);
        const isLocked=!!lock;
        let bg='',label='';

        if(isFerie){
          bg='background:var(--ferie-bg)';
          label=`<span style="color:var(--ferie);font-weight:700;font-size:11px">F</span>`;
        } else if(entry){
          if(entry.type==='double'){
            bg=`background:var(--double-bg)`;
            label=`<div style="line-height:1.2"><span style="color:var(--double);font-weight:800;font-size:12px">2×</span><div style="font-size:9px;color:var(--double);margin-top:2px">08h–00h</div></div>`;
          } else if(entry.type==='off'){
            bg=`background:var(--off-bg)`;
            label=`<span style="color:var(--off);font-weight:700;font-size:11px">OFF</span>`;
          } else if(entry.type==='travaille'){
            bg=`background:var(--travaille-bg)`;
            label=`<span style="color:var(--travaille);font-weight:700;font-size:12px">P</span>`;
          } else {
            const t=TYPES.find(x=>x.key===entry.type);
            bg=`background:var(--${entry.type}-bg)`;
            label=`<span style="color:var(--${entry.type});font-weight:700;font-size:11px">${t?.short||'?'}</span>`;
          }
        } else {
          label=`<span style="color:#ccc;font-size:16px">·</span>`;
        }

        const onclick=!isLocked&&!isFerie?`onclick="App.openPlanningCellMenu('${emp.id}','${date}',event)"`:' ';
        const cursor=!isLocked&&!isFerie?'pointer':'default';
        return`<td ${onclick} title="${!isLocked&&!isFerie?'Cliquer pour choisir le type':''}" style="text-align:center;padding:6px 4px;${bg};cursor:${cursor}">${label}</td>`;
      }).join('');

      // Sélecteur jour de repos
      const offDay=days.find(d=>DB.getPointageByEmpDate(emp.id,d)?.type==='off');
      const dayOptions=`<option value="">— Pas de repos —</option>`+days.map((d,i)=>`<option value="${d}" ${d===offDay?'selected':''}>${DAY_FULL[i]} ${parseInt(d.split('-')[2])}</option>`).join('');

      // Badge affectation temporaire
      const tempAsgn=DB.getActiveTempAssignment(emp.id, days[0]);
      const tempBadge=tempAsgn
        ?(emp.site_id!==this.currentSite
          ?`<span style="font-size:9px;background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:4px;padding:1px 5px;display:inline-block;margin-top:2px">🔄 Détaché de ${DB.getSiteById(emp.site_id)?.nom||'?'}</span>`
          :`<span style="font-size:9px;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;border-radius:4px;padding:1px 5px;display:inline-block;margin-top:2px">🔄 Détaché → ${DB.getSiteById(tempAsgn.site_id_temp)?.nom||'?'}</span>`)
        :'';
      return`<tr>
        <td style="min-width:160px;padding:8px 10px">
          <strong style="font-size:13px">${emp.prenom} ${emp.nom}</strong>

    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls" style="flex-wrap:wrap;gap:10px">
        ${siteSelector}

          <button onclick="App.prevWeek()">‹</button>

          <button onclick="App.nextWeek()">›</button>

        <button class="btn btn-ghost btn-sm" onclick="App.goCurrentWeek()">Cette semaine</button>
        ${!lock?`<button class="btn btn-primary btn-sm" onclick="App.genererPlanning()">⚡ Générer le planning</button>`:''}
      </div>
      <div class="alert alert-info" style="margin-bottom:16px">
        <strong>Comment ça marche :</strong>
        Cliquez sur une cellule pour cycler : <span style="font-weight:700;color:var(--travaille)">Présent</span> → <span style="font-weight:700;color:var(--double)">Double Shift (08h–00h)</span> → <span style="font-weight:700;color:var(--off)">OFF</span> → Vide.
        Utilisez le dropdown <em>Jour de repos</em> comme raccourci. Cliquez <strong>⚡ Générer</strong> pour remplir les cellules encore vides avec Présent.
      </div>
      ${lock?`<div class="alert alert-warning">🔒 Période verrouillée — lecture seule.</div>`:''}
      ${employees.length===0?'<div class="alert alert-warning">Aucun collaborateur actif sur ce site.</div>':''}
      ${employees.length>0?`
      <div class="pointage-table-wrapper">
        <table class="pointage-table">
          <thead><tr><th class="col-emp">Collaborateur</th>${hdrCells}<th style="min-width:150px">Jour de repos</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`:''}`;
  },

  prevWeek(){const d=new Date(this._planningWeek+'T12:00:00');d.setDate(d.getDate()-7);this._planningWeek=d.toISOString().substring(0,10);this.renderPlanning();},
  nextWeek(){const d=new Date(this._planningWeek+'T12:00:00');d.setDate(d.getDate()+7);this._planningWeek=d.toISOString().substring(0,10);this.renderPlanning();},
  goCurrentWeek(){this._planningWeek=this._getMonday(new Date());this.renderPlanning();},

  openPlanningCellMenu(empId, date, event) {
    const emp=DB.getEmployees().find(e=>e.id===empId);
    if(!emp) return;
    if(DB.getLock(emp.site_id, date.substring(0,7))) return;
    // Fermer tout menu existant
    document.getElementById('planning-cell-menu')?.remove();
    const entry=DB.getPointageByEmpDate(empId,date);
    const menuItems=[
      {key:'travaille', label:'✅ Présent', color:'var(--travaille)'},
      {key:'double',    label:'⏰ Double shift', color:'var(--double)'},
      {key:'off',       label:'🔴 OFF / Repos', color:'var(--off)'},
      {key:'conge',     label:'🏖 Congé', color:'var(--conge)'},
      {key:'recup',     label:'🔄 Récupération', color:'var(--recup)'},
      {key:'maladie',   label:'🏥 Maladie', color:'var(--maladie)'},
      {key:'',          label:'✕ Effacer', color:'#999'},
    ];
    const rect=event.target.closest('td').getBoundingClientRect();
    const menu=document.createElement('div');
    menu.id='planning-cell-menu';
    menu.style.cssText=`position:fixed;z-index:9999;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15);padding:4px;min-width:160px;top:${Math.min(rect.bottom+4, window.innerHeight-220)}px;left:${Math.min(rect.left, window.innerWidth-170)}px`;
    menu.innerHTML=menuItems.map(m=>`<div onclick="App._setPlanningCell('${empId}','${date}','${m.key}')" style="padding:7px 12px;cursor:pointer;border-radius:6px;font-size:13px;color:${m.color};font-weight:600;display:flex;align-items:center;gap:6px" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background=''">${m.label}${entry?.type===m.key?' ✓':''}</div>`).join('');
    document.body.appendChild(menu);
    setTimeout(()=>document.addEventListener('click',function close(e){if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',close);}},{once:false}),0);
  },

  async _setPlanningCell(empId, date, type) {
    document.getElementById('planning-cell-menu')?.remove();
    const emp=DB.getEmployees().find(e=>e.id===empId);
    if(!emp) return;
    setSyncStatus('busy','↻...');
    try {
      if(!type) {
        await DB.deletePointage(empId,date,currentSession);
      } else if(type==='double') {
        await DB.setPointage(empId,date,'double','Double shift (planning)',currentSession);
        await this._upsertDoubleShift(empId,date,emp);
      } else {
        const notes={travaille:'Planning manuel',off:'Jour de repos (planning)',conge:'Congé (planning)',recup:'Récupération (planning)',maladie:'Maladie (planning)'}[type]||'Planning';
        await DB.setPointage(empId,date,type,notes,currentSession);
      }
      setSyncStatus('ok','● En ligne');
    } catch(e) {
      setSyncStatus('error','⚠ Erreur');
      console.error('_setPlanningCell:', e);
    }
    this.renderPlanning();
  },

  async _upsertDoubleShift(empId, date, emp) {
    // Pré-configure sh_shifts avec les horaires double (08:00 → 00:00)
    if(!emp) emp=DB.getEmployees().find(e=>e.id===empId);
    if(!emp) return;
    try {
      const {data:existing}=await SB.from('sh_shifts').select('id,heure_arrivee').eq('employee_id',empId).eq('date',date);
      const shift=existing?.[0];
      if(shift) {
        await SB.from('sh_shifts').update({
          heure_debut_prevue:'08:00', heure_fin_prevue:'00:00',
          updated_by:currentSession.username, updated_at:nowISO()
        }).eq('id',shift.id);
      } else {
        await SB.from('sh_shifts').insert({
          id:uid(), employee_id:empId, site_id:emp.site_id, date,
          heure_arrivee:null, heure_depart:null,
          heure_debut_prevue:'08:00', heure_fin_prevue:'00:00',
          retard_minutes:0, duree_minutes:0, pause_minutes:0,
          validated_by_ka:null, validated_at_ka:null,
          created_by:currentSession.username, created_at:nowISO(),
          updated_by:null, updated_at:null
        });
      }
    } catch(e) { console.warn('_upsertDoubleShift:', e); }
  },

  async setOffDay(empId, date) {
    if(!date){this.renderPlanning();return;}
    setSyncStatus('busy','↻...');
    const days=this._weekDays();
    // Supprimer l'ancien OFF de la semaine pour cet employé
    for(const d of days){
      const e=DB.getPointageByEmpDate(empId,d);
      if(e&&e.type==='off') await DB.deletePointage(empId,d,currentSession);
    }
    if(date) await DB.setPointage(empId,date,'off','Jour de repos (planning)',currentSession);
    setSyncStatus('ok','● En ligne');
    this.renderPlanning();
  },

  async genererPlanning() {
    const days=this._weekDays();
    const employees=DB.getEmployees(this.currentSite).filter(e=>e.actif);
    if(!employees.length) return;
    const compteAFaire=employees.reduce((n,emp)=>n+days.filter(d=>{const isFerie=DB.isHoliday(d);const lock=DB.getLock(emp.site_id,d.substring(0,7));const exist=DB.getPointageByEmpDate(emp.id,d);return !isFerie&&!lock&&!exist;}).length,0);
    if(!confirm(`Générer le planning pour ${employees.length} collaborateurs ?\n\n${compteAFaire} cellule(s) vide(s) seront remplies avec "Présent".\nLes jours déjà saisis (Présent, Double Shift, OFF…) ne seront pas modifiés.`)) return;
    setSyncStatus('busy','↻ Génération du planning...');
    let count=0;
    for(const emp of employees) {
      for(const date of days) {
        if(DB.isHoliday(date)) continue;
        if(DB.getLock(emp.site_id,date.substring(0,7))) continue;
        const existing=DB.getPointageByEmpDate(emp.id,date); if(existing) continue;
        await DB.setPointage(emp.id,date,'travaille','Planning automatique',currentSession);
        count++;
      }
    }
    setSyncStatus('ok','● En ligne');
    this.renderPlanning();
  },

  // ---- SHIFTS ROTATIFS ----
  renderRotation() {
    if(!this._rotWeek) this._rotWeek=this._getMonday(new Date());
    const days=this._weekDays(this._rotWeek);
    const DAY_SHORT=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
    const DAY_FULL =['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
    const shiftTypes=DB.getShiftTypes().filter(s=>s.actif);
    const sites=DB.getSites().filter(s=>s.actif);
    const canEdit=this.canGererRotation();

    // Tous les employés en rotation (tous sites pour les globaux, site filtré sinon)
    const allRotEmps=DB.getEmployees().filter(e=>e.actif&&e.has_rotation&&
      (this.canGlobal()||e.site_id===this.currentSite));

    // Employés sans rotation (pour le toggle)
    const noRotEmps=DB.getEmployees().filter(e=>e.actif&&!e.has_rotation&&
      (this.canGlobal()||e.site_id===this.currentSite));

    const siteSelector=this.canGlobal()
      ?`<select onchange="App.changeSite(this.value)" style="max-width:220px">${sites.map(s=>`<option value="${s.id}" ${s.id===this.currentSite?'selected':''}>${s.nom}</option>`).join('')}</select>`
      :`<strong>${DB.getSiteById(this.currentSite)?.nom||''}</strong>`;

    // Légende shifts
    const shiftLegend=shiftTypes.map(st=>`
      <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;margin-right:10px">
        <span style="width:10px;height:10px;border-radius:50%;background:${st.couleur};display:inline-block"></span>
        <strong>${st.nom}</strong> ${st.heure_debut}–${st.heure_fin==='00:00'?'Minuit':st.heure_fin}
      </span>`).join('');

    // Entête colonnes jours
    const hdrCells=days.map((date,i)=>{
      const d=parseInt(date.split('-')[2]);
      const bg=i>=5?'background:#2d3748':'';
      return`<th style="${bg};min-width:110px;text-align:center">${DAY_SHORT[i]}<br><small style="opacity:0.7">${d}</small></th>`;
    }).join('');

    // Lignes par employé
    const rows=allRotEmps.map(emp=>{
      const site=DB.getSiteById(emp.site_id);
      const cells=days.map((date,i)=>{
        const entry=DB.getWeeklySchedule(emp.id,date);
        const bg=i>=5?'background:#1a202c':'';

        if(!canEdit) {
          // Lecture seule
          if(!entry||(!entry.shift_type_id&&!entry.is_off)) {
            return`<td style="text-align:center;padding:5px 4px;${bg}"><span style="color:#555;font-size:13px">—</span></td>`;
          }
          if(entry.is_off) {
            return`<td style="text-align:center;padding:5px 4px;background:#2a1a1a"><span style="color:#f87171;font-weight:700;font-size:11px">OFF</span></td>`;
          }
          const st=DB.getShiftType(entry.shift_type_id);
          return`<td style="text-align:center;padding:5px 4px;background:${st?.couleur||'#333'}22">
            <span style="color:${st?.couleur||'#ccc'};font-weight:700;font-size:11px">${st?.nom||'?'}</span>
            <div style="font-size:9px;color:${st?.couleur||'#ccc'};opacity:0.8">${st?.heure_debut||''}–${st?.heure_fin==='00:00'?'00:00':st?.heure_fin||''}</div>
          </td>`;
        }

        // Éditable : sélecteur inline
        const selOpts=`<option value="" ${!entry||(!entry.shift_type_id&&!entry.is_off)?'selected':''}>—</option>`
          +shiftTypes.map(st=>`<option value="${st.id}" ${entry?.shift_type_id===st.id&&!entry?.is_off?'selected':''}>${st.nom}</option>`).join('')
          +`<option value="off" ${entry?.is_off?'selected':''}>OFF</option>`;
        const cellBg=entry?.is_off?'background:#2a1a1a'
          :entry?.shift_type_id?`background:${DB.getShiftType(entry.shift_type_id)?.couleur||'#333'}22`
          :(i>=5?'background:#1a202c':'');
        return`<td style="padding:3px 4px;${cellBg}">
          <select style="width:100%;font-size:11px;padding:3px 4px;background:transparent;border:1px solid #334;color:inherit;border-radius:4px"
            onchange="App.setRotationCell('${emp.id}','${date}',this.value)">${selOpts}</select>
        </td>`;
      }).join('');

      return`<tr>
        <td style="min-width:170px;padding:8px 10px">
          <strong style="font-size:13px">${emp.prenom} ${emp.nom}</strong>
          <div style="font-size:10px;color:var(--text-muted)">${emp.poste}${this.canGlobal()&&site?` · ${site.nom}`:''}</div>
          ${canEdit?`<button class="btn btn-ghost" style="font-size:10px;padding:1px 6px;margin-top:3px;color:#f87171" onclick="App.toggleRotationEmp('${emp.id}')">Retirer de la rotation</button>`:''}
        </td>
        ${cells}
      </tr>`;
    }).join('');

    // Section ajout d'employé à la rotation
    const addSection=canEdit&&noRotEmps.length?`
      <div style="margin-top:20px;padding:16px;background:var(--card);border-radius:8px;border:1px solid var(--border)">
        <strong style="font-size:13px">➕ Ajouter des collaborateurs à la rotation</strong>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <select id="rot-add-emp" style="flex:1;min-width:200px;padding:6px 10px">
            <option value="">— Choisir un collaborateur —</option>
            ${noRotEmps.map(e=>{
              const s=DB.getSiteById(e.site_id);
              return`<option value="${e.id}">${e.prenom} ${e.nom} · ${e.poste}${this.canGlobal()&&s?' ('+s.nom+')':''}`;
            }).join('')}
          </select>
          <button class="btn btn-primary btn-sm" onclick="App.addToRotation()">Ajouter</button>
        </div>
      </div>`:'';

    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls" style="flex-wrap:wrap;gap:10px">
        ${siteSelector}
        <div class="date-nav">
          <button onclick="App.prevRotWeek()">‹</button>
          <span style="min-width:240px;font-size:13px">${this._fmtWeekLabel(days)}</span>
          <button onclick="App.nextRotWeek()">›</button>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="App.goRotCurrentWeek()">Cette semaine</button>
        ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="App.copyPrevRotWeek()" title="Copier le planning de la semaine précédente">📋 Copier semaine préc.</button>`:''}
      </div>
      <div style="margin:12px 0 16px;display:flex;flex-wrap:wrap;gap:4px;align-items:center">
        <span style="font-size:11px;color:var(--text-muted);margin-right:4px">Shifts :</span>
        ${shiftLegend}
        <span style="font-size:11px;color:var(--text-muted);margin-left:6px">· <strong style="color:#f87171">OFF</strong> = Repos</span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:4px">· <strong>—</strong> = Non défini (bloqué sur l'horloge)</span>
      </div>
      ${allRotEmps.length===0
        ?`<div class="alert alert-warning">Aucun collaborateur en rotation sur ce site. Ajoutez-en ci-dessous.</div>`
        :`<div class="pointage-table-wrapper">
          <table class="pointage-table">
            <thead><tr><th class="col-emp">Collaborateur</th>${hdrCells}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`}
      ${addSection}`;
  },

  prevRotWeek()       { const d=new Date(this._rotWeek+'T12:00:00');d.setDate(d.getDate()-7);this._rotWeek=d.toISOString().substring(0,10);this.renderRotation(); },
  nextRotWeek()       { const d=new Date(this._rotWeek+'T12:00:00');d.setDate(d.getDate()+7);this._rotWeek=d.toISOString().substring(0,10);this.renderRotation(); },
  goRotCurrentWeek()  { this._rotWeek=this._getMonday(new Date());this.renderRotation(); },

  async setRotationCell(empId, date, val) {
    setSyncStatus('busy','↻...');
    try {
      if(!val) {
        await DB.clearWeeklySchedule(empId,date);
      } else if(val==='off') {
        await DB.setWeeklySchedule(empId,date,null,true);
      } else {
        await DB.setWeeklySchedule(empId,date,val,false);
      }
      setSyncStatus('ok','● En ligne');
    } catch(e) {
      setSyncStatus('error','⚠ Erreur');
      alert('Erreur : '+e.message);
    }
    this.renderRotation();
  },

  async toggleRotationEmp(empId) {
    const emp=DB.getEmployees().find(e=>e.id===empId);
    if(!emp||!confirm(`Retirer ${emp.prenom} ${emp.nom} de la rotation ? Les plannings existants sont conservés.`)) return;
    await DB.toggleRotation(empId);
    this.renderRotation();
  },

  async addToRotation() {
    const empId=document.getElementById('rot-add-emp')?.value;
    if(!empId) return;
    await DB.toggleRotation(empId);
    this.renderRotation();
  },

  async copyPrevRotWeek() {
    const days=this._weekDays(this._rotWeek);
    const prevDays=days.map(d=>{const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()-7);return dt.toISOString().substring(0,10);});
    const rotEmps=DB.getEmployees().filter(e=>e.actif&&e.has_rotation&&(this.canGlobal()||e.site_id===this.currentSite));
    if(!rotEmps.length){alert('Aucun collaborateur en rotation.');return;}
    let copied=0,skipped=0;
    setSyncStatus('busy','↻ Copie...');
    for(const emp of rotEmps){
      for(let i=0;i<7;i++){
        const targetDate=days[i];
        const sourceDate=prevDays[i];
        if(DB.getWeeklySchedule(emp.id,targetDate)) {skipped++;continue;}
        const prev=DB.getWeeklySchedule(emp.id,sourceDate);
        if(!prev) continue;
        await DB.setWeeklySchedule(emp.id,targetDate,prev.shift_type_id,prev.is_off||false);
        copied++;
      }
    }
    setSyncStatus('ok','● En ligne');
    alert(`${copied} cellule(s) copiée(s). ${skipped} déjà renseignée(s), conservées.`);
    this.renderRotation();
  },

  // ---- SYNTHESE ----
  renderSynthese(){
    const view=this._synthView||'site';
    const siteFilter=this.canGlobal()?null:this.currentSite;
    const ym=`${this.currentYear}-${String(this.currentMonth+1).padStart(2,'0')}`;

    // ---- Barre de contrôle commune ----
    const controls=`<div class="grid-controls" style="flex-wrap:wrap;gap:10px;margin-bottom:16px">

        <button onclick="App.prevMonth();App.renderSynthese()">‹</button>

        <button onclick="App.nextMonth();App.renderSynthese()">›</button>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm ${view==='site'?'btn-primary':'btn-ghost'}" onclick="App._synthView='site';App._synthSearch='';App.renderSynthese()">🏠 Par site</button>
        <button class="btn btn-sm ${view==='collab'?'btn-primary':'btn-ghost'}" onclick="App._synthView='collab';App.renderSynthese()">👤 Par collaborateur</button>
      </div>

        <button class="btn btn-secondary btn-sm" onclick="App.exportSyntheseParSociete('StayHere')" title="Synthèse StayHere">⬇ StayHere</button>
        <button class="btn btn-secondary btn-sm" onclick="App.exportSyntheseParSociete('Syndic Foncier')" title="Synthèse Syndic Foncier">⬇ Syndic Foncier</button>
        <button class="btn btn-secondary btn-sm" onclick="App.exportSyntheseParSociete('BeInterim')" title="Synthèse BeInterim">⬇ BeInterim</button>
      `:''}

      ${view==='site'
        ?`<button class="btn btn-secondary btn-sm" onclick="App.exportAllCSV()">⬇ Par site (ZIP)</button>`
        :`<div style="position:relative;display:flex;align-items:center">
            <span style="position:absolute;left:10px;color:var(--text-muted);font-size:13px">🔍</span>
            <input id="synth-search" type="search" placeholder="Rechercher un collaborateur…"
              value="${this._synthSearch||''}"
              oninput="App._synthSearch=this.value;App._rerenderSyntheseCollab()"
              style="padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:260px;background:var(--surface)">
          </div>`}
    </div>`;

    let content='';

    if(view==='site'){
      // ---- Vue par site ----
      const sites=DB.getSites().filter(s=>s.actif).filter(s=>!siteFilter||s.id===siteFilter);
      sites.forEach(site=>{
        const synth=DB.getSynthese(site.id,this.currentYear,this.currentMonth+1);
        const emps=Object.values(synth); if(!emps.length)return;
        const siteTotals={};TYPES.forEach(t=>{siteTotals[t.key]=emps.reduce((s,e)=>s+(e.totals[t.key]||0),0);});
        content+=`<div class="card"><div class="card-header"><div class="card-title">🏠 ${site.nom}</div><button class="btn btn-ghost btn-sm" onclick="App.exportSiteCSV('${site.id}')">⬇ Export</button></div>
          <div class="table-wrapper"><table class="synth-table"><thead><tr><th>Collaborateur</th><th>Affectation</th>${TYPES.map(t=>`<th style="background:var(--${t.key});color:white" title="${t.label}">${t.short}</th>`).join('')}</tr></thead>
          <tbody>
            ${emps.map(({emp,totals:t})=>`<tr onclick="App.openCollabDetail('${emp.id}')" style="cursor:pointer" title="Voir le détail">
              <td>${emp.prenom} ${emp.nom}</td>
              <td class="text-muted text-sm">${emp.affectation||emp.poste}</td>
              ${TYPES.map(type=>`<td class="num" style="color:var(--${type.key})">${t[type.key]||''}</td>`).join('')}
            </tr>`).join('')}
            <tr style="font-weight:700;background:var(--bg)"><td colspan="2">TOTAL</td>${TYPES.map(type=>`<td class="num">${siteTotals[type.key]||''}</td>`).join('')}</tr>
          </tbody></table></div></div>`;
      });
    } else {
      // ---- Vue par collaborateur ----
      content=`<div id="synth-collab-container">${this._buildCollabSyntheseHTML(siteFilter)}</div>`;
    }

    document.getElementById('page-content').innerHTML=controls+(content||'<div class="alert alert-info">Aucune donnée pour cette période.</div>');
    // Remettre focus sur la recherche si active
    if(view==='collab'&&this._synthSearch){const el=document.getElementById('synth-search');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}}
  },

  _rerenderSyntheseCollab(){
    const container=document.getElementById('synth-collab-container');
    if(!container){this.renderSynthese();return;}
    const siteFilter=this.canGlobal()?null:this.currentSite;
    container.innerHTML=this._buildCollabSyntheseHTML(siteFilter);
  },

  _buildCollabSyntheseHTML(siteFilter){
    const all=DB.getSyntheseByCollab(this.currentYear,this.currentMonth+1,siteFilter);
    const q=(this._synthSearch||'').toLowerCase().trim();
    const data=q?all.filter(({emp})=>`${emp.prenom} ${emp.nom} ${emp.imm||''} ${emp.poste} ${emp.affectation||''}`.toLowerCase().includes(q)):all;
    if(!data.length) return '<div class="alert alert-info">Aucune entrée pour cette période'+(q?` correspondant à "${this._synthSearch}"`:'')+`.</div>`;

    // Ne montrer que les types qui ont au moins 1 occurrence dans la vue actuelle
    const activeTypes=TYPES.filter(t=>data.some(({totals})=>(totals[t.key]||0)>0));

    const rows=data.map(({emp,totals,sites})=>{
      const total=TYPES.reduce((s,t)=>s+(totals[t.key]||0),0);
      const siteBadges=sites.map(sid=>{
        const s=DB.getSiteById(sid);
        return`<span style="font-size:10px;background:#e3f2fd;color:#01579b;border-radius:4px;padding:1px 6px;margin:1px;display:inline-block">${s?.nom||sid}</span>`;
      }).join('');
      return`<tr onclick="App.openCollabDetail('${emp.id}')" style="cursor:pointer" title="Voir le détail jour par jour">
        <td class="text-muted text-sm">${emp.imm||'—'}</td>
        <td><strong>${emp.prenom} ${emp.nom}</strong><div style="font-size:10px;color:var(--text-muted)">${emp.poste}${emp.affectation?` · ${emp.affectation}`:''}</div></td>
        <td>${siteBadges||'—'}</td>
        ${activeTypes.map(t=>`<td class="num" style="color:var(--${t.key})">${totals[t.key]||''}</td>`).join('')}
        <td class="num"><strong>${total||''}</strong></td>
        <td onclick="event.stopPropagation()"><button class="btn btn-ghost btn-xs" onclick="App.exportCollabCSV('${emp.id}')">⬇</button></td>
      </tr>`;
    }).join('');

    const grandTotals=activeTypes.map(t=>data.reduce((s,{totals})=>s+(totals[t.key]||0),0));
    const grandTotal=data.reduce(({totals:prev},{totals})=>({totals:Object.fromEntries(TYPES.map(t=>[t.key,(prev[t.key]||0)+(totals[t.key]||0)]))}),{totals:Object.fromEntries(TYPES.map(t=>[t.key,0]))}).totals;
    const grandTotalAll=TYPES.reduce((s,t)=>s+(grandTotal[t.key]||0),0);

    return`<div class="card" style="padding:0;overflow:hidden">
      <div class="card-header">
        <div class="card-title">👤 ${data.length} collaborateur${data.length>1?'s':''}</div>
        <button class="btn btn-ghost btn-sm" onclick="App.exportAllCollabCSV()">⬇ Tout exporter</button>
      </div>
      <div class="table-wrapper"><table class="synth-table">
        <thead><tr>
          <th>IMM</th><th>Collaborateur</th><th>Sites</th>
          ${activeTypes.map(t=>`<th style="background:var(--${t.key});color:white" title="${t.label}">${t.short}</th>`).join('')}
          <th>Total</th><th></th>
        </tr></thead>
        <tbody>
          ${rows}
          <tr style="font-weight:700;background:var(--bg)">
            <td colspan="3">TOTAL</td>
            ${grandTotals.map(n=>`<td class="num">${n||''}</td>`).join('')}
            <td class="num">${grandTotalAll||''}</td><td></td>
          </tr>
        </tbody>
      </table></div>
    </div>`;
  },

  openCollabDetail(empId){
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const year=this.currentYear; const month=this.currentMonth+1;
    const entries=DB.getPointage(null,year,month).filter(p=>p.employee_id===empId).sort((a,b)=>a.date.localeCompare(b.date));
    const byType={};
    TYPES.forEach(t=>{const cnt=entries.filter(p=>p.type===t.key).length;if(cnt)byType[t.key]={short:t.short,cnt};});
    const pills=Object.values(byType).map(({short,cnt})=>`<span class="badge" style="margin:2px">${short} : <strong>${cnt}</strong></span>`).join('');
    const rows=entries.map(p=>{
      const site=DB.getSiteById(p.site_id);
      const type=TYPES.find(t=>t.key===p.type);
      return`<tr>
        <td>${p.date}</td>
        <td><span style="font-size:11px;background:#e3f2fd;color:#01579b;border-radius:4px;padding:2px 6px">${site?.nom||p.site_id}</span></td>
        <td><span class="badge badge-${p.type}">${type?.label||p.type}</span></td>
        <td class="text-muted text-sm" style="max-width:200px;white-space:normal">${p.notes||'—'}</td>
        <td><span class="badge ${p.validated?'badge-success':'badge-warning'}" style="font-size:10px">${p.validated?'✓ Validé':'En attente'}</span></td>
      </tr>`;
    }).join('');
    this.showModal(`
      <div class="modal-header">
        <div class="modal-title">📋 ${emp.prenom} ${emp.nom} — ${fmtMonth(year,month-1)}</div>
        <button class="modal-close" onclick="App.closeModal()">✕</button>
      </div>
      <p class="text-muted text-sm" style="margin-bottom:10px">${emp.poste}${emp.affectation?` · ${emp.affectation}`:''} · Site habituel : ${DB.getSiteById(emp.site_id)?.nom||'?'}</p>
      <div style="margin-bottom:14px">${pills||'<span class="text-muted text-sm">Aucune entrée ce mois.</span>'}</div>
      ${rows?`<div class="table-wrapper" style="max-height:400px;overflow-y:auto"><table class="data-table">
        <thead><tr><th>Date</th><th>Site</th><th>Type</th><th>Notes</th><th>Statut</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`:'<div class="alert alert-info">Aucune entrée pour ce mois.</div>'}
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="App.closeModal()">Fermer</button>
        <button class="btn btn-ghost" onclick="App.exportCollabCSV('${empId}')">⬇ Exporter CSV</button>
      </div>`);
  },

  exportCollabCSV(empId){
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const year=this.currentYear; const month=this.currentMonth+1;
    const entries=DB.getPointage(null,year,month).filter(p=>p.employee_id===empId).sort((a,b)=>a.date.localeCompare(b.date));
    let csv='N° IMM;Nom;Prénom;Poste;Affectation;Site;Date;Code;Notes;Saisi par;Validé\n';
    entries.forEach(p=>{
      const site=DB.getSiteById(p.site_id);
      csv+=`"${emp.imm||''}";"${emp.nom}";"${emp.prenom}";"${emp.poste}";"${emp.affectation||''}";"${site?.nom||p.site_id}";"${p.date}";"${TYPE_CODES[p.type]||p.type}";"${p.notes||''}";"${p.created_by}";"${p.validated?'Oui':'Non'}"\n`;
    });
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download=`pointage_${emp.nom}_${emp.prenom}_${year}-${String(month).padStart(2,'0')}.csv`;
    a.click();
  },

  exportAllCollabCSV(){
    const siteFilter=this.canGlobal()?null:this.currentSite;
    const data=DB.getSyntheseByCollab(this.currentYear,this.currentMonth+1,siteFilter);
    data.forEach(({emp})=>this.exportCollabCSV(emp.id));
  },

  exportSiteCSV(id){const csv=DB.exportCSV(id,this.currentYear,this.currentMonth+1);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download=`pointage_${id}_${this.currentYear}-${String(this.currentMonth+1).padStart(2,'0')}.csv`;a.click();},
  exportAllCSV(){DB.getSites().filter(s=>s.actif).forEach(s=>this.exportSiteCSV(s.id));},

    const sites=DB.getSites(); const emps=DB.getEmployees();

      return`<tr><td>${site?.nom||p.site_id}</td><td>${emp?emp.prenom+' '+emp.nom:'—'}</td><td class="text-muted text-sm">${emp?.affectation||emp?.poste||'—'}</td><td>${p.date}</td><td><span class="badge badge-${p.type}">${type?.label||p.type}</span></td><td class="text-muted text-sm">${p.notes||'—'}</td><td class="text-muted text-sm">${p.created_by}</td><td><button class="btn btn-success btn-xs" onclick="App.validateEntry('${p.id}')">✓</button></td></tr>`;

    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls">
        <div class="month-nav"><button onclick="App.prevMonth();App.renderValidation()">‹</button><span>${fmtMonth(this.currentYear,this.currentMonth)}</span><button onclick="App.nextMonth();App.renderValidation()">›</button></div>
        ${entries.length?`<button class="btn btn-success btn-sm" onclick="App.validateAll()">✓ Tout valider</button>`:''}
      </div>

      ${rows?`<div class="card"><div class="table-wrapper"><table class="data-table"><thead><tr><th>Site</th><th>Collaborateur</th><th>Affectation</th><th>Date</th><th>Type</th><th>Notes</th><th>Saisi par</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`:''}`;

  async validateEntry(id){setSyncStatus('busy','↻...');await DB.validateEntry(id,currentSession);setSyncStatus('ok','● En ligne');this.renderValidation();},
  async validateAll(){
    if(!confirm('Valider toutes les entrées ?'))return;
    setSyncStatus('busy','↻ Validation...');
    const entries=DB.getPointage(null,this.currentYear,this.currentMonth+1).filter(p=>!p.validated);

  },

  async saveEmployee(id=null){
    const imm=document.getElementById('emp-imm').value.trim();
    const prenom=document.getElementById('emp-prenom').value.trim();
    const nom=document.getElementById('emp-nom').value.trim();
    const poste=document.getElementById('emp-poste').value;
    const site_id=document.getElementById('emp-site').value;
    const affectation=document.getElementById('emp-affectation').value;
    const pointage_horaire=document.getElementById('emp-horaire')?.checked!==false;
    const require_gps=document.getElementById('emp-gps')?.checked!==false;
    const societe=document.getElementById('emp-societe')?.value||null;
    const heureDebut=document.getElementById('emp-hdebut')?.value;
    const heureFin=document.getElementById('emp-hfin')?.value;
    if(!prenom||!nom){alert('Prénom et nom requis.');return;}
    setSyncStatus('busy','↻...');
    let empId=id;
    if(id) await DB.updateEmployee(id,{imm,prenom,nom,poste,site_id,affectation,pointage_horaire,require_gps,societe});
    else { const e={imm,prenom,nom,poste,site_id,affectation,pointage_horaire,require_gps,societe}; await DB.addEmployee(e); empId=e.id; }
    if(pointage_horaire&&heureDebut&&heureFin) await DB.setSchedule(empId,heureDebut,heureFin);
    setSyncStatus('ok','● En ligne'); this.closeModal(); this.renderCollaborateurs();
  },
  async deleteEmployee(id){if(!confirm('Désactiver ce collaborateur ?'))return;await DB.updateEmployee(id,{actif:false});this.renderCollaborateurs();},

  // ---- IMPORT EXCEL ----
  _importData: [],

  // Nettoie une chaîne pour créer un identifiant
  _toSlug(str) {
    if(!str) return '';
    return str.trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-z0-9]/g,'.')
      .replace(/\.+/g,'.').replace(/^\.|\.$/g,'');
  },

  // Génère un identifiant unique
  _genUsername(prenom, nom) {
    const base = this._toSlug(prenom).charAt(0) + '.' + this._toSlug(nom);
    const existing = DB.getUsers().map(u=>u.username);
    if(!existing.includes(base)) return base;
    for(let i=2;i<99;i++) { const t=base+i; if(!existing.includes(t)) return t; }
    return base + Date.now();
  },

  // Génère un mot de passe simple
  _genPassword(imm, prenom) {
    const digits = (imm||'').replace(/\D/g,'').slice(-3).padStart(3,'0');
    if(digits!=='000') return 'sh' + digits;
    const slug = this._toSlug(prenom||'').slice(0,4).padEnd(3,'x');
    return slug + Math.floor(100+Math.random()*900);
  },

    try {

        method: 'POST',

  processImport(file) {
    if(!file) return;
    if(typeof XLSX==='undefined'){alert('Bibliothèque Excel non chargée. Vérifiez votre connexion internet.');return;}
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array'});
        // Mapping feuille → site
        const SHEET_SITE = {
          'CASABLANCA':'site_casa','CASA':'site_casa',
          'RABAT':'site_rabat',
          'AGADIR':'site_agadir',
          'OFFICE':'site_office','SIEGE':'site_office'
        };
        const defaultSite = document.getElementById('import-default-site')?.value;
        const allRows = [];

        wb.SheetNames.forEach(sheetName => {
          const upper = sheetName.toUpperCase();
          // Ignorer les feuilles non-employés
          if(['CODE COULEUR','AFFECTATION','DOUBLES SHIFT','HS','SUMMARY'].some(x=>upper.includes(x))) return;
          const siteId = SHEET_SITE[upper] || defaultSite;
          const ws = wb.Sheets[sheetName];
          const json = XLSX.utils.sheet_to_json(ws, {defval:''});
          json.forEach(row => {
            // Détection flexible des colonnes
            const nom = (row['NOM']||row['Nom']||row['nom']||'').toString().trim();
            const prenom = (row['PRENOM']||row['Prénom']||row['PRÉNOM']||row['prenom']||'').toString().trim();
            if(!nom||!prenom||nom.toUpperCase()===nom&&nom.length<2) return; // skip headers/empty
            const imm = (row['N° IMM']||row['IMM']||row['N°IMM']||row['Num']||'').toString().trim();
            const poste = (row['POSITION']||row['POSTE']||row['Poste']||row['Position']||'').toString().trim();
            const affectation = (row['AFFECTATION']||row['Affectation']||'').toString().trim();
            const role = (row['ROLE']||row['Role']||row['role']||'collaborateur').toString().trim()||'collaborateur';
            const accesHorloge = String(row['ACCES_HORLOGE']||row['acces_horloge']||'').toLowerCase() !== 'false';

            // ── Détection du site : colonne SITE > onglet > défaut ──
            const siteColRaw = (row['SITE']||row['Site']||row['site']||'').toString().trim();
            let rowSiteId = siteId; // fallback : onglet ou défaut
            if(siteColRaw) {
              // Chercher par nom : exact d'abord, puis partiel (DB contient la valeur Excel)
              const allSites = DB.getSites();
              const siteColLower = siteColRaw.toLowerCase();
              const match =
                allSites.find(s => s.nom?.toLowerCase() === siteColLower) ||
                allSites.find(s => s.nom?.toLowerCase().includes(siteColLower));
              if(match) rowSiteId = match.id;
            }

            allRows.push({nom, prenom, imm, poste, affectation, role, accesHorloge, siteId: rowSiteId, sheetName});
          });
        });

        if(allRows.length===0){
          document.getElementById('import-preview').innerHTML='<div class="alert alert-danger">Aucun collaborateur détecté. Vérifiez que le fichier contient des colonnes NOM et PRENOM.</div>';
          return;
        }

        // Générer identifiants et mots de passe
        const usedUsernames = new Set(DB.getUsers().map(u=>u.username));
        const processed = allRows.map(row => {
          let base = this._toSlug(row.prenom).charAt(0)+'.'+this._toSlug(row.nom);
          let username = base;
          let n=2; while(usedUsernames.has(username)){username=base+n;n++;}
          usedUsernames.add(username);
          const password = this._genPassword(row.imm, row.prenom);
          const site = DB.getSiteById(row.siteId);
          return {...row, username, password, siteName:site?.nom||row.siteId};
        });

        this._importData = processed;

        const rows = processed.map((r,i)=>`<tr>
          <td>${r.prenom} ${r.nom}</td>
          <td class="text-muted" style="font-size:11px">${r.imm||'—'}</td>
          <td class="text-muted" style="font-size:11px">${r.poste||'—'}</td>
          <td class="text-muted" style="font-size:11px">${r.affectation||'—'}</td>
          <td class="text-muted" style="font-size:11px">${r.siteName||'—'}</td>
          <td class="text-muted" style="font-size:11px">${r.role||'collaborateur'}</td>
          <td><span class="cred-user">${r.username}</span></td>
          <td><span class="cred-pass">${r.password}</span></td>
        </tr>`).join('');

        document.getElementById('import-preview').innerHTML=`
          <div class="alert alert-success">✓ <strong>${processed.length} collaborateurs</strong> détectés — identifiants et mots de passe générés automatiquement.</div>
          <div style="overflow-x:auto"><table class="import-table">
            <thead><tr><th>Nom complet</th><th>N° IMM</th><th>Poste</th><th>Affectation</th><th>Site</th><th>Rôle</th><th>Identifiant</th><th>Mot de passe</th></tr></thead>
            <tbody>${rows}</tbody>
          </table></div>`;

        document.getElementById('import-actions').innerHTML=`
          <button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button>
          <button class="btn btn-ghost btn-sm" onclick="App.exportCredentialsPreview()">⬇ Télécharger les accès</button>
          <button class="btn btn-primary" onclick="App.confirmImport()">✓ Importer ${processed.length} collaborateurs</button>`;
      } catch(err) {
        document.getElementById('import-preview').innerHTML=`<div class="alert alert-danger">Erreur de lecture : ${err.message}</div>`;
      }
    };
    reader.readAsArrayBuffer(file);
  },

  exportCredentialsPreview() {
    if(!this._importData.length) return;
    let csv='Prénom;Nom;N° IMM;Poste;Site;Affectation;Identifiant;Mot de passe\n';
    this._importData.forEach(r=>{
      csv+=`"${r.prenom}";"${r.nom}";"${r.imm||''}";"${r.poste||''}";"${r.siteName}";"${r.affectation||''}";"${r.username}";"${r.password}"\n`;
    });
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download=`stayhere_acces_collaborateurs_${new Date().toISOString().substring(0,10)}.csv`;
    a.click();
  },

  async confirmImport() {
    const data = this._importData;
    if(!data.length) return;
    setSyncStatus('busy','↻ Import en cours...');
    document.getElementById('import-actions').innerHTML=`<div class="alert alert-warning" style="margin:0;flex:1">⏳ Import en cours... ne fermez pas cette fenêtre.</div>`;

    // Ajouter les nouvelles affectations dans sh_affectations
    const newAffectations = [...new Set(data.map(r=>r.affectation).filter(Boolean))];
    for(const aff of newAffectations) {
      if(aff && !DB.getAffectations().includes(aff)) {
        try { await DB.addAffectation(aff); } catch(e) { /* ignore doublon */ }
      }
    }

    let created=0, errors=0;
    for(const r of data) {
      try {
        // Vérifier que l'employé n'existe pas déjà
        const exists = Cache.employees.find(e=>
          e.nom.toLowerCase()===r.nom.toLowerCase()&&
          e.prenom.toLowerCase()===r.prenom.toLowerCase()&&
          e.site_id===r.siteId);
        let empId;
        if(!exists) {
          const emp={imm:r.imm,prenom:r.prenom,nom:r.nom,poste:r.poste||'Kindness Host',site_id:r.siteId,affectation:r.affectation||''};
          await DB.addEmployee(emp); empId=emp.id; created++;
        } else { empId=exists.id; }
        // Créer le compte utilisateur si pas déjà existant (sh_users legacy + sh_user_profiles via auto-migrate au 1er login)
        if(!DB.getUsers().find(u=>u.username===r.username)) {
          const hash=await sha256(r.password);
          const role = r.role||'collaborateur';
          const accesHorloge = r.accesHorloge !== false;
          const accesPrincipal = !['collaborateur'].includes(role);
          await DB.addUser({username:r.username,nom:r.prenom+' '+r.nom,password:r.password,password_hash:hash,role,site_id:r.siteId,employee_id:empId,acces_horloge:accesHorloge,acces_principal:accesPrincipal});
        }
      } catch(e) { errors++; console.error(e); }
    }

    setSyncStatus('ok','● En ligne');
    // Télécharger automatiquement le fichier des accès
    this.exportCredentialsPreview();

    document.getElementById('import-actions').innerHTML=`
      <div class="alert alert-success" style="margin:0;flex:1">✓ <strong>${created} collaborateurs</strong> importés. ${errors>0?`<span style="color:var(--danger)">${errors} erreurs.</span>`:''} Le fichier des accès a été téléchargé automatiquement.</div>
      <button class="btn btn-primary" onclick="App.closeModal();App.renderCollaborateurs()">Fermer</button>`;
    this._importData=[];
  },
