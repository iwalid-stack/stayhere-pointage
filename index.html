  showHomeFilter(type) {
    const today=todayStr();
    const nowTs=Date.now();
    const allEmps=DB.getEmployees().filter(e=>e.actif);
    const allSites=DB.getSites();

    let title='', color='', rows=[];

    if(type==='presents') {
      title='Présents aujourd\'hui';
      color='var(--accent-green)';
      const entries=(Cache.pointage||[]).filter(p=>p.date===today&&['travaille','double'].includes(p.type));
      rows=entries.map(p=>{
        const emp=allEmps.find(e=>e.id===p.employee_id);
        if(!emp) return null;
        const site=allSites.find(s=>s.id===p.site_id);
        const typeLabel=p.type==='double'?'<span style="color:var(--double);font-weight:700">Double</span>':'Travaille';
        return {nom:`${emp.prenom||''} ${emp.nom||''}`.trim(),sub:site?.nom||'—',badge:typeLabel,avatar:(emp.prenom||'?')[0].toUpperCase()};
      }).filter(Boolean);

    } else if(type==='absents') {
      title='Absents / Malades aujourd\'hui';
      color='var(--accent)';
      const todayPtg=(Cache.pointage||[]).filter(p=>p.date===today);
      const labelMap={absence:'Absence',maladie:'Maladie',at:'AT'};
      // 1. Absences explicites
      const explicitRows=(Cache.pointage||[]).filter(p=>p.date===today&&['absence','maladie','at'].includes(p.type)).map(p=>{
        const emp=allEmps.find(e=>e.id===p.employee_id); if(!emp) return null;
        const site=allSites.find(s=>s.id===p.site_id);
        return {nom:`${emp.prenom||''} ${emp.nom||''}`.trim(),sub:site?.nom||'—',badge:labelMap[p.type]||p.type,avatar:(emp.prenom||'?')[0].toUpperCase()};
      }).filter(Boolean);
      // 2. En shift mais n'ont pas pointé (30 min de grâce)
      const _nowMin2=(()=>{const d=new Date();return d.getHours()*60+d.getMinutes();})();
      const missingRows=(Cache.shifts||[]).filter(sh=>{
        if(sh.date!==today||sh.heure_arrivee||!sh.heure_debut_prevue) return false;
        const [h,m]=sh.heure_debut_prevue.split(':').map(Number);
        if(_nowMin2<h*60+m+30) return false;
        const entry=todayPtg.find(p=>p.employee_id===sh.employee_id);
        return !entry||!['off','conge','recup','maladie','absence','at'].includes(entry.type);
      }).map(sh=>{
        const emp=allEmps.find(e=>e.id===sh.employee_id); if(!emp) return null;
        const site=allSites.find(s=>s.id===sh.site_id||s.id===emp.site_id);
        return {nom:`${emp.prenom||''} ${emp.nom||''}`.trim(),sub:site?.nom||'—',badge:`<span style="color:#fbbf24;font-weight:700">Non pointé ${sh.heure_debut_prevue}</span>`,avatar:(emp.prenom||'?')[0].toUpperCase()};
      }).filter(Boolean);
      rows=[...explicitRows,...missingRows];

    } else if(type==='shifts') {
      title='Shifts actifs en ce moment';
      color='#0277bd';
      const _yesterday=(()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().substring(0,10);})();
      const _nowMin=(()=>{const d=new Date();return d.getHours()*60+d.getMinutes();})();
      const activeShifts=(Cache.shifts||[]).filter(sh=>{
        if(!sh.heure_arrivee||sh.heure_depart) return false;
        if(sh.date===today) return true;
        if(sh.date===_yesterday&&sh.heure_fin_prevue){
          const arrivMin=sh.heure_arrivee.split(':').map(Number).reduce((h,m)=>h*60+m,0);
          const finMin=sh.heure_fin_prevue.split(':').map(Number).reduce((h,m)=>h*60+m,0);
          if(finMin<arrivMin&&_nowMin<finMin) return true;
        }
        return false;
      });
      rows=activeShifts.map(sh=>{
        const emp=allEmps.find(e=>e.id===sh.employee_id);
        const site=allSites.find(s=>s.id===sh.site_id);
        const inTime=sh.heure_arrivee||'—';
        const isOvn=sh.date===_yesterday;
        // Calcul durée depuis heure_arrivee (HH:MM) + date
        const [ah,am]=(sh.heure_arrivee||'00:00').split(':').map(Number);
        const shiftStartTs=new Date(`${sh.date}T${String(ah).padStart(2,'0')}:${String(am).padStart(2,'0')}:00`).getTime();
        const mins=Math.max(0,Math.floor((nowTs-shiftStartTs)/60000));
        const dur=mins>=60?`${Math.floor(mins/60)}h${String(mins%60).padStart(2,'0')}`:`${mins}min`;
        const nomAff=emp?`${emp.prenom||''} ${emp.nom||''}`.trim():sh.employee_id;
        const badge=isOvn?`🌙 Nuit · Entré ${inTime} · ${dur}`:`Entré ${inTime} · ${dur}`;
        return {nom:nomAff,sub:site?.nom||'—',badge,avatar:(nomAff[0]||'?').toUpperCase()};
      });

    } else if(type==='nonPointes') {
      title='Non pointés — shift en cours';
      color='#fbbf24';
      const _nowMin3=(()=>{const d=new Date();return d.getHours()*60+d.getMinutes();})();
      const todayPtg3=(Cache.pointage||[]).filter(p=>p.date===today);
      const missingShifts=(Cache.shifts||[]).filter(sh=>{
        if(sh.date!==today||sh.heure_arrivee||!sh.heure_debut_prevue) return false;
        const [h,m]=sh.heure_debut_prevue.split(':').map(Number);
        if(_nowMin3<h*60+m+30) return false;
        const entry=todayPtg3.find(p=>p.employee_id===sh.employee_id);
        return !entry||!['off','conge','recup','maladie','absence','at'].includes(entry.type);
      });
      rows=missingShifts.map(sh=>{
        const emp=allEmps.find(e=>e.id===sh.employee_id); if(!emp) return null;
        const site=allSites.find(s=>s.id===sh.site_id||s.id===emp.site_id);
        const retardMin=_nowMin3-(sh.heure_debut_prevue.split(':').map(Number).reduce((h,m)=>h*60+m,0));
        const retardStr=retardMin>=60?`${Math.floor(retardMin/60)}h${String(retardMin%60).padStart(2,'0')} de retard`:`${retardMin}min de retard`;
        return {nom:`${emp.prenom||''} ${emp.nom||''}`.trim(),sub:site?.nom||'—',badge:`<span style="color:#fbbf24">Prévu ${sh.heure_debut_prevue} · ${retardStr}</span>`,avatar:(emp.prenom||'?')[0].toUpperCase()};
      }).filter(Boolean);

    } else if(type==='users') {
      title='Utilisateurs connectés';
      color='#9E6EFF';
      const users=(Cache.users||[]).filter(u=>u.first_login_at);
      rows=users.map(u=>{
        const emp=allEmps.find(e=>e.id===u.employee_id);
        const roleFmt={admin:'Admin',cluster_ops_manager:'Cluster Ops',kindness_ambassador:'KA',rh:'RH'}[u.role]||u.role;
        return {nom:u.nom||u.email||'—',sub:emp?`${emp.prenom||''} ${emp.nom||''}`.trim()+' · '+roleFmt:roleFmt,badge:roleFmt,avatar:(u.nom||u.email||'?')[0].toUpperCase()};
      });
    }

    // Build modal
    const existing=document.getElementById('home-filter-modal');
    if(existing) existing.remove();

    const modal=document.createElement('div');
    modal.id='home-filter-modal';
    modal.style.cssText='position:fixed;inset:0;z-index:9000;display:flex;align-items:flex-end;justify-content:flex-end';
    modal.innerHTML=`
      <div onclick="document.getElementById('home-filter-modal').remove()" style="position:absolute;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(2px)"></div>
      <div style="position:relative;background:var(--surface);border-radius:20px 0 0 20px;width:min(420px,95vw);height:100vh;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.18);overflow:hidden">
        <!-- Header -->
        <div style="padding:24px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="font-size:16px;font-weight:700;color:var(--text)">${title}</div>
              <div style="font-size:13px;color:${color};font-weight:600;margin-top:2px">${rows.length} personne${rows.length!==1?'s':''}</div>
            </div>
            <button onclick="document.getElementById('home-filter-modal').remove()" style="background:var(--bg);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-family:inherit">×</button>
          </div>
        </div>
        <!-- List -->
        <div style="flex:1;overflow-y:auto;padding:16px">
          ${rows.length===0?`<div style="text-align:center;padding:48px 16px;color:var(--text-muted)"><div style="font-size:40px;margin-bottom:12px">🕊️</div><div style="font-size:14px">Aucune entrée</div></div>`
          :rows.map(r=>`
            <div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;margin-bottom:6px;background:var(--bg);border:1px solid var(--border)">
              <div style="width:38px;height:38px;border-radius:50%;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:${color};flex-shrink:0">${r.avatar}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.nom}</div>
                <div style="font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.sub}</div>
              </div>
              <div style="font-size:11px;padding:3px 8px;border-radius:12px;background:${color}18;color:${color};font-weight:600;white-space:nowrap">${r.badge}</div>
            </div>`).join('')}
        </div>
      </div>`;
    document.body.appendChild(modal);
    // Animate in
    const panel=modal.querySelector('div[style*="position:relative"]');
    panel.style.transform='translateX(100%)';
    panel.style.transition='transform .28s cubic-bezier(.32,.72,0,1)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>panel.style.transform='translateX(0)'));
  },

  // ---- POINTAGE ----
  renderPointage() {
    const sites=DB.getSites().filter(s=>s.actif);
    const isKA=currentSession.role==='kindness_ambassador';
    const site=DB.getSiteById(this.currentSite);
    const ym=`${this.currentYear}-${String(this.currentMonth+1).padStart(2,'0')}`;
    const lock=DB.getLock(this.currentSite,ym);
    const employees=this._getVisibleEmps(this.currentSite);
    const periodDates=getPeriodDates(this.currentYear,this.currentMonth);
    const entries=DB.getPointage(this.currentSite,this.currentYear,this.currentMonth+1);

    const extra=document.getElementById('topbar-extra');
    if(extra&&this.canGlobal()) extra.innerHTML=`<button class="btn btn-secondary btn-sm" onclick="App.exportCSV()">⬇ CSV site</button>`;

    const siteSelector=isKA?`<strong style="color:var(--text-muted)">${site?.nom||''}</strong>`:`<select onchange="App.changeSite(this.value)" style="max-width:220px">${sites.map(s=>`<option value="${s.id}" ${s.id===this.currentSite?'selected':''}>${s.nom}</option>`).join('')}</select>`;
    const legend=TYPES.map(t=>`<div class="legend-item"><div class="legend-dot" style="background:var(--${t.key}-bg);border:1px solid var(--${t.key})"></div><span>${t.label} (${t.short})</span></div>`).join('');
    const dayNames=['D','L','M','M','J','V','S'];
    // Séparateur de mois : repère le changement de mois dans la période (ex: passage du mois précédent au mois courant)
    const sepIdx=periodDates.findIndex(ds=>ds.substring(5,7)===String(this.currentMonth+1).padStart(2,'0'));
    let hdr='';
    periodDates.forEach((ds,i)=>{
      const wd=new Date(ds+'T12:00:00').getDay();
      const dayNum=parseInt(ds.substring(8));
      const cls=(DB.isHoliday(ds)?'day-ferie':wd===0||wd===6?'day-weekend':'')+(i<sepIdx?' prev-period':'');
      hdr+=`<th class="${cls}" title="${DB.isHoliday(ds)?DB.getHolidayName(ds):''}" style="${i===sepIdx?'border-left:2px solid var(--accent-green)':''}">${dayNames[wd]}<br>${dayNum}</th>`;
    });
    let rows='';
    employees.forEach(emp=>{
      let cells='';
      periodDates.forEach((ds,i)=>{
        const wd=new Date(ds+'T12:00:00').getDay();
        const isFerie=DB.isHoliday(ds);
        const entry=entries.find(p=>p.employee_id===emp.id&&p.date===ds);
        const lc=lock?' locked':'';
        const ch=lock?'':`onclick="App.openSaisie('${emp.id}','${ds}')"`;
        const sep=i===sepIdx?'border-left:2px solid var(--accent-green)':'';
        if(entry){const t=TYPES.find(x=>x.key===entry.type);const vm=entry.validated?' ✓':'';cells+=`<td class="has-entry" style="${sep}"><button class="cell-btn ${entry.type}${lc}" ${ch} title="${t?.label||entry.type}${entry.notes?' — '+entry.notes:''}${vm?' (validé)':''}">${t?.short||entry.type}${vm}</button></td>`;}
        else if(isFerie) cells+=`<td style="${sep}"><button class="cell-btn ferie${lc}" ${ch} title="${DB.getHolidayName(ds)}">F</button></td>`;
        else cells+=`<td style="${sep}"><button class="cell-btn${lc}" style="color:#ccc;font-size:16px" ${ch}>·</button></td>`;
      });
      rows+=`<tr><td class="col-emp"><div class="emp-name">${emp.prenom} ${emp.nom}</div><div class="emp-poste">${emp.poste}${emp.affectation?' · '+emp.affectation:''}</div></td>${cells}</tr>`;
    });
    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls">
        ${siteSelector}
        <div class="month-nav"><button onclick="App.prevMonth()">‹</button><span>${fmtPeriod(this.currentYear,this.currentMonth)}</span><button onclick="App.nextMonth()">›</button></div>
        ${lock?`<div class="lock-indicator">🔒 Verrouillé par ${lock.locked_by}</div>`:''}
      </div>
      <div class="legend">${legend}</div>
      ${employees.length===0?'<div class="alert alert-warning">Aucun collaborateur actif sur ce site.</div>':''}
      <div class="pointage-table-wrapper"><table class="pointage-table"><thead><tr><th class="col-emp">Collaborateur</th>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
  },

  openSaisie(empId, date) {
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const existing=DB.getPointageByEmpDate(empId,date);
    // Les collaborateurs sont en lecture seule dans l'app principale (la saisie se fait via l'app mobile)
    const canEdit=currentSession.role!=='collaborateur'&&this._canEditEmp(empId);
    const [y,m,d]=date.split('-');
    // Types visibles selon permissions
    const visibleTypes=TYPES.filter(t=>!t.restricted||this.canSaisirMap());
    if(!canEdit) {
      // Mode lecture seule
      const typeInfo=TYPES.find(t=>t.key===existing?.type);
      const isCollab=currentSession.role==='collaborateur';
      this.showModal(`
        <div class="modal-header"><div class="modal-title">Pointage — ${emp.prenom} ${emp.nom}</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
        <p class="text-muted text-sm mb-16">📅 ${d}/${m}/${y} &nbsp;·&nbsp; ${emp.poste}${emp.affectation?' · '+emp.affectation:''}</p>
        ${existing?`<div class="alert alert-info">Statut : <strong>${typeInfo?.label||existing.type}</strong>${existing.notes?'<br><span style="font-size:12px">'+existing.notes+'</span>':''}</div>`:'<div class="alert alert-info">Aucune saisie pour ce jour.</div>'}
        ${isCollab?'<div class="alert alert-warning" style="font-size:12px">Le pointage est géré par votre responsable. Utilisez l\'application mobile pour pointer vos heures d\'arrivée et de départ.</div>':''}
        <div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Fermer</button></div>`);
      return;
    }
    const typeBtns=visibleTypes.map(t=>`<button class="type-btn ${t.key} ${existing?.type===t.key?'selected':''}" onclick="App.selectType(this,'${t.key}')">${t.label}</button>`).join('');
    const delBtn=existing?`<button class="btn btn-danger btn-sm" onclick="App.deletePointage('${empId}','${date}')">Supprimer</button>`:'';
    this.showModal(`
      <div class="modal-header"><div class="modal-title">Pointage — ${emp.prenom} ${emp.nom}</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
      <p class="text-muted text-sm mb-16">📅 ${d}/${m}/${y} &nbsp;·&nbsp; ${emp.poste}${emp.affectation?' · '+emp.affectation:''}</p>
      <div id="saisie-error" class="alert alert-danger hidden"></div>
      <div class="type-grid">${typeBtns}</div>
      <div class="form-group"><label>Notes (optionnel)</label><textarea id="saisie-notes" rows="2" placeholder="Observation...">${existing?.notes||''}</textarea></div>
      <div class="modal-actions">${delBtn}<button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.saveSaisie('${empId}','${date}')">Enregistrer</button></div>`);
    this._saisieType=existing?.type||null;
  },
  selectType(btn,type){document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');this._saisieType=type;},
  async saveSaisie(empId,date){
    if(!this._saisieType){const e=document.getElementById('saisie-error');e.textContent='Veuillez sélectionner un type.';e.classList.remove('hidden');return;}
    setSyncStatus('busy','↻ Sauvegarde...');
    try{await DB.setPointage(empId,date,this._saisieType,document.getElementById('saisie-notes')?.value||'',currentSession,this.currentSite);setSyncStatus('ok','● En ligne');this.closeModal();this.renderPage();}
    catch(e){setSyncStatus('error','⚠ Erreur');const err=document.getElementById('saisie-error');if(err){err.textContent=e.message;err.classList.remove('hidden');}}
  },
  async deletePointage(empId,date){
    if(!confirm('Supprimer cette entrée ?'))return;
    setSyncStatus('busy','↻ Suppression...');
    try{await DB.deletePointage(empId,date,currentSession,this.currentSite);setSyncStatus('ok','● En ligne');this.closeModal();this.renderPage();}
    catch(e){setSyncStatus('error','⚠ Erreur');alert(e.message);}
  },
  prevMonth(){if(this.currentMonth===0){this.currentMonth=11;this.currentYear--;}else this.currentMonth--;this.renderPointage();},
  nextMonth(){if(this.currentMonth===11){this.currentMonth=0;this.currentYear++;}else this.currentMonth++;this.renderPointage();},
  changeSite(id){this.currentSite=id;this.renderPage();},
  exportCSV(){const csv=DB.exportCSV(this.currentSite,this.currentYear,this.currentMonth+1);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download=`pointage_${this.currentSite}_${this.currentYear}-${String(this.currentMonth+1).padStart(2,'0')}.csv`;a.click();},
  exportGlobal(){
    const ym=`${this.currentYear}-${String(this.currentMonth+1).padStart(2,'0')}`;
    const csv=DB.exportCSVGlobal(this.currentYear,this.currentMonth+1);
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download=`pointage_GLOBAL_${ym}.csv`;
    a.click();
  },
  exportSyntheseParSociete(societe){
    const ym=`${this.currentYear}-${String(this.currentMonth+1).padStart(2,'0')}`;
    const csv=DB.exportSyntheseBySociete(this.currentYear,this.currentMonth+1,societe);
    const slug=societe.replace(/\s+/g,'_');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download=`synthese_${slug}_${ym}.csv`;
    a.click();
  },

  // ---- POINTAGE HORAIRE ----
  _shiftDate: new Date().toISOString().substring(0,10),
  _shiftsGlobal: false,
  _toastQueue: [],
  _shiftToast(emp, action, time, siteId, color='green'){
    // Empiler max 3 toasts
    if(this._toastQueue.length>=3) return;
    const site=DB.getSiteById(siteId);
    const siteName=site?.nom?.replace(/StayHere - /,'').replace(/ Residential Living| Heritage| Collection/,'')??'';
    const icon=color==='green'?'🟢':'🟠';
    const el=document.createElement('div');
    el.className='shift-toast';
    // décalage vertical pour empiler
    const offset=this._toastQueue.length*84;
    el.style.bottom=(24+offset)+'px';
    el.innerHTML=`<div class="shift-toast-icon">${icon}</div><div><strong>${emp.prenom} ${emp.nom}</strong><br><span style="font-size:12px;color:var(--text-muted)">${action} · <b>${time}</b>${siteName?' · '+siteName:''}</span></div>`;
    document.body.appendChild(el);
    this._toastQueue.push(el);
    requestAnimationFrame(()=>el.classList.add('visible'));
    setTimeout(()=>{
      el.classList.remove('visible');
      setTimeout(()=>{ el.remove(); this._toastQueue=this._toastQueue.filter(t=>t!==el); },350);
    },6000);
  },

  renderShifts() {
    if(this._shiftsGlobal&&this.canGlobal()){this.renderShiftsGlobal();return;}
    const isKA=currentSession.role==='kindness_ambassador';
    const sites=DB.getSites().filter(s=>s.actif);
    const site=DB.getSiteById(this.currentSite);
    const date=this._shiftDate;
    // Exclure les collaborateurs marqués OFF dans le planning semaine pour cette date
    const employees=this._getVisibleEmps(this.currentSite).filter(e=>{
      if(e.pointage_horaire===false) return false;
      const ws=DB.getWeeklySchedule(e.id,date);
      return !ws?.is_off; // si is_off=true → jour de repos planifié → ne pas afficher
    });

    // ── Rafraîchissement DB en arrière-plan ──────────────────────────────────
    // Certains shifts (pointés via GPS sur un site différent du site assigné) peuvent
    // être absents de Cache.shifts à cause d'un filtre RLS par site_id.
    // On requête ici directement par employee_id pour les récupérer proprement.
    const _bgSeq=this._navSeq; const _bgDate=date;
    const _bgEmpIds=employees.map(e=>e.id);
    if(_bgEmpIds.length>0){
      SB.from('sh_shifts').select('*').in('employee_id',_bgEmpIds).eq('date',_bgDate)
        .then(({data,error})=>{
          if(error){console.warn('[shifts bg-refresh]',error.message);return;}
          if(!data||data.length===0) return;
          let changed=false;
          for(const s of data){
            const idx=Cache.shifts.findIndex(x=>x.id===s.id);
            if(idx!==-1){
              const old=Cache.shifts[idx];
              // mise à jour si arrivée/départ ont changé
              if(old.heure_arrivee!==s.heure_arrivee||old.heure_depart!==s.heure_depart||old.validated_by_ka!==s.validated_by_ka){
                Cache.shifts[idx]=s; changed=true;
              }
            } else { Cache.shifts.unshift(s); changed=true; }
          }
          // Re-render seulement si des données ont changé et qu'on est toujours sur la même page/date
          if(changed&&this._navSeq===_bgSeq&&this._shiftDate===_bgDate&&this.currentPage==='shifts'){
            this.renderShifts();
          }
        });
    }
    // ────────────────────────────────────────────────────────────────────────
    // On ne filtre PAS par site_id ici : un shift pointé via GPS peut avoir
    // un site_id différent du site assigné à l'employé (site GPS le plus proche).
    // On cherche donc par employé+date, indépendamment du site.
    const siteSelector=isKA?`<strong style="color:var(--text-muted)">${site?.nom||''}</strong>`:`<select onchange="App.changeSite(this.value)" style="max-width:220px">${sites.map(s=>`<option value="${s.id}" ${s.id===this.currentSite?'selected':''}>${s.nom}</option>`).join('')}</select>`;

    // Demandes en attente sur ce site / cette date
    const pendingChanges = DB.getPendingShiftChanges(this.currentSite).filter(r=>r.date===date);

    const rows=employees.map(emp=>{
      const schedule=DB.getSchedule(emp.id);
      const shift=DB.getShiftByEmpDate(emp.id,date); // cherche par emp+date, pas par site
      const statut=DB.shiftStatut(shift,schedule);
      const statutLabels={complet:'Complet',incomplet:'Incomplet',en_cours:'En cours',vide:'—'};
      // KA peut soumettre des demandes ; admins peuvent modifier directement
      const canEdit=this.canManage();
      const canRequest=isKA&&!this.canManage();
      const canValidateShift=isKA||this.canManage()||this.canValidate();
      // Demande en attente pour cet employé ce jour
      const pendingReq=Cache.shiftChangeRequests.find(r=>r.employee_id===emp.id&&r.date===date&&r.status==='pending');

      // ---- SHIFT 1 ----
      const retard1=shift?.retard_minutes>0?`<span class="retard-badge">+${DB.fmtMinutes(shift.retard_minutes)}</span>`:'';
      const schedBadge=schedule?`<span class="schedule-badge">${schedule.heure_debut}–${schedule.heure_fin}</span>`:`<span class="schedule-badge" style="color:#f57c00">Non configuré</span>`;
      const validated=shift?.validated_by_ka?`<span class="badge badge-success" style="font-size:10px">✓ ${shift.validated_by_ka}</span>`:'';

      // Bouton arrivée : admin → édition directe, KA → demande de modif, autre → lecture
      let arriveBtn='<span class="text-muted" style="font-size:12px">—</span>';
      if(canEdit) {
        arriveBtn=(!shift||!shift.heure_arrivee)
          ?`<button class="btn btn-primary btn-xs" onclick="App.openPointageArrivee('${emp.id}','${date}',1)">▶ Arrivée</button>`
          :`<span class="time-pill ${shift.retard_minutes>0?'retard':''}" onclick="App.openPointageArrivee('${emp.id}','${date}',1)" title="Modifier">🕐 ${shift.heure_arrivee}${retard1}</span>`;
      } else if(canRequest) {
        arriveBtn=shift?.heure_arrivee
          ?`<span class="time-pill" style="opacity:0.7">🕐 ${shift.heure_arrivee}${retard1}</span>`
          :`<span class="text-muted" style="font-size:12px">—</span>`;
      } else if(shift?.heure_arrivee) {
        arriveBtn=`<span style="font-size:12px">🕐 ${shift.heure_arrivee}${retard1}</span>`;
      }

      let departBtn='<span class="text-muted" style="font-size:12px">—</span>';
      if(canEdit) {
        departBtn=shift?.heure_arrivee&&!shift.heure_depart
          ?`<button class="btn btn-secondary btn-xs" onclick="App.openPointageDepart('${emp.id}','${date}',1)">⏹ Départ</button>`
          :shift?.heure_depart?`<span class="time-pill" onclick="App.openPointageDepart('${emp.id}','${date}',1)" title="Modifier">🕐 ${shift.heure_depart}</span>`
          :'<span class="text-muted" style="font-size:12px">—</span>';
      } else if(shift?.heure_depart) {
        departBtn=`<span style="font-size:12px">🕐 ${shift.heure_depart}</span>`;
      }

      // ---- Bouton "Demander modification" pour KA ----
      let kaRequestBtn='';
      if(canRequest) {
        if(pendingReq) {
          kaRequestBtn=`<span class="badge badge-warning" style="font-size:10px" title="Demande en attente de validation admin">⏳ Modif. en attente</span>`;
        } else {
          kaRequestBtn=`<button class="btn btn-ghost btn-xs" onclick="App.openShiftChangeRequest('${emp.id}','${date}')" title="Demander une modification d'horaire">✎ Modifier</button>`;
        }
      }

      // ---- SHIFT 2 (double shift) ----
      const hasShift1Done=shift?.heure_arrivee&&shift?.heure_depart;
      const hasShift2=shift?.heure_arrivee_2;
      const retard2=shift?.retard_minutes_2>0?`<span class="retard-badge">+${DB.fmtMinutes(shift.retard_minutes_2)}</span>`:'';

      let doubleCol='<span class="text-muted" style="font-size:11px">—</span>';
      if(hasShift1Done&&canEdit) {
        if(!hasShift2) {
          doubleCol=`<button class="btn btn-ghost btn-xs" onclick="App.openDoubleShift('${emp.id}','${date}')">+ 2ème shift</button>`;
        } else {
          const arr2=`<span class="time-pill ${shift.retard_minutes_2>0?'retard':''}" onclick="App.openDoubleShift('${emp.id}','${date}')" title="Modifier 2ème shift">🕐 ${shift.heure_arrivee_2}${retard2}</span>`;
          const dep2=shift.heure_depart_2?`→ <span class="time-pill" onclick="App.openDoubleShift('${emp.id}','${date}')" title="Modifier 2ème shift">🕐 ${shift.heure_depart_2}</span>`
            :`<button class="btn btn-secondary btn-xs" onclick="App.openDoubleShiftDepart('${emp.id}','${date}')">⏹ Départ 2</button>`;
          doubleCol=`<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">${arr2}${dep2}</div>`;
        }
      } else if(hasShift2) {
        doubleCol=`<span style="font-size:11px;color:var(--text-muted)">🕐 ${shift.heure_arrivee_2}${shift.heure_depart_2?'→'+shift.heure_depart_2:' (en cours)'}</span>`;
      }

      // Durée totale
      const duree1=shift?.duree_minutes||0;
      const duree2=shift?.duree_minutes_2||0;
      const dureeTotale=duree1+(duree2||0);
      const dureeStr=dureeTotale>0?`<span style="font-size:12px;font-weight:600">${DB.fmtMinutes(dureeTotale)}${duree2>0?` <span style="font-size:10px;color:var(--info)">(2×)</span>`:''}</span>`:'—';

      const valBtn=canValidateShift&&shift&&shift.heure_arrivee&&!shift.validated_by_ka
        ?`<button class="btn btn-success btn-xs" onclick="App.validateShift('${shift.id}')">✓ Valider</button>`
        :validated;

      return`<tr>
        <td><strong>${emp.prenom} ${emp.nom}</strong><br><span class="text-muted" style="font-size:11px">${emp.poste}</span></td>
        <td>${schedBadge}</td>
        <td>${arriveBtn}</td>
        <td>${departBtn}</td>
        <td>${doubleCol}</td>
        <td>${dureeStr}</td>
        <td><span class="shift-status shift-${statut}">${statutLabels[statut]}</span></td>
        <td><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${valBtn}${kaRequestBtn}</div></td>
      </tr>`;
    }).join('');

    const unvalidated=employees.filter(emp=>{const s=DB.getShiftByEmpDate(emp.id,date);return s?.heure_arrivee&&!s?.validated_by_ka;}).length;

    // --- Bloc "demandes en attente" visible par les admins ---
    const allPending=DB.getPendingShiftChanges(this.canGlobal()?null:this.currentSite);
    const pendingBlock=this.canManage()&&allPending.length>0?`
      <div class="card" style="border-left:3px solid var(--accent);margin-bottom:16px">
        <div class="card-header" style="margin-bottom:12px">
          <div class="card-title">🔔 ${allPending.length} demande${allPending.length>1?'s':''} de modification de shift en attente</div>
        </div>
        <div class="table-wrapper"><table class="data-table">
          <thead><tr><th>Collaborateur</th><th>Date</th><th>Demande</th><th>Motif</th><th>Par</th><th>Actions</th></tr></thead>
          <tbody>${allPending.map(r=>{
            const e=DB.getEmployees().find(x=>x.id===r.employee_id);
            const site=DB.getSiteById(r.site_id);
            const shift=DB.getShiftByEmpDate(r.employee_id,r.date);
            const changes=[];
            if(r.heure_debut_prevue||r.heure_fin_prevue) changes.push(`Planning prévu : ${r.heure_debut_prevue||'?'}→${r.heure_fin_prevue||'?'}`);
            if(r.heure_arrivee!==null) changes.push(`Arrivée : <strong>${shift?.heure_arrivee||'—'}</strong> → <strong>${r.heure_arrivee}</strong>`);
            if(r.heure_depart!==null) changes.push(`Départ : <strong>${shift?.heure_depart||'—'}</strong> → <strong>${r.heure_depart}</strong>`);
            if(r.heure_arrivee_2!==null) changes.push(`Arrivée 2 : ${shift?.heure_arrivee_2||'—'} → ${r.heure_arrivee_2}`);
            if(r.heure_depart_2!==null) changes.push(`Départ 2 : ${shift?.heure_depart_2||'—'} → ${r.heure_depart_2}`);
            if(r.create_if_missing) changes.push('<em>Création du shift</em>');
            return`<tr>
              <td><strong>${e?e.prenom+' '+e.nom:'—'}</strong><br><span class="text-muted" style="font-size:11px">${site?.nom||''}</span></td>
              <td style="white-space:nowrap">${this.fmtDateFr(r.date)}</td>
              <td style="font-size:12px">${changes.join('<br>')}</td>
              <td style="font-size:12px;color:var(--text-muted)">${r.reason||'—'}</td>
              <td style="font-size:11px">${r.requested_by}<br>${fmtDT(r.requested_at)}</td>
              <td><div style="display:flex;gap:6px">
                <button class="btn btn-success btn-xs" onclick="App.approveShiftChange('${r.id}')">✓ Approuver</button>
                <button class="btn btn-danger btn-xs" onclick="App.rejectShiftChange('${r.id}')">✕ Refuser</button>
              </div></td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>`:'';

    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls" style="flex-wrap:wrap;gap:12px">
        ${siteSelector}
        <div class="date-nav">
          <button onclick="App.prevDay()">‹</button>
          <span>${this.fmtDateFr(date)}</span>
          <button onclick="App.nextDay()">›</button>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="App.goToday()">Aujourd'hui</button>
        ${unvalidated>0&&(isKA||currentSession.role==='cluster_ops')?`<button class="btn btn-success btn-sm" onclick="App.validateAllShifts()">✓ Tout valider (${unvalidated})</button>`:''}
        ${this.canGlobal()?`<button class="btn btn-secondary btn-sm" onclick="App._shiftsGlobal=true;App.renderShifts()" title="Voir tous les sites en une seule vue">🌐 Tous les sites</button>`:''}
        <span class="live-badge">● Live</span>
        <span style="font-size:11px;color:var(--text-muted)" title="Dernière mise à jour automatique">Mis à jour : ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
      </div>
      ${pendingBlock}
      <div class="alert alert-${isKA&&!this.canManage()?'warning':'info'}" style="margin-bottom:16px">
        ${isKA&&!this.canManage()
          ?'✎ Pour corriger un horaire, cliquez sur <strong>Modifier</strong> sur la ligne concernée. La demande sera soumise à un administrateur pour approbation.'
          :'⏱ Un shift <strong>complet</strong> crée automatiquement un pointage <strong>Présent</strong>. Les retards sont calculés par rapport à l\'heure de début prévue.'}
      </div>
      ${employees.length===0?'<div class="alert alert-warning">Aucun collaborateur actif sur ce site.</div>':''}
      ${employees.length>0?`<div class="card" style="padding:0;overflow:hidden"><table class="shift-table">
        <thead><tr><th>Collaborateur</th><th>Planning prévu</th><th>Arrivée</th><th>Départ</th><th>Double shift</th><th>Durée totale</th><th>Statut</th><th>Validation / Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`:''}`;
  },

  fmtDateFr(dateStr) {
    const [y,m,d]=dateStr.split('-');
    const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const months=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
    const wd=new Date(y,m-1,d).getDay();
    return `${days[wd]} ${parseInt(d)} ${months[m-1]} ${y}`;
  },

  // ---- VUE GLOBALE POINTAGE HORAIRE (tous sites) ----
  renderShiftsGlobal() {
    const date=this._shiftDate;
    const sites=DB.getSites().filter(s=>s.actif);
    const canEdit=this.canManage();
    const canValidateShift=this.canValidate()||this.canManage();
    const allPending=DB.getPendingShiftChanges(null);
    const pendingBlock=canEdit&&allPending.length>0?`
      <div class="card" style="border-left:3px solid var(--accent);margin-bottom:16px">
        <div class="card-header" style="margin-bottom:12px">
          <div class="card-title">🔔 ${allPending.length} demande${allPending.length>1?'s':''} de modification en attente</div>
        </div>
        <div class="table-wrapper"><table class="data-table">
          <thead><tr><th>Collaborateur</th><th>Date</th><th>Demande</th><th>Motif</th><th>Par</th><th>Actions</th></tr></thead>
          <tbody>${allPending.map(r=>{
            const e=DB.getEmployees().find(x=>x.id===r.employee_id);
            const st=DB.getSiteById(r.site_id);
            const sh=DB.getShiftByEmpDate(r.employee_id,r.date);
            const ch=[];
            if(r.heure_arrivee!==null) ch.push('Arrivée : '+( sh?.heure_arrivee||'—')+' → '+r.heure_arrivee);
            if(r.heure_depart!==null) ch.push('Départ : '+(sh?.heure_depart||'—')+' → '+r.heure_depart);
            if(r.create_if_missing) ch.push('<em>Création du shift</em>');
            return`<tr><td><strong>${e?e.prenom+' '+e.nom:'—'}</strong><br><span class="text-muted" style="font-size:11px">${st?.nom||''}</span></td>
              <td>${this.fmtDateFr(r.date)}</td><td style="font-size:12px">${ch.join('<br>')}</td>
              <td style="font-size:12px;color:var(--text-muted)">${r.reason||'—'}</td>
              <td style="font-size:11px">${r.requested_by}</td>
              <td><div style="display:flex;gap:6px">
                <button class="btn btn-success btn-xs" onclick="App.approveShiftChange('${r.id}')">✓</button>
                <button class="btn btn-danger btn-xs" onclick="App.rejectShiftChange('${r.id}')">✕</button>
              </div></td></tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>`:'';

    // Stats globales
    let gTotal=0,gPresent=0,gEnCours=0,gComplet=0;
    let sections='';
    sites.forEach(site=>{
      const emps=DB.getEmployees().filter(e=>{
        if(!e.actif||e.pointage_horaire===false) return false;
        if(DB.getEffectiveSiteId(e.id,date)!==site.id) return false;
        const ws=DB.getWeeklySchedule(e.id,date);
        return !ws?.is_off; // exclure si jour OFF dans le planning semaine
      });
      if(!emps.length) return;
      const lock=DB.getLock(site.id,DB.getPeriodKey(date));
      let sEnCours=0,sComplet=0,sVide=0;
      const rows=emps.map(emp=>{
        const schedule=DB.getSchedule(emp.id);
        const shift=DB.getShiftByEmpDate(emp.id,date); // cherche par emp+date, pas par site
        const statut=DB.shiftStatut(shift,schedule);
        if(statut==='en_cours') {sEnCours++;gEnCours++;}
        else if(statut==='complet'){sComplet++;gComplet++;}
        else sVide++;
        gTotal++; if(statut!=='vide') gPresent++;
        return this._shiftRowHtml(emp,date,lock,canEdit,false,canValidateShift,false);
      }).join('');
      const siteShort=site.nom.replace('StayHere - ','');
      const statsBadges=
        (sEnCours?`<span style="background:rgba(0,129,96,0.15);color:var(--accent-green);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">● ${sEnCours} en cours</span> `:'')
       +(sComplet?`<span style="background:rgba(2,119,189,0.12);color:var(--info);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">✓ ${sComplet} complet${sComplet>1?'s':''}</span> `:'')
       +(sVide?`<span style="color:var(--text-muted);font-size:11px">${sVide} non pointé${sVide>1?'s':''}</span>`:'');
      sections+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:14px">
        <div style="padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <strong style="font-size:13px">${siteShort}</strong>
          <span style="font-size:11px;color:var(--text-muted)">${emps.length} collaborateur${emps.length>1?'s':''}</span>
          ${statsBadges}
          ${lock?'<span style="font-size:11px;color:var(--text-muted)">🔒 Verrouillé</span>':''}
        </div>
        <div style="overflow-x:auto"><table class="shift-table">
          <thead><tr><th>Collaborateur</th><th>Planning</th><th>Arrivée</th><th>Départ</th><th>2ème shift</th><th>Durée</th><th>Statut</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </div>`;
    });

    const summaryBar=`<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:10px 0;margin-bottom:14px">
      <span style="font-weight:700;font-size:13px">Total : ${gTotal} collaborateurs</span>
      <span style="background:rgba(0,129,96,0.15);color:var(--accent-green);padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700">● ${gEnCours} en cours</span>
      <span style="background:rgba(2,119,189,0.12);color:var(--info);padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700">✓ ${gComplet} complétés</span>
      <span style="color:var(--text-muted);font-size:12px">${gTotal-gPresent} non pointés</span>
    </div>`;

    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls" style="flex-wrap:wrap;gap:12px">
        <div class="date-nav">
          <button onclick="App.prevDay()">‹</button>
          <span>${this.fmtDateFr(date)}</span>
          <button onclick="App.nextDay()">›</button>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="App.goToday()">Aujourd'hui</button>
        <button class="btn btn-primary btn-sm" onclick="App._shiftsGlobal=false;App.renderShifts()" title="Revenir à la vue par site">🏢 Par site</button>
        <span class="live-badge">● Live</span>
        <span style="font-size:11px;color:var(--text-muted)">Mis à jour : ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
      </div>
      ${pendingBlock}
      ${summaryBar}
      ${sections||'<div class="alert alert-warning">Aucun collaborateur avec pointage horaire activé.</div>'}`;
  },

  // Construit le HTML d'une ligne shift (partagé par vue site et vue globale)
  _shiftRowHtml(emp, date, lock, canEdit, canRequest, canValidateShift, isKA) {
    const schedule=DB.getSchedule(emp.id);
    const shift=DB.getShiftByEmpDate(emp.id,date);
    const statut=DB.shiftStatut(shift,schedule);
    const statutLabels={complet:'Complet',incomplet:'Incomplet',en_cours:'En cours',vide:'—'};
    const pendingReq=Cache.shiftChangeRequests.find(r=>r.employee_id===emp.id&&r.date===date&&r.status==='pending');
    const retard1=shift?.retard_minutes>0?`<span class="retard-badge">+${DB.fmtMinutes(shift.retard_minutes)}</span>`:'';
    const schedBadge=schedule?`<span class="schedule-badge">${schedule.heure_debut}–${schedule.heure_fin}</span>`:`<span class="schedule-badge" style="color:#f57c00">Non conf.</span>`;
    const validated=shift?.validated_by_ka?`<span class="badge badge-success" style="font-size:10px">✓ ${shift.validated_by_ka}</span>`:'';
    let arriveBtn='<span class="text-muted" style="font-size:12px">—</span>';
    if(canEdit){
      arriveBtn=(!shift||!shift.heure_arrivee)
        ?`<button class="btn btn-primary btn-xs" onclick="App.openPointageArrivee('${emp.id}','${date}',1)">▶ Arrivée</button>`
        :`<span class="time-pill ${shift.retard_minutes>0?'retard':''}" onclick="App.openPointageArrivee('${emp.id}','${date}',1)" title="Modifier">🕐 ${shift.heure_arrivee}${retard1}</span>`;
    } else if(canRequest){
      arriveBtn=shift?.heure_arrivee?`<span class="time-pill" style="opacity:0.7">🕐 ${shift.heure_arrivee}${retard1}</span>`:'<span class="text-muted" style="font-size:12px">—</span>';
    } else if(shift?.heure_arrivee){
      arriveBtn=`<span style="font-size:12px">🕐 ${shift.heure_arrivee}${retard1}</span>`;
    }
    let departBtn='<span class="text-muted" style="font-size:12px">—</span>';
    if(canEdit){
      departBtn=shift?.heure_arrivee&&!shift.heure_depart
        ?`<button class="btn btn-secondary btn-xs" onclick="App.openPointageDepart('${emp.id}','${date}',1)">⏹ Départ</button>`
        :shift?.heure_depart?`<span class="time-pill" onclick="App.openPointageDepart('${emp.id}','${date}',1)" title="Modifier">🕐 ${shift.heure_depart}</span>`
        :'<span class="text-muted" style="font-size:12px">—</span>';
    } else if(shift?.heure_depart){
      departBtn=`<span style="font-size:12px">🕐 ${shift.heure_depart}</span>`;
    }
    const hasShift1Done=shift?.heure_arrivee&&shift?.heure_depart;
    const hasShift2=shift?.heure_arrivee_2;
    const retard2=shift?.retard_minutes_2>0?`<span class="retard-badge">+${DB.fmtMinutes(shift.retard_minutes_2)}</span>`:'';
    let doubleCol='<span class="text-muted" style="font-size:11px">—</span>';
    if(hasShift1Done&&canEdit){
      if(!hasShift2) doubleCol=`<button class="btn btn-ghost btn-xs" onclick="App.openDoubleShift('${emp.id}','${date}')">+ 2ème shift</button>`;
      else {
        const arr2=`<span class="time-pill ${shift.retard_minutes_2>0?'retard':''}" onclick="App.openDoubleShift('${emp.id}','${date}')">🕐 ${shift.heure_arrivee_2}${retard2}</span>`;
        const dep2=shift.heure_depart_2?`→ <span class="time-pill" onclick="App.openDoubleShift('${emp.id}','${date}')">🕐 ${shift.heure_depart_2}</span>`
          :`<button class="btn btn-secondary btn-xs" onclick="App.openDoubleShiftDepart('${emp.id}','${date}')">⏹ Départ 2</button>`;
        doubleCol=`<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">${arr2}${dep2}</div>`;
      }
    } else if(hasShift2){
      doubleCol=`<span style="font-size:11px;color:var(--text-muted)">🕐 ${shift.heure_arrivee_2}${shift.heure_depart_2?'→'+shift.heure_depart_2:' (en cours)'}</span>`;
    }
    const dureeTotale=(shift?.duree_minutes||0)+(shift?.duree_minutes_2||0);
    const dureeStr=dureeTotale>0?`<span style="font-size:12px;font-weight:600">${DB.fmtMinutes(dureeTotale)}${shift?.duree_minutes_2>0?' <span style="font-size:10px;color:var(--info)">(2×)</span>':''}</span>`:'—';
    const valBtn=canValidateShift&&shift&&shift.heure_arrivee&&!shift.validated_by_ka
      ?`<button class="btn btn-success btn-xs" onclick="App.validateShift('${shift.id}')">✓ Valider</button>`
      :validated;
    const kaRequestBtn=canRequest?(pendingReq
      ?`<span class="badge badge-warning" style="font-size:10px">⏳ En attente</span>`
      :`<button class="btn btn-ghost btn-xs" onclick="App.openShiftChangeRequest('${emp.id}','${date}')">✎ Modifier</button>`):'';
    return`<tr>
      <td><strong>${emp.prenom} ${emp.nom}</strong><br><span class="text-muted" style="font-size:11px">${emp.poste}</span></td>
      <td>${schedBadge}</td>
      <td>${arriveBtn}</td>
      <td>${departBtn}</td>
      <td>${doubleCol}</td>
      <td>${dureeStr}</td>
      <td><span class="shift-status shift-${statut}">${statutLabels[statut]}</span></td>
      <td><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${valBtn}${kaRequestBtn}</div></td>
    </tr>`;
  },

  prevDay() {
    const d=new Date(this._shiftDate); d.setDate(d.getDate()-1);
    this._shiftDate=d.toISOString().substring(0,10); this.renderShifts();
  },
  nextDay() {
    const d=new Date(this._shiftDate); d.setDate(d.getDate()+1);
    this._shiftDate=d.toISOString().substring(0,10); this.renderShifts();
  },
  goToday() { this._shiftDate=new Date().toISOString().substring(0,10); this.renderShifts(); },

  openPointageArrivee(empId, date, shiftNum=1) {
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const schedule=DB.getSchedule(empId);
    const shift=DB.getShiftByEmpDate(empId,date);
    const now=new Date();
    const currentTime=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const val=(shiftNum===2?shift?.heure_arrivee_2:shift?.heure_arrivee)||currentTime;
    const titre=shiftNum===2?'Arrivée 2ème shift':'Arrivée';
    const canModify=this.canModifierShiftsPrevus();
    // Heure prévue : priorité shift record, sinon schedule
    const prevuDebut=shift?.heure_debut_prevue||schedule?.heure_debut||'09:00';
    const prevuFin=shift?.heure_fin_prevue||schedule?.heure_fin||'18:00';
    this.showModal(`
      <div class="modal-header"><div class="modal-title">${titre} — ${emp.prenom} ${emp.nom}</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
      <p class="text-muted text-sm mb-16">📅 ${this.fmtDateFr(date)}${schedule?` &nbsp;·&nbsp; Planning habituel : <strong>${schedule.heure_debut}–${schedule.heure_fin}</strong>`:' &nbsp;·&nbsp; <span style="color:#f57c00">Aucun planning configuré</span>'}</p>
      ${canModify&&shiftNum===1?`
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">⏱ Modifier les horaires prévus pour aujourd'hui</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group" style="margin:0"><label>Début prévu</label><input id="shift-debut-prevu" type="time" value="${prevuDebut}"></div>
          <div class="form-group" style="margin:0"><label>Fin prévue</label><input id="shift-fin-prevue" type="time" value="${prevuFin}"></div>
        </div>
      </div>`:''}
      <div class="form-group"><label>Heure d'arrivée réelle</label><input id="heure-arrivee" type="time" value="${val}"></div>
      ${!canModify&&schedule&&shiftNum===1?`<div class="alert alert-info" style="font-size:12px">Heure prévue : <strong>${prevuDebut}</strong>. Tout retard sera automatiquement calculé.</div>`:''}
      ${shiftNum===2?`<div class="alert alert-info" style="font-size:12px">Ce 2ème shift créera un pointage <strong>Double Shift</strong> si les deux shifts sont complets.</div>`:''}
      <div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.saveArrivee('${empId}','${date}',${shiftNum})">Enregistrer</button></div>`);
  },

  async saveArrivee(empId, date, shiftNum=1) {
    const heure=document.getElementById('heure-arrivee').value;
    if(!heure){alert('Heure requise.');return;}
    const debutPrevu=document.getElementById('shift-debut-prevu')?.value||null;
    const finPrevue=document.getElementById('shift-fin-prevue')?.value||null;
    setSyncStatus('busy','↻ Sauvegarde...');
    try {
      if(shiftNum===2) await DB.pointageArrivee2(empId,date,heure,currentSession);
      else await DB.pointageArrivee(empId,date,heure,currentSession,debutPrevu,finPrevue);
      setSyncStatus('ok','● En ligne'); this.closeModal(); this.renderPage();
    }
    catch(e) { setSyncStatus('error','⚠ Erreur'); alert(e.message); }
  },

  openPointageDepart(empId, date, shiftNum=1) {
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const shift=DB.getShiftByEmpDate(empId,date);
    const now=new Date();
    const currentTime=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const val=(shiftNum===2?shift?.heure_depart_2:shift?.heure_depart)||currentTime;
    const titre=shiftNum===2?'Départ 2ème shift':'Départ';
    const arrInfo=shiftNum===2&&shift?.heure_arrivee_2?` &nbsp;·&nbsp; Arrivée 2 : <strong>${shift.heure_arrivee_2}</strong>`:shift?.heure_arrivee?` &nbsp;·&nbsp; Arrivée : <strong>${shift.heure_arrivee}</strong>`:'';
    this.showModal(`
      <div class="modal-header"><div class="modal-title">${titre} — ${emp.prenom} ${emp.nom}</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
      <p class="text-muted text-sm mb-16">📅 ${this.fmtDateFr(date)}${arrInfo}</p>
      <div class="form-group"><label>Heure de départ</label><input id="heure-depart" type="time" value="${val}"></div>
      <div class="alert alert-info" style="font-size:12px">${shiftNum===2?'Shift complet → pointage <strong>Double Shift</strong> créé automatiquement.':'Si le shift est complet (≥80% de la durée prévue), un pointage <strong>Présent</strong> sera créé automatiquement.'}</div>
      <div class="modal-actions"><button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button><button class="btn btn-primary" onclick="App.saveDepart('${empId}','${date}',${shiftNum})">Enregistrer</button></div>`);
  },

  async saveDepart(empId, date, shiftNum=1) {
    const heure=document.getElementById('heure-depart').value;
    if(!heure){alert('Heure requise.');return;}
    // Protection : avertir si on ferme un shift actif d'aujourd'hui (collaborateur peut être encore connecté)
    if(shiftNum===1 && date===todayStr()) {
      const shift=DB.getShiftByEmpDate(empId,date);
      if(shift?.heure_arrivee && !shift?.heure_depart) {
        const emp=DB.getEmployees().find(e=>e.id===empId);
        const ok=confirm(`⚠️ Attention — Ce shift est actuellement en cours.\n\n${emp?.prenom||''} ${emp?.nom||''} est peut-être encore connecté(e) sur l'app mobile.\n\nForcer la clôture à ${heure} ?`);
        if(!ok) return;
      }
    }
    setSyncStatus('busy','↻ Sauvegarde...');
    try {
      if(shiftNum===2) await DB.pointageDepart2(empId,date,heure,currentSession);
      else await DB.pointageDepart(empId,date,heure,currentSession);
      setSyncStatus('ok','● En ligne'); this.closeModal(); this.renderPage();
    }
    catch(e) { setSyncStatus('error','⚠ Erreur'); alert(e.message); }
  },

  openDoubleShift(empId, date) { this.openPointageArrivee(empId,date,2); },
  openDoubleShiftDepart(empId, date) { this.openPointageDepart(empId,date,2); },

  async validateShift(shiftId) {
    setSyncStatus('busy','↻...');
    await DB.validateShift(shiftId,currentSession);
    setSyncStatus('ok','● En ligne'); this.renderPage();
  },

  async validateAllShifts() {
    if(!confirm('Valider tous les shifts non validés de cette journée ?'))return;
    setSyncStatus('busy','↻ Validation...');
    // Utiliser les employés visibles + getShiftByEmpDate pour inclure les shifts GPS (site différent)
    const _vaEmps=this._getVisibleEmps(this.currentSite).filter(e=>e.pointage_horaire!==false);
    const shifts=_vaEmps.map(e=>DB.getShiftByEmpDate(e.id,this._shiftDate)).filter(s=>s?.heure_arrivee&&!s.validated_by_ka);
    for(const s of shifts) await DB.validateShift(s.id,currentSession);
    setSyncStatus('ok','● En ligne'); this.renderPage();
  },

  openShiftChangeRequest(empId, date) {
    const emp=DB.getEmployees().find(e=>e.id===empId); if(!emp)return;
    const shift=DB.getShiftByEmpDate(empId,date);
    const schedule=DB.getSchedule(empId);
    const prevuDebut=shift?.heure_debut_prevue||schedule?.heure_debut||'';
    const prevuFin=shift?.heure_fin_prevue||schedule?.heure_fin||'';
    const pending=Cache.shiftChangeRequests.find(r=>r.employee_id===empId&&r.date===date&&r.status==='pending');
    if(pending) { alert('Une demande de modification est déjà en attente pour ce collaborateur ce jour. Attendez la décision de l\'administrateur.'); return; }
    this.showModal(`
      <div class="modal-header"><div class="modal-title">Demande de modification — ${emp.prenom} ${emp.nom}</div><button class="modal-close" onclick="App.closeModal()">✕</button></div>
      <p class="text-muted text-sm mb-16">📅 ${this.fmtDateFr(date)} &nbsp;·&nbsp; Votre demande sera soumise à un administrateur pour validation.</p>
      <div class="alert alert-warning" style="font-size:12px;margin-bottom:16px">
        ${shift?`Shift actuel : ${shift.heure_arrivee||'—'}${shift.heure_depart?' → '+shift.heure_depart:''}${shift.heure_arrivee_2?' · Shift 2 : '+shift.heure_arrivee_2+(shift.heure_depart_2?' → '+shift.heure_depart_2:''):''}`:'Aucun shift enregistré pour cette journée.'}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div class="form-group" style="margin:0"><label>Planning prévu : début</label><input type="time" id="scr-debut-prevu" value="${prevuDebut}" placeholder="hh:mm"></div>
          <div class="form-group" style="margin:0"><label>Planning prévu : fin</label><input type="time" id="scr-fin-prevue" value="${prevuFin}" placeholder="hh:mm"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div class="form-group" style="margin:0"><label>Arrivée réelle</label><input type="time" id="scr-arrivee" value="${shift?.heure_arrivee||''}"></div>
          <div class="form-group" style="margin:0"><label>Départ réel</label><input type="time" id="scr-depart" value="${shift?.heure_depart||''}"></div>
        </div>
        ${shift?.heure_arrivee?`
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;margin-top:4px">2ème shift (optionnel)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group" style="margin:0"><label>Arrivée 2</label><input type="time" id="scr-arrivee2" value="${shift?.heure_arrivee_2||''}"></div>
          <div class="form-group" style="margin:0"><label>Départ 2</label><input type="time" id="scr-depart2" value="${shift?.heure_depart_2||''}"></div>
        </div>`:''}
      </div>
      <div class="form-group"><label>Motif de la modification <span style="color:var(--danger)">*</span></label><textarea id="scr-reason" rows="2" placeholder="Ex: Le collaborateur a pointé 08:45 mais était arrivé à 08:30 selon le registre d'accès..."></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="App.closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="App.submitShiftChangeRequest('${empId}','${date}')">Soumettre la demande</button>
      </div>`);
  },

  async submitShiftChangeRequest(empId, date) {
    const reason=(document.getElementById('scr-reason')?.value||'').trim();
    if(!reason){alert('Le motif est obligatoire.');return;}
    const changes={};
    const debutPrevu=document.getElementById('scr-debut-prevu')?.value||null;
    const finPrevue=document.getElementById('scr-fin-prevue')?.value||null;
    const arrivee=document.getElementById('scr-arrivee')?.value||null;
    const depart=document.getElementById('scr-depart')?.value||null;
    const arrivee2=document.getElementById('scr-arrivee2')?.value||null;
    const depart2=document.getElementById('scr-depart2')?.value||null;
    if(debutPrevu) changes.heure_debut_prevue=debutPrevu;
    if(finPrevue) changes.heure_fin_prevue=finPrevue;
    if(arrivee) changes.heure_arrivee=arrivee;
    if(depart) changes.heure_depart=depart;
    if(arrivee2) changes.heure_arrivee_2=arrivee2;
    if(depart2) changes.heure_depart_2=depart2;
    if(!Object.keys(changes).length){alert('Veuillez renseigner au moins un horaire à modifier.');return;}
    setSyncStatus('busy','↻ Envoi...');
    try {
      await DB.submitShiftChangeRequest(empId,date,changes,reason,currentSession);
      setSyncStatus('ok','● En ligne'); this.closeModal(); this.renderPage();
    } catch(e) { setSyncStatus('error','⚠'); alert(e.message); }
  },

  async approveShiftChange(reqId) {
    const req=Cache.shiftChangeRequests.find(r=>r.id===reqId); if(!req)return;
    const emp=DB.getEmployees().find(e=>e.id===req.employee_id);
    const shift=DB.getShiftByEmpDate(req.employee_id,req.date);
    const lines=['Approuver cette modification de shift ?',''];
    if(req.heure_debut_prevue||req.heure_fin_prevue) lines.push(`Planning prévu : ${req.heure_debut_prevue||'?'} → ${req.heure_fin_prevue||'?'}`);
    if(req.heure_arrivee!==null) lines.push(`Arrivée : ${shift?.heure_arrivee||'—'} → ${req.heure_arrivee}`);
    if(req.heure_depart!==null) lines.push(`Départ : ${shift?.heure_depart||'—'} → ${req.heure_depart}`);
    if(req.heure_arrivee_2!==null) lines.push(`Arrivée 2 : ${shift?.heure_arrivee_2||'—'} → ${req.heure_arrivee_2}`);
    if(req.heure_depart_2!==null) lines.push(`Départ 2 : ${shift?.heure_depart_2||'—'} → ${req.heure_depart_2}`);
    lines.push(''); lines.push(`Collaborateur : ${emp?emp.prenom+' '+emp.nom:'?'}`);
    lines.push(`Demandé par : ${req.requested_by}`);
    if(req.reason) lines.push(`Motif : ${req.reason}`);
    if(!confirm(lines.join('\n'))) return;
    setSyncStatus('busy','↻ Application...');
    try {
      await DB.approveShiftChange(reqId,currentSession);
      setSyncStatus('ok','● En ligne'); this.renderPage();
    } catch(e) { setSyncStatus('error','⚠'); alert(e.message); }
  },

  async rejectShiftChange(reqId) {
    const reason=prompt('Motif du refus (obligatoire) :');
    if(!reason?.trim()){alert('Le motif est obligatoire.');return;}
    setSyncStatus('busy','↻...');
    try {
      await DB.rejectShiftChange(reqId,reason.trim(),currentSession);
      setSyncStatus('ok','● En ligne'); this.renderPage();
    } catch(e) { setSyncStatus('error','⚠'); alert(e.message); }
  },

  // ---- PLANNING SEMAINE ----
  _planningWeek: null,
  _rotWeek: null,

  _getMonday(date) {
    const d=new Date(date); const day=d.getDay();
    const diff=day===0?-6:1-day; d.setDate(d.getDate()+diff);
    return d.toISOString().substring(0,10);
  },
  _weekDays(monday) {
    const start=monday||this._planningWeek;
    return Array.from({length:7},(_,i)=>{const d=new Date(start+'T12:00:00');d.setDate(d.getDate()+i);return d.toISOString().substring(0,10);});
  },
  _fmtWeekLabel(days) {
    const MONTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
    const s=new Date(days[0]+'T12:00:00'), e=new Date(days[6]+'T12:00:00');
    return `Semaine du ${s.getDate()} ${MONTHS[s.getMonth()]} au ${e.getDate()} ${MONTHS[e.getMonth()]} ${e.getFullYear()}`;
  },

  renderPlanning() {
    if(!this._planningWeek) this._planningWeek=this._getMonday(new Date());
    const isKA=currentSession.role==='kindness_ambassador';
    const sites=DB.getSites().filter(s=>s.actif);
    const site=DB.getSiteById(this.currentSite);
    const days=this._weekDays();
    const employees=this._getVisibleEmps(this.currentSite);
    const lock=DB.getLock(this.currentSite,DB.getPeriodKey(days[0]));
    const DAY_SHORT=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
    const DAY_FULL=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

    const siteSelector=isKA?`<strong style="color:var(--text-muted)">${site?.nom||''}</strong>`
      :`<select onchange="App.changeSite(this.value)" style="max-width:220px">${sites.map(s=>`<option value="${s.id}" ${s.id===this.currentSite?'selected':''}>${s.nom}</option>`).join('')}</select>`;

    const hdrCells=days.map((date,i)=>{
      const isFerie=DB.isHoliday(date);
      const d=parseInt(date.split('-')[2]);
      const bg=isFerie?'background:#7c4a00':i>=5?'background:#2d3748':'';
      const title=isFerie?DB.getHolidayName(date)||'Férié':'';
      return`<th style="${bg};min-width:80px" title="${title}">${DAY_SHORT[i]}<br><small style="opacity:0.7">${d}${isFerie?' 🎌':''}</small></th>`;
    }).join('');

    const rows=employees.map(emp=>{
      const schedule=DB.getSchedule(emp.id);
      const cells=days.map((date,i)=>{
        const entry=DB.getPointageByEmpDate(emp.id,date);
        const isFerie=DB.isHoliday(date);
        const isLocked=!!lock;
        let bg='',label='';

        if(isFerie){
          bg='background:var(--ferie-bg)';
          label=`<span style="color:var(--ferie);font-weight:700;font-size:11px">F</span>`;
        } else if(entry){
          if(entry.type==='double'){
            bg=`background:var(--double-bg)`;
            label=`<div style="line-height:1.2"><span style="color:var(--double);font-weight:800;font-size:12px">2×</span><div style="font-size:9px;color:var(--double);margin-top:2px">09h–23h</div></div>`;
          } else if(entry.type==='off'){
            bg=`background:var(--off-bg)`;
            label=`<span style="color:var(--off);font-weight:700;font-size:11px">OFF</span>`;
          } else if(entry.type==='travaille'){
            bg=`background:var(--travaille-bg)`;
            label=`<span style="color:var(--travaille);font-weight:700;font-size:12px">P</span>`;
          } else {
            const t=TYPES.find(x=>x.key===entry.type);
            bg=`background:var(--${entry.type}-bg)`;
            label=`<span style="color:var(--${entry.type});font-weight:700;font-size:11px">${t?.short||'?'}</span>`;
          }
        } else {
          label=`<span style="color:#ccc;font-size:16px">·</span>`;
        }

        const onclick=!isLocked?`onclick="App.openPlanningCellMenu('${emp.id}','${date}',event)"`:' ';
        const cursor=!isLocked?'pointer':'default';
        const titleTip=!isLocked?(isFerie?`Jour férié — ${DB.getHolidayName(date)} (cliquer pour saisir)`:'Cliquer pour choisir le type'):'';
        return`<td ${onclick} title="${titleTip}" style="text-align:center;padding:6px 4px;${bg};cursor:${cursor}">${label}</td>`;
      }).join('');

      // Sélecteur jour de repos
      const offDay=days.find(d=>DB.getPointageByEmpDate(emp.id,d)?.type==='off');
      const dayOptions=`<option value="">— Pas de repos —</option>`+days.map((d,i)=>`<option value="${d}" ${d===offDay?'selected':''}>${DAY_FULL[i]} ${parseInt(d.split('-')[2])}</option>`).join('');

      // Badge affectation temporaire
      const tempAsgn=DB.getActiveTempAssignment(emp.id, days[0]);
      const tempBadge=tempAsgn
        ?(emp.site_id!==this.currentSite
          ?`<span style="font-size:9px;background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:4px;padding:1px 5px;display:inline-block;margin-top:2px">🔄 Détaché de ${DB.getSiteById(emp.site_id)?.nom||'?'}</span>`
          :`<span style="font-size:9px;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;border-radius:4px;padding:1px 5px;display:inline-block;margin-top:2px">🔄 Détaché → ${DB.getSiteById(tempAsgn.site_id_temp)?.nom||'?'}</span>`)
        :'';
      return`<tr>
        <td style="min-width:160px;padding:8px 10px">
          <strong style="font-size:13px">${emp.prenom} ${emp.nom}</strong>
          <div style="font-size:10px;color:var(--text-muted)">${emp.poste}${schedule?` · ${schedule.heure_debut}–${schedule.heure_fin}`:''}</div>
          ${tempBadge}
        </td>
        ${cells}
        <td style="padding:4px 8px;min-width:150px">
          ${lock?`<span class="text-muted text-sm">${offDay?DAY_FULL[days.indexOf(offDay)]:'-'}</span>`:`<select style="font-size:12px;padding:4px 6px;width:100%" onchange="App.setOffDay('${emp.id}',this.value)">${dayOptions}</select>`}
        </td>
      </tr>`;
    }).join('');

    document.getElementById('page-content').innerHTML=`
      <div class="grid-controls" style="flex-wrap:wrap;gap:10px">
        ${siteSelector}
        <div class="date-nav">
          <button onclick="App.prevWeek()">‹</button>
          <span style="min-width:240px;font-size:13px">${this._fmtWeekLabel(days)}</span>
          <button onclick="App.nextWeek()">›</button>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="App.goCurrentWeek()">Cette semaine</button>
        ${!lock?`<button class="btn btn-primary btn-sm" onclick="App.genererPlanning()">⚡ Générer le planning</button>`:''}
      </div>
      <div class="alert alert-info" style="margin-bottom:16px">
        <strong>Comment ça marche :</strong>
        Cliquez sur une cellule pour cycler : <span style="font-weight:700;color:var(--travaille)">Présent</span> → <span style="font-weight:700;color:var(--double)">Double Shift (08h–00h)</span> → <span style="font-weight:700;color:var(--off)">OFF</span> → Vide.
        Utilisez le dropdown <em>Jour de repos</em> comme raccourci. Cliquez <strong>⚡ Générer</strong> pour remplir les cellules encore vides avec Présent.
      </div>
      ${lock?`<div class="alert alert-warning">🔒 Période verrouillée — lecture seule.</div>`:''}
      ${employees.length===0?'<div class="alert alert-warning">Aucun collaborateur actif sur ce site.</div>':''}
      ${employees.length>0?`
      <div class="pointage-table-wrapper">
        <table class="pointage-table">
          <thead><tr><th class="col-emp">Collaborateur</th>${hdrCells}<th style="min-width:150px">Jour de repos</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`:''}`;
  },

  prevWeek(){const d=new Date(this._planningWeek+'T12:00:00');d.setDate(d.getDate()-7);this._planningWeek=d.toISOString().substring(0,10);this.renderPlanning();},
  nextWeek(){const d=new Date(this._planningWeek+'T12:00:00');d.setDate(d.getDate()+7);this._planningWeek=d.toISOString().substring(0,10);this.renderPlanning();},
  goCurrentWeek(){this._planningWeek=this._getMonday(new Date());this.renderPlanning();},

  openPlanningCellMenu(empId, date, event) {
    const emp=DB.getEmployees().find(e=>e.id===empId);
    if(!emp) return;
    if(DB.getLock(emp.site_id,DB.getPeriodKey(date))) return;
    document.getElementById('planning-cell-menu')?.remove();
    const entry=DB.getPointageByEmpDate(empId,date);
    // Détecter le shift prévu pour afficher ✓ sur le bon preset
    const shift=Cache.shifts?.find(s=>s.employee_id===empId&&s.date===date);
    const isKA     = entry?.type==='travaille'&&shift?.heure_debut_prevue==='08:00'&&shift?.heure_fin_prevue==='16:00';
    const isMiddle = entry?.type==='travaille'&&shift?.heure_debut_prevue==='11:00'&&shift?.heure_fin_prevue==='20:00';
    const isKH     = entry?.type==='travaille'&&(shift?.heure_debut_prevue==='16:00'&&(shift?.heure_fin_prevue==='00:00'||shift?.heure_fin_prevue==='23:59'));
    const isTravGen= entry?.type==='travaille'&&!isKA&&!isMiddle&&!isKH;
    const menuItems=[
      {key:'travaille',     label:'✅ Présent (horaires habituels)', color:'var(--travaille)',     check:isTravGen},
      {key:'double',        label:'⏰ Double shift',                 color:'var(--double)',         check:entry?.type==='double'},
      {key:'off',           label:'🔴 OFF / Repos',                 color:'var(--off)',            check:entry?.type==='off'},
      {key:'conge',         label:'🏖 Congé',                       color:'var(--conge)',          check:entry?.type==='conge'},
      {key:'recup',         label:'🔄 Récupération',               color:'var(--recup)',          check:entry?.type==='recup'},
      {key:'maladie',       label:'🏥 Maladie',                    color:'var(--maladie)',        check:entry?.type==='maladie'},
      {key:'',              label:'✕ Effacer',                     color:'#999',                  check:false},
      {key:'__sep',         label:'── Shifts planifiés ──',         color:'#aaa',                  check:false, sep:true},
      {key:'ka_shift',      label:'☀️ KA — 08:00 → 16:00',         color:'var(--accent)',          check:isKA},
      {key:'middle_shift',  label:'🌤 Middle — 11:00 → 20:00',     color:'#f59e0b',               check:isMiddle},
      {key:'kh_shift',      label:'🌙 KH — 16:00 → 00:00',         color:'#60a5fa',               check:isKH},
    ];
    const rect=event.target.closest('td').getBoundingClientRect();
    const menu=document.createElement('div');
    menu.id='planning-cell-menu';
    menu.style.cssText=`position:fixed;z-index:9999;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15);padding:4px;min-width:190px;top:${Math.min(rect.bottom+4,window.innerHeight-320)}px;left:${Math.min(rect.left,window.innerWidth-200)}px`;
    menu.innerHTML=menuItems.map(m=>m.sep
      ?`<div style="padding:5px 12px;font-size:10px;color:#aaa;font-weight:600;letter-spacing:0.5px;text-align:center">${m.label}</div>`
      :`<div onclick="App._setPlanningCell('${empId}','${date}','${m.key}')" style="padding:7px 12px;cursor:pointer;border-radius:6px;font-size:13px;color:${m.color};font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:6px" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background=''"><span>${m.label}</span>${m.check?'<span style="color:var(--accent-green)">✓</span>':''}</div>`
    ).join('');
    document.body.appendChild(menu);
    setTimeout(()=>document.addEventListener('click',function close(e){if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',close);}},{once:false}),0);
  },

  async _setPlanningCell(empId, date, type) {
    document.getElementById('planning-cell-menu')?.remove();
    const emp=DB.getEmployees().find(e=>e.id===empId);
    if(!emp) return;
    setSyncStatus('busy','↻...');
    try {
      if(!type) {
        await DB.deletePointage(empId,date,currentSession);
        await this._clearPlannedShift(empId,date); // supprimer le shift prévu si aucun pointage réel
      } else if(type==='double') {
        await DB.setPointage(empId,date,'double','Double shift (planning)',currentSession);
        await this._upsertDoubleShift(empId,date,emp);
      } else if(type==='travaille') {
        await DB.setPointage(empId,date,'travaille','Planning manuel',currentSession);
        await this._upsertRegularShift(empId,date,emp);
      } else if(type==='ka_shift') {
        await DB.setPointage(empId,date,'travaille','Shift KA 08:00-16:00 (planning)',currentSession);
        await this._upsertShiftWithHours(empId,date,emp,'08:00','16:00');
      } else if(type==='middle_shift') {
        await DB.setPointage(empId,date,'travaille','Middle shift 11:00-20:00 (planning)',currentSession);
        await this._upsertShiftWithHours(empId,date,emp,'11:00','20:00');
      } else if(type==='kh_shift') {
        await DB.setPointage(empId,date,'travaille','Shift KH 16:00-00:00 (planning)',currentSession);
        await this._upsertShiftWithHours(empId,date,emp,'16:00','00:00');
      } else if(type==='off') {
        await DB.setPointage(empId,date,'off','Jour de repos (planning)',currentSession);
        await this._clearPlannedShift(empId,date); // retirer le shift prévu (pas de pointage)
      } else {
        const notes={conge:'Congé (planning)',recup:'Récupération (planning)',maladie:'Maladie (planning)'}[type]||'Planning';
        await DB.setPointage(empId,date,type,notes,currentSession);
        await this._clearPlannedShift(empId,date);
      }
      setSyncStatus('ok','● En ligne');
    } catch(e) {
      setSyncStatus('error','⚠ Erreur');
      console.error('_setPlanningCell:', e);
    }
    this.renderPlanning();
  },

  async _upsertDoubleShift(empId, date, emp) {
    // Pré-configure sh_shifts avec les horaires double (08:00 → 00:00)
    if(!emp) emp=DB.getEmployees().find(e=>e.id===empId);
    if(!emp) return;
    try {
      const {data:existing}=await SB.from('sh_shifts').select('id,heure_arrivee').eq('employee_id',empId).eq('date',date);
      const shift=existing?.[0];
      if(shift) {
        await SB.from('sh_shifts').update({
          heure_debut_prevue:'08:00', heure_fin_prevue:'00:00',
          updated_by:currentSession.username, updated_at:nowISO()
        }).eq('id',shift.id);
      } else {
        await SB.from('sh_shifts').insert({
          id:uid(), employee_id:empId, site_id:emp.site_id, date,
          heure_arrivee:null, heure_depart:null,
          heure_debut_prevue:'08:00', heure_fin_prevue:'00:00',
          retard_minutes:0, duree_minutes:0, pause_minutes:0,
          validated_by_ka:null, validated_at_ka:null,
          created_by:currentSession.username, created_at:nowISO(),
          updated_by:null, updated_at:null
        });
      }
    } catch(e) { console.warn('_upsertDoubleShift:', e); }
  },

  async _upsertRegularShift(empId, date, emp) {
    // Crée/met à jour sh_shifts avec les horaires prévus de l'employé (depuis sh_schedules)
    if(!emp) emp=DB.getEmployees().find(e=>e.id===empId);
    if(!emp) return;
    const schedule=DB.getSchedule(emp.id);
    const debut=schedule?.heure_debut||'09:00';
    const fin=schedule?.heure_fin||'17:00';
    try {
      const {data:existing}=await SB.from('sh_shifts').select('id,heure_arrivee').eq('employee_id',empId).eq('date',date);
      const shift=existing?.[0];
      if(shift) {
        // Mettre à jour uniquement les horaires prévus — ne pas écraser un pointage déjà saisi
        await SB.from('sh_shifts').update({heure_debut_prevue:debut,heure_fin_prevue:fin,updated_by:currentSession.username,updated_at:nowISO()}).eq('id',shift.id);
      } else {
        await SB.from('sh_shifts').insert({
          id:uid(),employee_id:empId,site_id:emp.site_id,date,
          heure_arrivee:null,heure_depart:null,
          heure_debut_prevue:debut,heure_fin_prevue:fin,
          retard_minutes:0,duree_minutes:0,pause_minutes:0,
          validated_by_ka:null,validated_at_ka:null,
          created_by:currentSession.username,created_at:nowISO(),updated_by:null,updated_at:null
        });
      }
    } catch(e) { console.warn('_upsertRegularShift:', e); }
  },

  async _clearPlannedShift(empId, date) {
    // Supprime le shift prévu seulement s'il n'a pas encore été pointé (pas d'heure d'arrivée)
    try {
      const {data:existing}=await SB.from('sh_shifts').select('id,heure_arrivee').eq('employee_id',empId).eq('date',date);
      const shift=existing?.[0];
      if(shift&&!shift.heure_arrivee) await SB.from('sh_shifts').delete().eq('id',shift.id);
    } catch(e) { console.warn('_clearPlannedShift:', e); }
